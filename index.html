<style>
:root{
  --bg:#08111e;--s1:#0d1926;--s2:#112236;--border:#1a3050;
  --green:#059669;--green2:#34d399;--gold:#f59e0b;--red:#dc2626;
  --text:#e8f4f8;--muted:#5b7a9a;--card:#0d1f33;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans','Noto Sans Arabic',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
.rtl{direction:rtl;} .ltr{direction:ltr;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--green);border-radius:3px;}
.hide-sb::-webkit-scrollbar{display:none;} .hide-sb{-ms-overflow-style:none;scrollbar-width:none;}

/* ── Typography ── */
.heading{font-family:'Syne',sans-serif;font-weight:900;}

/* ── Card hover ── */
.lift{transition:transform .2s,box-shadow .2s;}
.lift:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(5,150,105,.18);}

/* ── FB grid ── */
.fb1 img{height:340px;width:100%;object-fit:cover;}
.fb2{display:grid;grid-template-columns:1fr 1fr;gap:2px;height:260px;}
.fb3{display:grid;grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr;gap:2px;height:280px;}
.fb3 .fi:first-child{grid-row:1/3;}
.fb4{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;height:280px;}
.fb5{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;height:260px;}
.fi{overflow:hidden;position:relative;cursor:pointer;}
.fi img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.fi:hover img{transform:scale(1.04);}
.fi-more{position:absolute;inset:0;background:rgba(0,0,0,.56);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#fff;}

/* ── Discount burst ── */
.burst{
  clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  background:var(--red);display:flex;align-items:center;justify-content:center;
  position:absolute;top:12px;left:12px;width:62px;height:62px;z-index:5;
}
.burst-text{font-family:'Syne',sans-serif;font-weight:900;color:#fff;font-size:13px;line-height:1.1;text-align:center;}

/* ── Pulse anim ── */
@keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.5;}}
.pulse{animation:pulse 2s infinite;}

/* ── Countdown ── */
.countdown{display:flex;gap:6px;justify-content:center;align-items:center;padding:8px 12px;border-radius:10px;background:rgba(0,0,0,.35);border:1px solid var(--border);}
.cd-block{text-align:center;min-width:34px;}
.cd-num{font-family:'Syne',sans-serif;font-weight:900;font-size:20px;line-height:1;color:#fff;}
.cd-label{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;}

/* ── Sponsor slot ── */
.sponsor-slot{background:var(--s2);border:1px dashed var(--border);border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:80px;}
.sponsor-img{width:100%;height:100%;object-fit:contain;padding:6px;}

/* ── Menu overlay ── */
.menu-overlay{position:fixed;inset:0;background:rgba(8,17,30,.97);z-index:100;display:flex;flex-direction:column;padding:0;}
.menu-item{display:flex;align-items:center;gap:16px;padding:18px 24px;border-bottom:1px solid var(--border);color:var(--text);font-size:17px;font-weight:700;text-decoration:none;cursor:pointer;transition:background .15s;}
.menu-item:hover{background:var(--s2);}
.menu-item .mi-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}

/* ── Modal base ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:80;display:flex;align-items:flex-end;justify-content:center;}
@media(min-width:640px){.modal-bg{align-items:center;}}
.modal-box{background:var(--s1);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;}
@media(min-width:640px){.modal-box{border-radius:20px;}}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}

/* ── Tag pill ── */
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.4px;}

/* ── Input ── */
.inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--green);}

/* ── Button ── */
.btn-green{background:var(--green);color:#fff;border:none;border-radius:12px;padding:12px 20px;font-weight:700;font-size:14px;cursor:pointer;transition:opacity .15s;}
.btn-green:hover{opacity:.88;}
.btn-green:disabled{opacity:.4;cursor:not-allowed;}
.btn-ghost{background:var(--s2);color:var(--muted);border:1px solid var(--border);border-radius:12px;padding:10px 16px;font-weight:600;font-size:13px;cursor:pointer;transition:all .15s;}
.btn-ghost:hover{color:var(--text);border-color:var(--green);}

/* ── Mobile nav ── */
.mob-nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(8,17,30,.97);border-top:1px solid var(--border);backdrop-filter:blur(12px);display:flex;justify-content:space-around;align-items:center;height:60px;}

/* ── Lightbox ── */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:200;display:flex;align-items:center;justify-content:center;}

/* ── Supabase-ready data attrs (future) ── */
/* [data-collection="posts"] [data-collection="sponsors"] */
</style>

/* ══ Helpers ══ */
const tLeft = (createdAt, days) => {
  const diff = createdAt + days*86400000 - Date.now();
  if(diff<=0) return null;
  return {d:Math.floor(diff/86400000),h:Math.floor((diff%86400000)/3600000),m:Math.floor((diff%3600000)/60000)};
};

/* ══ Context ══ */
const LangCtx = React.createContext();
const LangProvider = ({children}) => {
  const [lang, setLang] = useState('ckb');
  const t = k => { const keys=k.split('.'); let v=LANG_DATA[lang]; for(const x of keys){v=v?.[x]; if(!v)return k;} return v; };
  const sw = l => { setLang(l); document.documentElement.lang=l; document.documentElement.dir=l==='en'?'ltr':'rtl'; window.scrollTo(0,0); };
  return <LangCtx.Provider value={{lang,t,sw,dir:lang==='en'?'ltr':'rtl'}}>{children}</LangCtx.Provider>;
};
const useLang = () => useContext(LangCtx);

/* ══════════════════════════════════════════════
   FB GRID
══════════════════════════════════════════════ */
const FBGrid = ({images=[], pct, expired, onImageClick}) => {
  const n = images.length; if(!n) return null;
  const vis = Math.min(n,5); const extra = n>5?n-5:0;
  const cls = n===1?'fb1':n===2?'fb2':n===3?'fb3':n===4?'fb4':'fb5';
  return (
    <div className="relative overflow-hidden" style={{borderRadius:0}}>
      {n===1
        ? <div className="fb1 fi" onClick={()=>onImageClick(0)}><img src={images[0]} alt="" loading="lazy"/></div>
        : <div className={cls}>
            {images.slice(0,vis).map((img,i)=>(
              <div key={i} className="fi" onClick={()=>onImageClick(i)}>
                <img src={img} alt="" loading="lazy"/>
                {extra>0 && i===vis-1 && <div className="fi-more">+{extra+1}</div>}
              </div>
            ))}
          </div>
      }
      <div className="burst"><div className="burst-text">{pct}%<br/>OFF</div></div>
      {expired && (
        <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.6)',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(3px)',zIndex:6}}>
          <span style={{background:'var(--red)',color:'#fff',padding:'8px 24px',borderRadius:30,fontWeight:900,fontSize:18,transform:'rotate(-5deg)',border:'2px solid rgba(255,255,255,.3)'}}>EXPIRED</span>
        </div>
      )}
    </div>
  );
};

/* Lightbox */
const Lightbox = ({images, start, onClose}) => {
  const [i,setI] = useState(start||0);
  useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose();if(e.key==='ArrowLeft')setI(x=>(x-1+images.length)%images.length);if(e.key==='ArrowRight')setI(x=>(x+1)%images.length);};
    window.addEventListener('keydown',h); return()=>window.removeEventListener('keydown',h);
  },[]);
  return (
    <div className="lb" onClick={onClose}>
      <button style={{position:'absolute',top:16,right:16,background:'none',border:'none',color:'#fff',fontSize:32,cursor:'pointer',zIndex:5}} onClick={onClose}>×</button>
      {images.length>1 && <div style={{position:'absolute',top:16,left:'50%',transform:'translateX(-50%)',color:'rgba(255,255,255,.6)',fontSize:13,zIndex:5}}>{i+1}/{images.length}</div>}
      <img src={images[i]} alt="" style={{maxWidth:'92vw',maxHeight:'88vh',objectFit:'contain'}} onClick={e=>e.stopPropagation()}/>
      {images.length>1 && <>
        <button onClick={e=>{e.stopPropagation();setI(x=>(x-1+images.length)%images.length);}} style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',background:'rgba(255,255,255,.12)',border:'none',color:'#fff',width:42,height:42,borderRadius:'50%',fontSize:22,cursor:'pointer'}}>‹</button>
        <button onClick={e=>{e.stopPropagation();setI(x=>(x+1)%images.length);}} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'rgba(255,255,255,.12)',border:'none',color:'#fff',width:42,height:42,borderRadius:'50%',fontSize:22,cursor:'pointer'}}>›</button>
      </>}
    </div>
  );
};

/* ══════════════════════════════════════════════
   COUNTDOWN
══════════════════════════════════════════════ */
const Countdown = ({createdAt, days, t}) => {
  const [tl, setTl] = useState(()=>tLeft(createdAt,days));
  useEffect(()=>{const id=setInterval(()=>setTl(tLeft(createdAt,days)),30000);return()=>clearInterval(id);},[createdAt,days]);
  if(!tl) return <div className="countdown"><span style={{color:'var(--muted)',fontSize:13,fontWeight:700}}>{t('expired')}</span></div>;
  return (
    <div className="countdown">
      {[{v:tl.d,l:t('days')},{v:tl.h,l:t('hrs')},{v:tl.m,l:t('min')}].map((x,i)=>(
        <React.Fragment key={i}>
          {i>0&&<span style={{color:'var(--muted)',fontWeight:900,alignSelf:'center'}}>:</span>}
          <div className="cd-block"><div className="cd-num">{x.v}</div><div className="cd-label">{x.l}</div></div>
        </React.Fragment>
      ))}
    </div>
  );
};

const DealCard = ({post, isAdmin, onDelete, onEdit, t, lang}) => {

      {lb!==null && <Lightbox images={post.images} start={lb} onClose={()=>setLb(null)}/>}
      <div style={{padding:'14px 16px 16px'}}>
        <h3 style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:15,lineHeight:1.35,marginBottom:10,color:'var(--text)'}}>{title}</h3>
        <Countdown createdAt={post.createdAt} days={post.discountDays} t={t}/>

/* ══════════════════════════════════════════════
   IMAGE MANAGER (multi-upload)
══════════════════════════════════════════════ */
const ImageManager = ({onSave, onCancel, t}) => {
  const [imgs, setImgs] = useState([]);
  const [urlInput, setUrlInput] = useState('');
  const addUrl = () => { if(urlInput.trim()){setImgs(p=>[...p,urlInput.trim()]);setUrlInput('');} };
  const addFiles = files => {
    Array.from(files).forEach(f => { const r=new FileReader(); r.onload=e=>setImgs(p=>[...p,e.target.result]); r.readAsDataURL(f); });
  };
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{padding:'16px',display:'flex',gap:8,borderBottom:'1px solid var(--border)'}}>
        <input className="inp" style={{flex:1}} placeholder={t('imageUrl')} value={urlInput} onChange={e=>setUrlInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addUrl()}/>
        <button className="btn-ghost" onClick={addUrl}><i className="fas fa-link"/></button>
      </div>
      <label style={{display:'flex',alignItems:'center',gap:10,padding:'14px 16px',cursor:'pointer',borderBottom:'1px solid var(--border)',color:'var(--green2)',fontWeight:700}}>
        <i className="fas fa-images"/>{t('addImages')}
        <input type="file" accept="image/*" multiple style={{display:'none'}} onChange={e=>addFiles(e.target.files)}/>
      </label>
      <div style={{flex:1,overflowY:'auto',padding:16}}>
        {imgs.length===0 ? (
          <div style={{textAlign:'center',color:'var(--muted)',padding:'30px 0'}}>
            <div style={{fontSize:36,marginBottom:8}}>🖼️</div>
            <p style={{fontSize:13}}>Add image URLs or upload from your device</p>
          </div>
        ) : (
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(90px,1fr))',gap:8}}>
            {imgs.map((img,i)=>(
              <div key={i} style={{position:'relative',borderRadius:8,overflow:'hidden'}}>
                <img src={img} alt="" style={{width:'100%',height:80,objectFit:'cover'}}/>
                <button onClick={()=>setImgs(p=>p.filter((_,j)=>j!==i))} style={{position:'absolute',top:2,right:2,background:'var(--red)',color:'#fff',width:20,height:20,borderRadius:'50%',border:'none',fontSize:10,cursor:'pointer'}}>×</button>
              </div>
            ))}
          </div>
        )}
      </div>
      <div style={{padding:16,display:'flex',gap:8,borderTop:'1px solid var(--border)'}}>
        <button className="btn-green" style={{flex:1}} onClick={()=>imgs.length>0&&onSave(imgs)} disabled={imgs.length===0}>{t('save')}</button>
        <button className="btn-ghost" onClick={onCancel}>{t('cancel')}</button>
      </div>
    </div>
  );
};

const PostModal = ({editingPost, onSave, onClose, t, lang}) => {
  const [step, setStep] = useState(editingPost?'form':'images');
  const [images, setImages] = useState(editingPost?.images||[]);
  const [form, setForm] = useState({
    title: editingPost?.title||{ckb:'',ar:'',en:''},
    discountPct: editingPost?.discountPct||20,
    discountDays: editingPost?.discountDays||7,
    category: editingPost?.category||'rice',
  });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const setTitle = (l,v) => setForm(f=>({...f,title:{...f.title,[l]:v}}));

  const submit = () => {
    if(!form.title[lang]||images.length===0) return;
    onSave({
      id: editingPost?.id||Date.now(),   // ← keeps existing id when editing
      title: form.title,
      images,
      discountPct:+form.discountPct,
      discountDays:+form.discountDays,
      createdAt: editingPost?.createdAt||Date.now(),
      likes: editingPost?.likes||0,
      category: form.category,
      lang,
    });
  };

  if(step==='images'){
    return (
      <div className="modal-bg" onClick={onClose}>
        <div className="modal-box" onClick={e=>e.stopPropagation()} style={{height:'80vh',display:'flex',flexDirection:'column'}}>

            <ImageManager onSave={imgs=>{setImages(imgs);setStep('form');}} onCancel={onClose} t={t}/>

        </div>
      </div>
    );
  }

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <button onClick={()=>setStep('images')} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:20}}>←</button>
          <span style={{fontWeight:700,fontSize:15}}>{editingPost?t('editPost'):t('addPost')}</span>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--muted)',fontSize:22,cursor:'pointer'}}>×</button>
        </div>
        <div style={{padding:16,overflowY:'auto',maxHeight:'calc(80vh - 56px)'}}>
          {/* Image preview strip */}
          <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:8,marginBottom:12}} className="hide-sb">
            {images.map((img,i)=>(
              <div key={i} style={{position:'relative',flexShrink:0}}>
                <img src={img} style={{width:70,height:70,objectFit:'cover',borderRadius:8}} alt=""/>
                <button onClick={()=>setImages(p=>p.filter((_,j)=>j!==i))} style={{position:'absolute',top:2,right:2,background:'var(--red)',color:'#fff',width:18,height:18,borderRadius:'50%',border:'none',fontSize:9,cursor:'pointer'}}>×</button>
              </div>

            <button onClick={()=>setStep('images')} style={{width:70,height:70,borderRadius:8,background:'var(--s2)',border:'1px dashed var(--border)',color:'var(--muted)',fontSize:22,cursor:'pointer',flexShrink:0}}>+</button>
          </div>

          {/* Titles */}
          {['ckb','ar','en'].map(l=>(
            <div key={l} style={{marginBottom:12}}>

      <section id="home" style={{position:'relative',overflow:'hidden',padding:'60px 16px 50px',background:'linear-gradient(160deg,#07192e 0%,#0c2a1e 60%,var(--bg) 100%)'}}>
        <div style={{position:'absolute',top:'-80px',right:'-100px',width:350,height:350,borderRadius:'50%',background:'rgba(5,150,105,.07)',pointerEvents:'none'}}/>
        <div style={{position:'absolute',bottom:'-60px',left:'-60px',width:250,height:250,borderRadius:'50%',background:'rgba(52,211,153,.05)',pointerEvents:'none'}}/>
        <div style={{maxWidth:640,margin:'0 auto',textAlign:'center',position:'relative',zIndex:2}}>
          <div style={{display:'inline-flex',alignItems:'center',gap:7,background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',borderRadius:30,padding:'5px 14px',fontSize:12,fontWeight:700,color:'#a7f3d0',marginBottom:20,letterSpacing:.5}}>
            <span style={{width:7,height:7,borderRadius:'50%',background:'#34d399',display:'inline-block'}} className="pulse"/>
            REGION KURDISTAN
          </div>
          <h1 style={{fontFamily:"'Syne',sans-serif",fontWeight:900,lineHeight:1.05,marginBottom:14}}>
            <span style={{display:'block',fontSize:'clamp(34px,7vw,64px)',color:'var(--text)'}}>{t('hero1')}</span>
            <span style={{display:'block',fontSize:'clamp(34px,7vw,64px)',background:'linear-gradient(120deg,#34d399,#059669)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>{t('hero2')}</span>
          </h1>
          <p style={{color:'#7fb8a0',fontSize:16,marginBottom:28,lineHeight:1.6}}>{t('heroSub')}</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:10,justifyContent:'center'}}>
            <button onClick={()=>scrollTo('deals')} style={{background:'white',color:'#064e3b',border:'none',borderRadius:30,padding:'13px 26px',fontWeight:800,fontSize:15,cursor:'pointer',display:'flex',alignItems:'center',gap:8,boxShadow:'0 6px 24px rgba(0,0,0,.2)'}}>
              <i className="fas fa-fire" style={{color:'#ef4444'}}/>{t('seeDeals')}
            </button>
            <button onClick={()=>scrollTo('locations')} style={{background:'rgba(255,255,255,.08)',color:'white',border:'1px solid rgba(255,255,255,.18)',borderRadius:30,padding:'13px 26px',fontWeight:700,fontSize:15,cursor:'pointer'}}>
              <i className="fas fa-map-marker-alt" style={{marginInlineEnd:8}}/>{t('findStore')}
            </button>
          </div>
        </div>
      </section>

      {/* ─────────── SPONSORS STRIP ─────────── */}
      {visibleSponsors.length>0 && (
        <section style={{padding:'10px 16px',background:'var(--s1)',borderBottom:'1px solid var(--border)'}}>
          <div style={{maxWidth:1080,margin:'0 auto',display:'flex',gap:10,overflowX:'auto'}} className="hide-sb">
            {visibleSponsors.map(s=>(
              <div key={s.id} className="sponsor-slot" style={{width:120,height:56,flexShrink:0}}>
                <img src={s.imageUrl} alt="sponsor" className="sponsor-img"/>
              </div>
            ))}
          </div>
        </section>
      )}

      {/* ─────────── DEALS ─────────── */}
      <section id="deals" style={{padding:'40px 16px',maxWidth:1080,margin:'0 auto'}}>
        <h2 className="heading" style={{fontSize:24,marginBottom:6}}>{t('deals_h')}</h2>
        <p style={{color:'var(--muted)',fontSize:13,marginBottom:20}}>{filtered.length} deals</p>

        {/* Category pills */}
        <div style={{display:'flex',gap:7,overflowX:'auto',paddingBottom:12,marginBottom:20}} className="hide-sb">
          {CATS.map(c=>(
            <button key={c} onClick={()=>setCat(c)} style={{padding:'7px 16px',borderRadius:20,border:'none',fontSize:13,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',background:cat===c?'var(--green)':'var(--s2)',color:cat===c?'#fff':'var(--muted)',border:cat===c?'none':'1px solid var(--border)',transition:'all .15s'}}>
              {t(`cats.${c}`)}
            </button>
          ))}
        </div>

        {/* Grid */}
        {filtered.length===0 ? (
          <div style={{textAlign:'center',padding:'60px 20px',color:'var(--muted)'}}>
            <div style={{fontSize:40,marginBottom:12}}>🏷️</div>
            <p style={{fontSize:16}}>{t('noDeals')}</p>
          </div>
        ) : (
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
            {filtered.map(post=>(
              <DealCard key={post.id} post={post} isAdmin={!!admin} onDelete={handleDelete} onEdit={openEdit} t={t} lang={lang}/>
            ))}
          </div>
        )}

        {admin && (
          <div style={{textAlign:'center',marginTop:28}}>
            <button className="btn-green" onClick={()=>{setEditingPost(null);setShowPost(true);}}>
              <i className="fas fa-plus" style={{marginInlineEnd:8}}/>{t('addPost')}
            </button>
          </div>
        )}
      </section>

      {/* ─────────── LOCATIONS ─────────── */}
      <section id="locations" style={{padding:'40px 16px',background:'var(--s1)',borderTop:'1px solid var(--border)',borderBottom:'1px solid var(--border)'}}>
        <div style={{maxWidth:1080,margin:'0 auto'}}>
          <h2 className="heading" style={{fontSize:24,marginBottom:20,textAlign:'center'}}>{t('locations_h')}</h2>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(270px,1fr))',gap:14}}>
            {[
              {id:1,name:'Bilal Bazar – Koya Street',nameKu:'بیناڵ بازاڕ – شەقامی کۆیە',nameAr:'بيلال بازار – شارع كويا',addr:'Koya Street, Erbil',addrKu:'شەقامی کۆیە، هەولێر',addrAr:'شارع كويا، أربيل',link:'https://maps.app.goo.gl/MR4fDpX1jHAAsHzLA',phone:'+964 750 919 3030',hours:'8:00 AM – 10:00 PM'},
              {id:2,name:'Bilal Bazar – Hewasti',nameKu:'بیناڵ بازاڕ – هەواستی',nameAr:'بيلال بازار – هواستي',addr:'Hewasti, Hawler (Erbil)',addrKu:'هەواستی، هەولێر',addrAr:'هواستي، هولير',link:'https://maps.app.goo.gl/ZuwXPth3DokXYDEt7',phone:'+964 750 919 3030',hours:'8:00 AM – 10:00 PM'},
              {id:3,name:'Bilal Bazar – Ankawa',nameKu:'بیناڵ بازاڕ – عەنکاوە',nameAr:'بيلال بازار – عنكاوا',addr:'Ankawa, Erbil',addrKu:'عەنکاوە، هەولێر',addrAr:'عنكاوا، أربيل',link:'https://maps.app.goo.gl/vZhSVM94MKC1Cuja9',phone:'+964 750 919 3030',hours:'8:00 AM – 10:00 PM'},
            ].map(loc=>(
              <a key={loc.id} href={loc.link} target="_blank" rel="noopener noreferrer" className="lift" style={{display:'block',background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:'18px',textDecoration:'none',color:'inherit'}}>
                <div style={{width:40,height:40,borderRadius:10,background:'rgba(5,150,105,.15)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:12,fontSize:18,transition:'all .2s'}}>
                  <i className="fas fa-store" style={{color:'var(--green2)'}}/>
                </div>
                <h3 style={{fontWeight:800,fontSize:14,marginBottom:4,color:'var(--text)'}}>{lang==='ckb'?loc.nameKu:lang==='ar'?loc.nameAr:loc.name}</h3>
                <p style={{fontSize:12,color:'var(--muted)',marginBottom:12}}>{lang==='ckb'?loc.addrKu:lang==='ar'?loc.addrAr:loc.addr}</p>
                <div style={{display:'flex',gap:8,fontSize:11,color:'#6b8fa8',marginBottom:14}}>
                  <span><i className="far fa-clock" style={{color:'var(--green)',marginInlineEnd:4}}/>{loc.hours}</span>
                </div>
                <div style={{display:'flex',gap:7}}>
                  <span style={{flex:1,background:'var(--green)',color:'#fff',borderRadius:8,padding:'8px',textAlign:'center',fontSize:12,fontWeight:700}}>
                    <i className="fas fa-map-marker-alt" style={{marginInlineEnd:5}}/>{t('locations')}
                  </span>
                  <a href={`tel:${loc.phone}`} onClick={e=>e.stopPropagation()} style={{background:'var(--s2)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px',display:'flex',alignItems:'center',color:'var(--muted)',fontSize:12}}>
                    <i className="fas fa-phone"/>
                  </a>
                </div>
              </a>
            ))}
          </div>
        </div>
      </section>

      {/* ─────────── ABOUT ─────────── */}
      <section id="about" style={{padding:'40px 16px',maxWidth:700,margin:'0 auto',textAlign:'center'}}>
        <h2 className="heading" style={{fontSize:24,marginBottom:14}}>{t('about_h')}</h2>
        <p style={{color:'var(--muted)',fontSize:15,lineHeight:1.8,marginBottom:24}}>{t('about_p')}</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',gap:10}}>
          {[['🌾','rice'],['🥩','meat'],['🌽','cereal'],['📦','other']].map(([icon,c])=>(
            <div key={c} onClick={()=>{setCat(c);scrollTo('deals');}} className="lift" style={{background:'var(--s2)',border:'1px solid var(--border)',borderRadius:12,padding:'14px 8px',textAlign:'center',cursor:'pointer'}}>
              <div style={{fontSize:26,marginBottom:6}}>{icon}</div>
              <div style={{fontWeight:700,fontSize:12,color:'var(--green2)'}}>{t(`cats.${c}`)}</div>
            </div>
          ))}
        </div>
      </section>

      {/* ─────────── FOOTER ─────────── */}
      <footer style={{background:'#050d18',borderTop:'1px solid var(--border)',padding:'32px 16px 80px',textAlign:'center'}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:20,color:'var(--text)',marginBottom:4}}>Bilal Bazar</div>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,color:'var(--green)',marginBottom:14}}>REGION KURDISTAN</div>
        <p style={{fontSize:13,color:'var(--muted)',marginBottom:16,maxWidth:360,margin:'0 auto 16px',lineHeight:1.6}}>
          {lang==='ckb'?'بازاڕی متمانەپێکراوی ناوچەی کوردستان':lang==='ar'?'السوق الموثوق في إقليم كردستان':'The Trusted Market of Region Kurdistan'}
        </p>
        <div style={{display:'flex',justifyContent:'center',gap:16,marginBottom:16}}>
          <a href="https://wa.me/9647509193030" target="_blank" rel="noreferrer" style={{color:'#25d366',fontSize:22}}><i className="fab fa-whatsapp"/></a>
        </div>
        {/* Settings — small hidden gear for admin access */}
        <p style={{fontSize:11,color:'#1e3050'}}>{t('copyright')}</p>
        <button onClick={()=>setShowWarning(true)} style={{background:'none',border:'none',color:'#1a3050',fontSize:13,cursor:'pointer',marginTop:16}} title="Staff access"><i className="fas fa-cog"/></button>
      </footer>

      {/* ─────────── MOBILE BOTTOM NAV ─────────── */}
      <div className="mob-nav">
        {navItems.map(x=>(
          <button key={x.id} onClick={()=>scrollTo(x.id)} style={{background:'none',border:'none',display:'flex',flexDirection:'column',alignItems:'center',gap:3,color:activeSection===x.id?'var(--green2)':'var(--muted)',cursor:'pointer',flex:1}}>
            <i className={`fas ${x.icon}`} style={{fontSize:18}}/>
            <span style={{fontSize:9,fontWeight:700}}>{x.l}</span>
          </button>
        ))}
        <button onClick={()=>setMenuOpen(true)} style={{background:'none',border:'none',display:'flex',flexDirection:'column',alignItems:'center',gap:3,color:'var(--muted)',cursor:'pointer',flex:1}}>
          <i className="fas fa-bars" style={{fontSize:18}}/>
          <span style={{fontSize:9,fontWeight:700}}>Menu</span>
        </button>
      </div>

      {/* ─────────── FLOATING WHATSAPP ─────────── */}
      <a href="https://wa.me/9647509193030" target="_blank" rel="noreferrer"
         style={{position:'fixed',bottom:70,left:16,width:50,height:50,borderRadius:'50%',background:'#25d366',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:22,zIndex:40,boxShadow:'0 4px 16px rgba(37,211,102,.4)',textDecoration:'none'}}>
        <i className="fab fa-whatsapp"/>
      </a>

      {/* ─────────── ADMIN FAB ─────────── */}
      {admin && (
        <button onClick={()=>{setEditingPost(null);setShowPost(true);}}
           style={{position:'fixed',bottom:70,right:16,width:50,height:50,borderRadius:'50%',background:'linear-gradient(135deg,#dc2626,#f97316)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:22,zIndex:40,cursor:'pointer',boxShadow:'0 4px 16px rgba(220,38,38,.4)'}}>
          <i className="fas fa-plus"/>
        </button>
      )}

      {/* ─────────── MODALS ─────────── */}
      {showWarning && <AdminWarning onStaff={()=>{setShowWarning(false);setShowLogin(true);}} onLeave={()=>setShowWarning(false)} t={t}/>}
      {showLogin && <AdminLogin onLogin={handleLogin} onCancel={()=>setShowLogin(false)} t={t}/>}
      {showPost && <PostModal editingPost={editingPost} onSave={handleSavePost} onClose={()=>{setShowPost(false);setEditingPost(null);}} t={t} lang={lang}/>}
      {showSponsors && <SponsorManager sponsors={sponsors} onUpdate={setSponsors} onClose={()=>setShowSponsors(false)} t={t}/>}
    </div>
  );
};

const Root = () => <LangProvider><App/></LangProvider>;
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>

<!-- 
═══════════════════════════════════════════
SUPABASE INTEGRATION GUIDE (Future)
═══════════════════════════════════════════

Tables to create in Supabase:
  posts (id, title_ckb, title_ar, title_en, images jsonb, discount_pct, discount_days, 
          created_at, likes, category, lang, city)
  sponsors (id, image_url, visible, order_num)
  admins (id, email) — use Supabase Auth instead of local credentials

Replace these functions:
  1. SAMPLE_POSTS → supabase.from('posts').select('*').order('created_at',{ascending:false})
  2. handleSavePost → supabase.from('posts').upsert(post)
  3. handleDelete → supabase.from('posts').delete().eq('id',id)
  4. AdminLogin submit → supabase.auth.signInWithPassword({email,password})
  5. SAMPLE_SPONSORS → supabase.from('sponsors').select('*')

Environment: Add your Supabase URL & anon key as constants at top of file.
═══════════════════════════════════════════
-->
</body>
</html>
