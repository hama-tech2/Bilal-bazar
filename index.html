<style>
:root{
  --bg:#07111f; --s1:#0c1828; --s2:#102035; --s3:#152a40;
  --border:#1c3050; --green:#059669; --g2:#34d399; --g3:#6ee7b7;
  --gold:#f59e0b; --red:#dc2626; --text:#e8f4ff; --muted:#5b7a9a;
  --card:#0e1f32; --r:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans','Noto Sans Arabic',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased;}
.rtl{direction:rtl;} .ltr{direction:ltr;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--green);border-radius:2px;}
.nosb::-webkit-scrollbar{display:none;} .nosb{-ms-overflow-style:none;scrollbar-width:none;}
.heading{font-family:'Syne',sans-serif;font-weight:900;}
.grad{background:linear-gradient(120deg,#34d399,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* ── VIDEO HERO ── */
#hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.vbg{position:absolute;inset:0;z-index:0;}
.vbg video{width:100%;height:100%;object-fit:cover;opacity:0.4;}
.vbg::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,17,31,.55) 0%,rgba(7,17,31,.25) 45%,rgba(7,17,31,.9) 100%);}
.hero-content{position:relative;z-index:2;text-align:center;padding:100px 20px 80px;max-width:760px;margin:0 auto;width:100%;}

/* ── ANIMATED BILAL BAZAR TITLE ── */
@keyframes revealUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes revealFade{from{opacity:0;}to{opacity:1;}}
@keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes shimmer{0%{background-position:200% center;}100%{background-position:-200% center;}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
@keyframes scanline{0%{transform:translateY(-100%);}100%{transform:translateY(100vh);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideInLeft{from{transform:translateX(-30px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes slideInRight{from{transform:translateX(30px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes scaleIn{from{transform:scale(.92);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes glow{0%,100%{text-shadow:0 0 20px rgba(52,211,153,.3);}50%{text-shadow:0 0 40px rgba(52,211,153,.7),0 0 80px rgba(5,150,105,.4);}}

.hero-brand{
  font-family:'Syne',sans-serif;font-weight:900;
  font-size:clamp(52px,11vw,100px);
  letter-spacing:-2px;line-height:1;
  background:linear-gradient(120deg,#fff 0%,#e2fff4 30%,var(--g2) 60%,#fff 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:revealUp .8s ease forwards, shimmer 4s linear infinite;
  animation-delay:.2s;opacity:0;
}
.hero-sub-brand{
  font-family:'Syne',sans-serif;font-weight:700;
  font-size:clamp(14px,2.5vw,20px);
  letter-spacing:8px;color:var(--g2);
  animation:revealFade 1s ease .8s forwards;opacity:0;
  text-transform:uppercase;margin-top:6px;
}
.hero-desc{
  color:rgba(232,244,255,.75);font-size:clamp(14px,2.5vw,17px);
  line-height:1.7;
  animation:revealFade 1s ease 1s forwards;opacity:0;
}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:transform .2s,box-shadow .2s,border-color .2s;}
.card:hover{transform:translateY(-4px);box-shadow:0 14px 40px rgba(5,150,105,.18);border-color:rgba(52,211,153,.2);}

/* ── DISCOUNT RIBBON ── */
.ribbon{position:absolute;top:12px;left:12px;z-index:6;background:var(--red);color:#fff;padding:5px 12px;border-radius:6px;font-family:'Syne',sans-serif;font-weight:900;font-size:13px;letter-spacing:.5px;box-shadow:0 2px 8px rgba(220,38,38,.5);}
.ltr .ribbon{left:auto;right:12px;}

/* ── FB GRID ── */
.fb1 .fi{height:320px;}
.fb2{display:grid;grid-template-columns:1fr 1fr;gap:2px;height:240px;}
.fb3{display:grid;grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr;gap:2px;height:260px;}
.fb3 .fi:first-child{grid-row:1/3;}
.fb4{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;height:260px;}
.fb5{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;height:240px;}
.fi{overflow:hidden;position:relative;background:var(--s2);cursor:pointer;}
.fi img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;}
.fi:hover img{transform:scale(1.04);}
.fi-more{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;}

/* ── COUNTDOWN ── */
.countdown{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 12px;border-radius:8px;background:rgba(0,0,0,.3);border:1px solid var(--border);}
.cd-block{text-align:center;min-width:28px;}
.cd-num{font-family:'Syne',sans-serif;font-weight:900;font-size:18px;line-height:1;color:#fff;}
.cd-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-top:1px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 20px;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;transition:all .15s;font-family:inherit;}
.btn-green{background:var(--green);color:#fff;} .btn-green:hover{background:#047857;}
.btn-green:disabled{opacity:.4;cursor:not-allowed;}
.btn-ghost{background:var(--s2);color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--green);color:var(--g2);}

/* ── INPUTS ── */
.inp{width:100%;background:transparent;border:none;border-bottom:1.5px solid #d1d5db;padding:10px 0;color:#111;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;}
.inp:focus{border-bottom-color:#4a90e2;}
.inp::placeholder{color:#9ca3af;font-weight:400;}

/* ── AUTH MODAL (clean style) ── */
.auth-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);}
.auth-modal-box{background:#fff;border-radius:16px;width:100%;max-width:380px;overflow:hidden;animation:scaleIn .25s ease;}
.auth-header{padding:32px 32px 0;text-align:center;}
.auth-header h2{font-family:'Inter',sans-serif;font-weight:700;font-size:28px;color:#111;margin-bottom:6px;}
.auth-header p{font-size:14px;color:#9ca3af;}
.auth-header a{color:#4a90e2;cursor:pointer;font-weight:600;text-decoration:none;}
.auth-body{padding:28px 32px;}
.auth-divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:#9ca3af;font-size:13px;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:#e5e7eb;}
.auth-social-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:11px;border:1.5px solid #e5e7eb;border-radius:8px;background:#fff;cursor:pointer;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:#374151;transition:all .15s;margin-bottom:10px;}
.auth-social-btn:hover{background:#f9fafb;border-color:#d1d5db;}
.auth-submit-btn{width:100%;padding:13px;background:#4a90e2;color:#fff;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:22px;}
.auth-submit-btn:hover{background:#357abd;}
.auth-submit-btn:disabled{opacity:.6;cursor:not-allowed;}

/* ── MODAL (app style) ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:90;display:flex;align-items:flex-end;justify-content:center;padding:16px;}
@media(min-width:640px){.modal-bg{align-items:center;}}
.modal-box{background:var(--s1);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.5);}
@media(min-width:640px){.modal-box{border-radius:20px;}}
.modal-header{position:sticky;top:0;z-index:2;background:var(--s1);padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}

/* ── DRAWER ── */
.drawer{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;}
.drawer-panel{background:var(--s1);border-inline-end:1px solid var(--border);width:min(300px,85vw);height:100%;overflow-y:auto;display:flex;flex-direction:column;animation:slideInLeft .2s ease;}
.rtl .drawer-panel{animation-name:slideInRight;}
.drawer-item{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;background:none;border:none;width:100%;text-align:inherit;transition:background .15s;}
.drawer-item:hover{background:var(--s2);}
.drawer-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}

/* ── SPONSOR STRIP ── */
@keyframes sponsorFade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.sponsor-item{background:var(--s2);border:1px solid var(--border);border-radius:8px;width:110px;height:52px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;animation:sponsorFade .5s ease forwards;opacity:0;}
.sponsor-item img{width:100%;height:100%;object-fit:contain;padding:6px;}

/* ── MOBILE NAV ── */
.mob-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(7,17,31,.97);border-top:1px solid var(--border);backdrop-filter:blur(12px);display:flex;justify-content:space-around;align-items:center;height:58px;padding-bottom:env(safe-area-inset-bottom);}
.mob-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);background:none;border:none;cursor:pointer;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;transition:color .15s;padding:8px 0;}
.mob-btn.act{color:var(--g2);}

/* ── LIGHTBOX ── */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:200;display:flex;align-items:center;justify-content:center;}

/* ── SKELETON ── */
.skel{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;}

/* ── RESPONSIVE ── */
@media(max-width:640px){.hide-sm{display:none!important;}}
@media(min-width:641px){.mob-nav{display:none!important;}}

/* ── SECTION ANIMATIONS ── */
.fade-in-section{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease;}
.fade-in-section.visible{opacity:1;transform:translateY(0);}

/* ── FLOATING PARTICLES (hero decoration) ── */
.particles{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.particle{position:absolute;border-radius:50%;animation:floatY 4s ease-in-out infinite;opacity:.4;}
</style>

/* ══ CONTEXT ══ */
const Ctx=React.createContext();
const Provider=({children})=>{
  const [lang,setLang]=useState('ckb');
  const [user,setUser]=useState(null);
  const [appReady,setAppReady]=useState(false);

  const t=k=>{const keys=k.split('.');let v=T[lang];for(const x of keys){v=v?.[x];if(v===undefined)return k;}return v;};
  const sw=l=>{setLang(l);document.documentElement.lang=l;document.documentElement.dir=l==='en'?'ltr':'rtl';window.scrollTo(0,0);};
  const isAdmin=user?.email===ADMIN_EMAIL;

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{setUser(session?.user||null);setAppReady(true);});
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));
    return()=>subscription.unsubscribe();
  },[]);

  return <Ctx.Provider value={{lang,t,sw,dir:lang==='en'?'ltr':'rtl',user,isAdmin,appReady}}>{children}</Ctx.Provider>;
};
const useApp=()=>useContext(Ctx);

/* ══ HELPERS ══ */
const tLeft=(iso,days)=>{
  const diff=new Date(iso).getTime()+days*86400000-Date.now();
  if(diff<=0)return null;
  return{d:Math.floor(diff/86400000),h:Math.floor((diff%86400000)/3600000),m:Math.floor((diff%3600000)/60000)};
};

/* ══ SECTION FADE IN (Intersection Observer) ══ */
const useFadeIn=()=>{
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');});},{threshold:.12});
    obs.observe(el);return()=>obs.disconnect();
  },[]);
  return ref;
};

/* ══ COUNTDOWN ══ */
const Countdown=({iso,days})=>{
  const {t}=useApp();
  const [tl,setTl]=useState(()=>tLeft(iso,days));
  useEffect(()=>{const id=setInterval(()=>setTl(tLeft(iso,days)),30000);return()=>clearInterval(id);},[iso,days]);
  if(!tl)return<div className="countdown"><span style={{color:'var(--muted)',fontSize:13,fontWeight:700}}>{t('expired')}</span></div>;
  return(
    <div className="countdown">
      {[{v:tl.d,l:t('days')},{v:tl.h,l:t('hrs')},{v:tl.m,l:t('min')}].map((x,i)=>(
        <React.Fragment key={i}>
          {i>0&&<span style={{color:'var(--muted)',fontWeight:900,fontSize:16,marginBottom:4}}>:</span>}
          <div className="cd-block"><div className="cd-num">{String(x.v).padStart(2,'0')}</div><div className="cd-lbl">{x.l}</div></div>
        </React.Fragment>
      ))}
    </div>
  );
};

/* ══ IMAGE GRID ══ */
const ImgGrid=({images=[],pct,expired,onImageClick})=>{
  const {dir}=useApp();

  if(!n)return<div style={{height:240,background:'var(--s2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36}}>🏷️</div>;
  const vis=Math.min(n,5);const extra=n>5?n-5:0;
  const cls=n===1?'fb1':n===2?'fb2':n===3?'fb3':n===4?'fb4':'fb5';
  return(
    <div style={{position:'relative'}}>
      {n===1
        ?<div className="fi fb1" onClick={()=>onImageClick(0)}><img src={images[0]} alt="" loading="lazy"/></div>

          {images.slice(0,vis).map((img,i)=>(
            <div key={i} className="fi" onClick={()=>onImageClick(i)}>

/* ══ LIGHTBOX ══ */
const Lightbox=({images,start,onClose})=>{
  const [i,setI]=useState(start||0);
  useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose();if(e.key==='ArrowLeft')setI(x=>(x-1+images.length)%images.length);if(e.key==='ArrowRight')setI(x=>(x+1)%images.length);};
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[images]);
  return(
    <div className="lb" onClick={onClose}>
      <button onClick={onClose} style={{position:'absolute',top:16,right:20,background:'none',border:'none',color:'#fff',fontSize:32,cursor:'pointer',zIndex:5,lineHeight:1}}>×</button>
      {images.length>1&&<div style={{position:'absolute',top:18,left:'50%',transform:'translateX(-50%)',color:'rgba(255,255,255,.6)',fontSize:13}}>{i+1}/{images.length}</div>}
      <img src={images[i]} alt="" style={{maxWidth:'92vw',maxHeight:'88vh',objectFit:'contain',borderRadius:8}} onClick={e=>e.stopPropagation()}/>
      {images.length>1&&<>
        <button onClick={e=>{e.stopPropagation();setI(x=>(x-1+images.length)%images.length);}} style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',background:'rgba(255,255,255,.1)',border:'none',color:'#fff',width:44,height:44,borderRadius:'50%',fontSize:22,cursor:'pointer'}}>‹</button>
        <button onClick={e=>{e.stopPropagation();setI(x=>(x+1)%images.length);}} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'rgba(255,255,255,.1)',border:'none',color:'#fff',width:44,height:44,borderRadius:'50%',fontSize:22,cursor:'pointer'}}>›</button>
      </>}
    </div>
  );
};

/* ══ DEAL CARD ══ */
const DealCard=({post,onDelete,onEdit,onLoginRequired})=>{
  const {t,user,isAdmin,lang}=useApp();
  const [liked,setLiked]=useState(false);
  const [likeCount,setLikeCount]=useState(post.like_count||0);
  const [lbIdx,setLbIdx]=useState(null);
  const ref=useFadeIn();
  const expired=!tLeft(post.created_at,post.discount_days);

  useEffect(()=>{
    if(!user)return;
    sb.from('likes').select('id').eq('post_id',post.id).eq('user_id',user.id).single().then(({data})=>setLiked(!!data));
  },[user,post.id]);

  const handleLike=async()=>{
    if(!user){onLoginRequired();return;}
    if(liked){await sb.from('likes').delete().eq('post_id',post.id).eq('user_id',user.id);setLikeCount(c=>c-1);setLiked(false);}
    else{await sb.from('likes').insert({post_id:post.id,user_id:user.id});setLikeCount(c=>c+1);setLiked(true);}
  };

  const handleShare=async()=>{
    const txt=post.title_ckb||post.title_en||'Bilal Bazar';
    if(navigator.share){try{await navigator.share({title:txt,url:window.location.href});}catch(e){}}
    else await navigator.clipboard?.writeText(window.location.href);
  };

  const title=lang==='ckb'?post.title_ckb:lang==='ar'?post.title_ar:post.title_en;
  const images=Array.isArray(post.images)?post.images:(typeof post.images==='string'?JSON.parse(post.images||'[]'):[]);

  return(
    <div ref={ref} className="card fade-in-section">
      <ImgGrid images={images} pct={post.discount_pct} expired={expired} onImageClick={i=>setLbIdx(i)}/>
      {lbIdx!==null&&<Lightbox images={images} start={lbIdx} onClose={()=>setLbIdx(null)}/>}
      <div style={{padding:'14px 16px 16px'}}>
        <h3 style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,lineHeight:1.35,marginBottom:10,color:'var(--text)'}}>{title||'Bilal Bazar Deal'}</h3>
        <div style={{marginBottom:12}}><Countdown iso={post.created_at} days={post.discount_days}/></div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:10,borderTop:'1px solid var(--border)'}}>
          <div style={{display:'flex',gap:8}}>
            <button onClick={handleLike} style={{display:'flex',alignItems:'center',gap:5,padding:'7px 12px',borderRadius:8,background:liked?'rgba(220,38,38,.15)':'var(--s2)',color:liked?'#f87171':'var(--muted)',border:'none',fontSize:13,fontWeight:700,cursor:'pointer',transition:'all .15s'}}>
              <i className={liked?'fas fa-heart':'far fa-heart'}/>{likeCount}
            </button>
            <button onClick={handleShare} style={{display:'flex',alignItems:'center',gap:5,padding:'7px 12px',borderRadius:8,background:'var(--s2)',color:'var(--muted)',border:'none',fontSize:13,fontWeight:700,cursor:'pointer'}}>
              <i className="fas fa-share-alt"/>{t('share')}
            </button>
          </div>
          {isAdmin&&(
            <div style={{display:'flex',gap:6}}>
              <button onClick={()=>onEdit(post)} style={{width:32,height:32,borderRadius:7,background:'rgba(59,130,246,.12)',color:'#60a5fa',border:'none',cursor:'pointer',fontSize:12}}><i className="fas fa-pencil-alt"/></button>
              <button onClick={()=>onDelete(post.id)} style={{width:32,height:32,borderRadius:7,background:'rgba(220,38,38,.12)',color:'#f87171',border:'none',cursor:'pointer',fontSize:12}}><i className="fas fa-trash"/></button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

  const [err,setErr]=useState('');

  const submit=async e=>{
    e.preventDefault();
    setLoading(true);setErr('');
    try{
      if(currentMode==='login'){
        const{error}=await sb.auth.signInWithPassword({email,password:pass});
        if(error)throw error;
      } else {
        const{error}=await sb.auth.signUp({email,password:pass});
        if(error)throw error;

            </div>
            <div style={{marginTop:16}}>
              <label style={{fontSize:13,color:'#374151',fontFamily:'Inter',marginBottom:4,display:'block'}}>Password</label>
              <input className="inp" type="password" placeholder="••••••••" value={pass} onChange={e=>setPass(e.target.value)} required style={{color:'#111'}}/>
            </div>
            {err&&<p style={{color:'#dc2626',fontSize:12,marginTop:8,fontFamily:'Inter'}}>{err}</p>}

              {loading?'...':(currentMode==='login'?'Log In':'Sign Up')}

          {/* Google Sign In */}

            Continue with Google
          </button>
        </div>
      </div>
    </div>
  );
};

/* ══ MAIN APP ══ */
const App=()=>{
  const {lang,t,dir,user,isAdmin,appReady}=useApp();
  const [posts,setPosts]=useState([]);
  const [sponsors,setSponsors]=useState([]);
  const [cat,setCat]=useState('all');
  const [visibleCount,setVisibleCount]=useState(3);
  const [postsLoading,setPostsLoading]=useState(true);
  const [activeSection,setActiveSection]=useState('hero');
  const [menuOpen,setMenuOpen]=useState(false);
  const [authMode,setAuthMode]=useState(null);
  const [showPostModal,setShowPostModal]=useState(false);
  const [editingPost,setEditingPost]=useState(null);
  const [showSponsorMgr,setShowSponsorMgr]=useState(false);
  const [loginPrompt,setLoginPrompt]=useState(false);
  const videoRef=useRef(null);

  useEffect(()=>{loadPosts();loadSponsors();},[]);
  useEffect(()=>{setVisibleCount(3);},[cat]);

  /* Ensure video plays */
  useEffect(()=>{
    const v=videoRef.current;
    if(!v)return;
    v.load();
    const play=()=>v.play().catch(()=>{});
    v.addEventListener('canplay',play,{once:true});
    return()=>v.removeEventListener('canplay',play);
  },[]);

  const loadPosts=async()=>{
    setPostsLoading(true);
    const{data}=await sb.from('posts').select('*').order('created_at',{ascending:false});
    setPosts(data||[]);setPostsLoading(false);
  };

  const loadSponsors=async()=>{
    const{data}=await sb.from('sponsors').select('*').order('id');
    setSponsors(data||[]);
  };

  const handleDelete=async id=>{
    if(!confirm(t('deletePost')+'?'))return;
    await sb.from('posts').delete().eq('id',id);
    setPosts(p=>p.filter(x=>x.id!==id));
  };

  const handlePostSaved=()=>{setShowPostModal(false);setEditingPost(null);loadPosts();};

  /* IntersectionObserver for active nav */
  useEffect(()=>{
    const ids=['hero','deals','locations','about'];
    const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)setActiveSection(e.target.id);});},{threshold:.3});
    ids.forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el);});
    return()=>obs.disconnect();
  },[]);

  const filtered=useMemo(()=>cat==='all'?posts:posts.filter(p=>p.category===cat),[posts,cat]);
  const visiblePosts=filtered.slice(0,visibleCount);
  const visibleSponsors=sponsors.filter(s=>s.visible);
  const go=id=>document.getElementById(id)?.scrollIntoView({behavior:'smooth'});

  /* ── NAV ITEMS ── */
  const navItems=[
    {id:'hero',icon:'fa-home',l:t('home')},
    {id:'deals',icon:'fa-tags',l:'Deals'},
    {id:'locations',icon:'fa-map-marker-alt',l:t('locations')},
    {id:'about',icon:'fa-info-circle',l:t('about')},
  ];

  const dealsRef=useFadeIn();
  const locRef=useFadeIn();
  const aboutRef=useFadeIn();

  return(
    <div className={dir==='rtl'?'rtl':'ltr'}>

      {/* ── HEADER ── */}
      <header style={{position:'fixed',top:0,left:0,right:0,zIndex:60,background:'rgba(7,17,31,.95)',borderBottom:'1px solid var(--border)',backdropFilter:'blur(12px)'}}>
        <div style={{maxWidth:1080,margin:'0 auto',padding:'0 16px',height:54,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:9,cursor:'pointer'}} onClick={()=>go('hero')}>
            <div style={{width:34,height:34,borderRadius:9,background:'linear-gradient(135deg,#059669,#047857)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:17,color:'#fff',flexShrink:0}}>B</div>
            <span style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:16,color:'var(--text)'}}>Bilal Bazar</span>
          </div>
          {/* Desktop nav */}
          <nav style={{display:'flex',gap:2}} className="hide-sm">
            {navItems.map(x=>(
              <button key={x.id} onClick={()=>go(x.id)} style={{background:'none',border:'none',color:activeSection===x.id?'var(--g2)':'var(--muted)',fontSize:13,fontWeight:700,padding:'6px 10px',borderRadius:7,cursor:'pointer',transition:'color .15s'}}>
                {x.l}
              </button>
            ))}
          </nav>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {isAdmin&&(
              <button onClick={()=>{setEditingPost(null);setShowPostModal(true);}} style={{background:'var(--green)',border:'none',borderRadius:8,color:'#fff',padding:'7px 12px',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:5}}>
                <i className="fas fa-plus"/><span className="hide-sm">{t('addPost')}</span>
              </button>
            )}
            {user&&!isAdmin&&<div style={{width:8,height:8,borderRadius:'50%',background:'var(--g2)'}}/>}
            <button onClick={()=>setMenuOpen(true)} style={{background:'var(--s2)',border:'1px solid var(--border)',borderRadius:9,width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text)',cursor:'pointer',fontSize:15}}>

      </header>

      {/* ── HERO WITH VIDEO ── */}

        {/* Floating particles decoration */}

              width:i%2===0?6:4,height:i%2===0?6:4,

        <div className="hero-content">

            animation:'revealFade 1s ease 1s forwards',opacity:0

          <p className="hero-desc" style={{marginBottom:32}}>
            {lang==='ckb'?'هەموو ئەوەی پێویستتە — هەر هەفتەیەک داشکاندنی نوێ':
             lang==='ar'?'كل ما تحتاجه — خصومات جديدة كل أسبوع':

          <div style={{

          <div style={{maxWidth:1080,margin:'0 auto',display:'flex',gap:10,overflowX:'auto',alignItems:'center'}} className="nosb">

      {/* ── FOOTER ── */}
      <footer style={{background:'#05091a',borderTop:'1px solid var(--border)',padding:'32px 16px 72px',textAlign:'center'}}>
        <div className="heading" style={{fontSize:26,marginBottom:4,background:'linear-gradient(120deg,#fff,var(--g2))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>Bilal Bazar</div>
        <div style={{fontSize:9,fontWeight:700,letterSpacing:2,color:'var(--green)',marginBottom:14}}>ERBIL · KURDISTAN</div>
        <p style={{fontSize:13,color:'var(--muted)',marginBottom:16,maxWidth:320,margin:'0 auto 16px',lineHeight:1.7}}>
          {lang==='ckb'?'بازاڕی متمانەپێکراوی ناوچەی کوردستان':lang==='ar'?'السوق الموثوق في إقليم كردستان':'The Trusted Market of Kurdistan Region'}
        </p>
        <div style={{marginBottom:16}}>
          <a href="https://wa.me/9647509193030" target="_blank" rel="noreferrer" style={{display:'inline-flex',alignItems:'center',gap:8,background:'rgba(37,211,102,.1)',border:'1px solid rgba(37,211,102,.2)',borderRadius:8,padding:'9px 18px',color:'#25d366',textDecoration:'none',fontSize:14,fontWeight:700}}>
            <i className="fab fa-whatsapp"/>WhatsApp
          </a>
        </div>
        <p style={{fontSize:11,color:'#1a2a40'}}>{t('copyright')}</p>
      </footer>

      {/* ── MOBILE BOTTOM NAV ── */}
      <div className="mob-nav">
        {navItems.map(x=>(
          <button key={x.id} className={`mob-btn${activeSection===x.id?' act':''}`} onClick={()=>go(x.id)}>
            <i className={`fas ${x.icon}`} style={{fontSize:18}}/>
            {x.l}
          </button>
        ))}
        <button className="mob-btn" onClick={()=>setMenuOpen(true)}>
          <i className="fas fa-bars" style={{fontSize:18}}/>{t('menu')}
        </button>
      </div>

      {/* ── FLOATING BUTTONS ── */}
      <a href="https://wa.me/9647509193030" target="_blank" rel="noreferrer"
        style={{position:'fixed',bottom:68,right:16,width:50,height:50,borderRadius:'50%',background:'#25d366',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:22,zIndex:45,boxShadow:'0 4px 18px rgba(37,211,102,.45)',textDecoration:'none'}}>
        <i className="fab fa-whatsapp"/>
      </a>
      {isAdmin&&(
        <button onClick={()=>{setEditingPost(null);setShowPostModal(true);}}
          style={{position:'fixed',bottom:68,left:16,width:50,height:50,borderRadius:'50%',background:'linear-gradient(135deg,#dc2626,#f97316)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:22,zIndex:45,cursor:'pointer',boxShadow:'0 4px 18px rgba(220,38,38,.45)'}}>
          <i className="fas fa-plus"/>
        </button>
      )}

      {/* ── MODALS ── */}
      {menuOpen&&<MenuDrawer onClose={()=>setMenuOpen(false)} onShowAuth={m=>setAuthMode(m)} setShowSponsorMgr={setShowSponsorMgr} onAddPost={()=>{setEditingPost(null);setShowPostModal(true);}}/>}
      {authMode&&<AuthModal mode={authMode} onClose={()=>setAuthMode(null)} onSuccess={()=>setAuthMode(null)}/>}
      {loginPrompt&&(
        <div className="modal-bg" onClick={()=>setLoginPrompt(false)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()} style={{maxWidth:340}}>
            <div style={{padding:28,textAlign:'center'}}>
              <div style={{fontSize:40,marginBottom:12}}>❤️</div>
              <h3 className="heading" style={{fontSize:18,marginBottom:8}}>{t('loginToLike')}</h3>
              <div style={{display:'flex',gap:8,marginTop:16}}>
                <button className="btn btn-green" style={{flex:1,justifyContent:'center'}} onClick={()=>{setLoginPrompt(false);setAuthMode('login');}}>{t('signIn')}</button>
                <button className="btn btn-ghost" style={{flex:1,justifyContent:'center'}} onClick={()=>{setLoginPrompt(false);setAuthMode('signup');}}>{t('signUp')}</button>
              </div>
            </div>
          </div>
        </div>
      )}
      {showPostModal&&<PostModal editingPost={editingPost} onSave={handlePostSaved} onClose={()=>{setShowPostModal(false);setEditingPost(null);}}/>}
      {showSponsorMgr&&<SponsorMgr sponsors={sponsors} onUpdate={s=>setSponsors(s)} onClose={()=>setShowSponsorMgr(false)}/>}
    </div>
  );
};

const Root=()=><Provider><App/></Provider>;
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
