/* ───────────────────────────────────────────
   BILAL BAZAR  –  DESIGN TOKENS
─────────────────────────────────────────── */
:root{
  --bg:#060a08; --surface:#0e1712; --elevated:#131e17;
  --border:#1c2d22; --border2:#253d2d;
  --text:#dff0e8; --muted:#5a8a6e; --soft:#98c4aa;
  --accent:#10b981; --accent2:#059669; --accent3:#6ee7b7;
  --danger:#ef4444; --danger2:#b91c1c;
  --r:10px; --r2:14px; --r3:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit','Noto Sans Arabic',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}
button,input,textarea{font-family:inherit}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
.rtl{direction:rtl} .ltr{direction:ltr}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent2);border-radius:2px}
.nsb::-webkit-scrollbar{display:none}
.nsb{-ms-overflow-style:none;scrollbar-width:none}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%,100%{background-position:200% 0}50%{background-position:-200% 0}}
@keyframes glow{0%,100%{opacity:.55}50%{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes slideR{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:none}}
@keyframes slideL{from{opacity:0;transform:translateX(-100%)}to{opacity:1;transform:none}}

/* sponsor: slide in from left → hold → slide out left */
@keyframes spShow{
  0%  {opacity:0;transform:translateX(-72px) scale(.96)}
  14% {opacity:1;transform:translateX(0) scale(1)}
  82% {opacity:1;transform:translateX(0) scale(1)}
  100%{opacity:0;transform:translateX(-72px) scale(.96)}
}

/* ── UTILITIES ── */
.c{max-width:1100px;margin:0 auto;padding:0 16px}
.flex{display:flex} .col{flex-direction:column}
.ac{align-items:center} .jb{justify-content:space-between} .jc{justify-content:center}
.gap1{gap:4px} .gap2{gap:8px} .gap3{gap:12px} .gap4{gap:16px} .wrap{flex-wrap:wrap}
.f1{flex:1} .wf{width:100%}
.g2{display:grid;grid-template-columns:repeat(2,1fr)}
.g3{display:grid;grid-template-columns:repeat(3,1fr)}
@media(min-width:560px){.sg2{grid-template-columns:repeat(2,1fr)}}
@media(min-width:820px){.mg3{grid-template-columns:repeat(3,1fr)}}
.rel{position:relative} .abs{position:absolute} .fix{position:fixed}
.inset{inset:0} .ov-h{overflow:hidden} .ov-ya{overflow-y:auto}
.tc{text-align:center} .muted{color:var(--muted)} .accent{color:var(--accent)}
.bold{font-weight:700} .xbold{font-weight:900} .sm{font-size:12px} .xs{font-size:11px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--r);border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;text-decoration:none}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#02140d}
.btn-p:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-1px)}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-g:hover{border-color:var(--accent);color:var(--text)}
.btn-d{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.22)}
.btn-d:hover{background:rgba(239,68,68,.2)}

/* ── BADGE / CARD / INPUT ── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(16,185,129,.1);color:var(--accent);border:1px solid rgba(16,185,129,.18)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:transform .2s,border-color .2s,box-shadow .2s}
.card:hover{border-color:rgba(16,185,129,.28);box-shadow:0 12px 40px rgba(0,0,0,.48);transform:translateY(-3px)}
.inp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);padding:11px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;font-family:inherit}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--muted)}

/* ── TOAST ── */
.toast-wrap{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:700;min-width:190px;text-align:center;animation:toastIn .3s ease;pointer-events:none;backdrop-filter:blur(8px)}
.t-ok{background:rgba(16,185,129,.18);border:1px solid rgba(16,185,129,.3);color:var(--accent3)}
.t-err{background:rgba(239,68,68,.18);border:1px solid rgba(239,68,68,.28);color:#fca5a5}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(7px);z-index:80;display:flex;align-items:flex-end;justify-content:center}

.mbox{background:var(--elevated);border:1px solid var(--border);width:100%;max-width:500px;max-height:93vh;overflow-y:auto;border-radius:var(--r3) var(--r3) 0 0;animation:slideUp .24s ease}
@media(min-width:540px){.mbox{border-radius:var(--r3);animation:scaleIn .2s ease}}
.mhdr{position:sticky;top:0;z-index:2;background:var(--elevated);padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mhdr h3{font-weight:800;font-size:15px}
.mbody{padding:18px 20px}

/* ── DRAWER ── */
.dov{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.8);backdrop-filter:blur(4px)}
.dpanel{position:absolute;top:0;bottom:0;width:min(290px,85vw);background:var(--surface);border-inline-end:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.rtl .dpanel{right:0;animation:slideR .22s ease}
.ltr .dpanel{left:0;animation:slideL .22s ease}
.di{display:flex;align-items:center;gap:12px;padding:13px 18px;font-size:14px;font-weight:600;color:var(--text);background:none;border:none;border-bottom:1px solid rgba(255,255,255,.04);width:100%;text-align:inherit;cursor:pointer;transition:background .12s;text-decoration:none;font-family:inherit}
.di:hover{background:var(--elevated)}
.dico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}

/* ── MOBILE NAV ── */
.mnav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(6,10,8,.97);border-top:1px solid var(--border);backdrop-filter:blur(14px);display:flex;justify-content:space-around;height:54px;padding-bottom:env(safe-area-inset-bottom)}
.mnb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--muted);background:none;border:none;cursor:pointer;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;transition:color .14s}
.mnb.act{color:var(--accent)}

/* ── SPONSOR STRIP ── */
.sp-strip{height:72px;background:var(--surface);border-bottom:1px solid var(--border);position:relative;overflow:hidden;z-index:41;display:flex;align-items:center;justify-content:center}
@media(min-width:640px){.sp-strip{height:96px}}
.sp-slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:8px 24px}
.sp-slide img{max-height:100%;max-width:100%;object-fit:contain;border-radius:6px}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:40;background:rgba(6,10,8,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}

/* ── HERO: THE KEY FIX ── */
/* hero wrapper fills viewport */
#hero{position:relative;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden}
/* video fills entire hero, z-index 0 */
.hero-vid{position:absolute;inset:0;z-index:0}
.hero-vid video{width:100%;height:100%;object-fit:cover;object-position:center;display:block;pointer-events:none}
/* dark overlay sits on top of video */
.hero-vid::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(4,9,6,.82) 0%,rgba(4,9,6,.32) 44%,rgba(4,9,6,.88) 100%)}
/* content must be above both video (0) and overlay (1) */
.hero-body{position:relative;z-index:2;text-align:center;padding:108px 20px 88px;max-width:860px;margin:0 auto;width:100%}
.hero-title{font-weight:900;font-size:clamp(46px,9.5vw,100px);letter-spacing:-2px;line-height:.93;background:linear-gradient(130deg,#fff 0%,#aaf0d0 38%,var(--accent) 65%,#fff 100%);background-size:280% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fadeUp .7s ease .1s both}
.hero-sub{font-weight:900;font-size:clamp(15px,2.8vw,22px);color:rgba(245,212,96,.84);margin-top:10px;font-family:'Noto Sans Arabic',sans-serif;animation:fadeUp .7s ease .36s both}
.hero-desc{color:rgba(214,236,255,.6);font-size:clamp(13px,2vw,15px);line-height:1.78;margin:14px auto 34px;max-width:500px;animation:fadeUp .7s ease .58s both}
.hero-btns{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;animation:fadeUp .7s ease .78s both}
.hero-stats{display:flex;gap:40px;justify-content:center;margin-top:52px;flex-wrap:wrap;animation:fadeUp .7s ease .98s both}

.pimg{position:relative}
.fi{background:var(--border);overflow:hidden;cursor:pointer}
.fi img{width:100%;height:100%;object-fit:cover;transition:transform .32s}

.g1{height:238px}
.g2i{display:grid;grid-template-columns:1fr 1fr;gap:2px;height:198px}
.g3i{display:grid;grid-template-columns:1.7fr 1fr;grid-template-rows:1fr 1fr;gap:2px;height:218px}
.g3i .fi:first-child{grid-row:1/3}
.g4i{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;height:218px}
.g5i{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;gap:2px;height:198px}

.cm-list{display:flex;flex-direction:column;gap:6px;max-height:130px;overflow-y:auto}
.cm-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.cm-meta{font-size:10px;color:var(--muted);margin-bottom:3px}

.sk{background:linear-gradient(90deg,var(--border) 25%,var(--elevated) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}

/* ── SECTION TITLE ── */

/* ── LOCATION CARD ── */
.lcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px;text-decoration:none;color:inherit;display:block;transition:transform .2s,border-color .2s,box-shadow .2s}

/* ── ABOUT FEATS ── */
.feats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:28px}
.feat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px 14px;width:138px;text-align:center;transition:border-color .2s}
.feat:hover{border-color:var(--accent)}
.feat-ico{width:40px;height:40px;border-radius:10px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.18);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:17px;color:var(--accent)}

/* ── FAB ── */
.fab-wa{position:fixed;bottom:66px;right:16px;width:50px;height:50px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;z-index:45;box-shadow:0 4px 20px rgba(37,211,102,.4);transition:transform .18s;text-decoration:none}

.fab-add:hover{transform:scale(1.1) rotate(90deg)}

/* ── DIVIDER ── */
.div{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .hd{display:none!important}
  .g1{height:190px!important}
  .g2i,.g3i,.g4i,.g5i{height:168px!important}
  .hero-body{padding:88px 16px 68px!important}
  .hero-stats{gap:22px!important}
  .sp-strip{height:60px!important}
}
@media(min-width:641px){.md{display:none!important}}
</style>

/* ══ CONTEXT ══ */
const Ctx=React.createContext();
function Provider({children}){
  const[lang,setLang]=useState('ckb');
  const[user,setUser]=useState(null);
  const[ready,setReady]=useState(false);
  const[toasts,setToasts]=useState([]);

  const t=useCallback(k=>{
    const keys=k.split('.');let v=TX[lang];
    for(const x of keys){if(v==null)return k;v=v[x]}
    return v==null?k:String(v);
  },[lang]);

  const toast=useCallback((msg,ok=true)=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,msg,ok}]);
    setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),3400);
  },[]);

  const sw=useCallback(l=>{
    setLang(l);
    document.documentElement.lang=l;
    document.documentElement.dir=l==='en'?'ltr':'rtl';
  },[]);

  useEffect(()=>{
    /* clean OAuth hash errors from URL */
    if(window.location.hash&&window.location.hash.includes('error')){
      const p=new URLSearchParams(window.location.hash.slice(1));
      const e=p.get('error_description')||p.get('error')||'Auth error';
      toast(decodeURIComponent(e.replace(/\+/g,' ')),false);
      window.history.replaceState(null,'',window.location.pathname);
    }
    SB.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user||null);setReady(true);
    });
    const{data:{subscription}}=SB.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));
    return()=>subscription.unsubscribe();
  },[]);

  const isAdmin=user?.email===ADMIN;
  const dir=lang==='en'?'ltr':'rtl';
  return(<Ctx.Provider value={{lang,t,sw,dir,user,isAdmin,ready,toast}}>{children}<Toasts toasts={toasts}/></Ctx.Provider>);
}
const useApp=()=>useContext(Ctx);

/* ══ HELPERS ══ */
function tleft(iso,days){
  const d=new Date(iso).getTime()+days*86400000-Date.now();
  if(d<=0)return null;
  return{d:Math.floor(d/86400000),h:Math.floor(d%86400000/3600000),m:Math.floor(d%3600000/60000)};
}
function parseImgs(v){try{return Array.isArray(v)?v:JSON.parse(v||'[]')}catch{return[]}}

/* Upload blob → Supabase Storage; if bucket error falls back to base64 */
async function upload(bucket,blob){
  const name=`${Date.now()}_${Math.random().toString(36).slice(2,7)}.jpg`;
  try{
    const{error}=await SB.storage.from(bucket).upload(name,blob,{contentType:'image/jpeg'});
    if(error)throw error;
    return SB.storage.from(bucket).getPublicUrl(name).data.publicUrl;
  }catch{
    return new Promise((res,rej)=>{
      const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(blob);
    });
  }
}

  );
}

/* ══ CROP MODAL ══ */
function CropModal({file,aspect,onDone,onClose}){
  const{t}=useApp();
  const[img,setImg]=useState(null);
  const[crop,setCrop]=useState({x:0,y:0});
  const[drag,setDrag]=useState(false);
  const dr=useRef({sx:0,sy:0,cx:0,cy:0});
  const sr=useRef({rw:320,rh:320,cw:320,ch:320,scale:1});

  useEffect(()=>{
    if(!file)return;
    const url=URL.createObjectURL(file);
    const im=new Image();
    im.onload=()=>{
      const nw=im.naturalWidth,nh=im.naturalHeight;
      const maxW=Math.min(window.innerWidth-50,420);
      const sc=Math.min(maxW/nw,320/nh,1);
      const rw=Math.round(nw*sc),rh=Math.round(nh*sc);
      let cw,ch;
      if(aspect>=(rw/rh)){cw=rw;ch=Math.max(1,Math.round(rw/aspect))}
      else{ch=rh;cw=Math.max(1,Math.round(rh*aspect))}
      sr.current={rw,rh,cw,ch,scale:sc};
      setImg(im);setCrop({x:Math.round((rw-cw)/2),y:Math.round((rh-ch)/2)});
    };
    im.src=url;
    return()=>URL.revokeObjectURL(url);
  },[file,aspect]);

  const getXY=e=>e.touches?{cx:e.touches[0].clientX,cy:e.touches[0].clientY}:{cx:e.clientX,cy:e.clientY};
  const onS=e=>{setDrag(true);const{cx,cy}=getXY(e);dr.current={sx:cx,sy:cy,cx:crop.x,cy:crop.y}};
  const onM=e=>{if(!drag)return;const{cx,cy}=getXY(e);const dx=cx-dr.current.sx,dy=cy-dr.current.sy;const{rw,rh,cw,ch}=sr.current;setCrop({x:Math.max(0,Math.min(rw-cw,dr.current.cx+dx)),y:Math.max(0,Math.min(rh-ch,dr.current.cy+dy))})};
  const onE=()=>setDrag(false);

  const confirm=()=>{
    if(!img)return;
    const{scale,cw,ch}=sr.current;
    const sx=crop.x/scale,sy=crop.y/scale,sw=cw/scale,sh=ch/scale;
    const outW=Math.min(aspect>=4?1600:1200,Math.round(sw));
    const outH=Math.round(outW/aspect);
    const cv=document.createElement('canvas');cv.width=outW;cv.height=outH;
    cv.getContext('2d').drawImage(img,sx,sy,sw,sh,0,0,outW,outH);
    cv.toBlob(b=>{if(b)onDone(b)},'image/jpeg',.92);
  };

  if(!img)return(
    <div className="ov"><div className="mbox" style={{maxWidth:320,textAlign:'center'}} onClick={e=>e.stopPropagation()}>
      <div className="mbody"><i className="fas fa-spinner fa-spin accent" style={{fontSize:28}}/><p style={{color:'var(--muted)',marginTop:12,fontSize:13}}>Loading image...</p></div>
    </div></div>
  );
  const{rw,rh,cw,ch}=sr.current;
  return(
    <div className="ov" onClick={onClose}>
      <div className="mbox" style={{maxWidth:520}} onClick={e=>e.stopPropagation()}>
        <div className="mhdr"><h3>{t('crop')}</h3><button className="btn btn-g" onClick={onClose} style={{padding:'5px 10px'}}>×</button></div>
        <div className="mbody" style={{textAlign:'center'}}>
          <p style={{fontSize:11,color:'var(--muted)',marginBottom:12}}>Drag to adjust crop area</p>
          <div style={{display:'inline-block',position:'relative',cursor:'grab',touchAction:'none',userSelect:'none'}}
            onMouseDown={onS} onMouseMove={onM} onMouseUp={onE} onMouseLeave={onE}
            onTouchStart={onS} onTouchMove={onM} onTouchEnd={onE}>
            <img src={img.src} alt="" style={{width:rw,height:rh,display:'block',borderRadius:8,maxWidth:'100%'}} draggable={false}/>
            <div style={{position:'absolute',left:crop.x,top:crop.y,width:cw,height:ch,border:'2px dashed rgba(255,255,255,.9)',boxShadow:'0 0 0 9999px rgba(0,0,0,.52)',borderRadius:4,pointerEvents:'none'}}/>
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'center',marginTop:16}}>
            <button className="btn btn-g" onClick={onClose}>{t('cancel')}</button>
            <button className="btn btn-p" onClick={confirm}>{t('upload')}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══ LIGHTBOX ══ */
function Lightbox({imgs,start,onClose}){
  const[i,setI]=useState(start);
  useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose();if(e.key==='ArrowLeft')setI(x=>(x-1+imgs.length)%imgs.length);if(e.key==='ArrowRight')setI(x=>(x+1)%imgs.length)};
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[imgs,onClose]);
  return(
    <div className="lb" onClick={onClose}>
      <button className="lbc" onClick={onClose}>×</button>
      {imgs.length>1&&<div style={{position:'absolute',top:14,left:'50%',transform:'translateX(-50%)',color:'rgba(255,255,255,.5)',fontSize:12,fontWeight:600}}>{i+1}/{imgs.length}</div>}
      <img src={imgs[i]} alt="" onClick={e=>e.stopPropagation()}/>
      {imgs.length>1&&<>
        <button className="lbn" style={{left:10}} onClick={e=>{e.stopPropagation();setI(x=>(x-1+imgs.length)%imgs.length)}}>‹</button>
        <button className="lbn" style={{right:10}} onClick={e=>{e.stopPropagation();setI(x=>(x+1)%imgs.length)}}>›</button>
      </>}
    </div>
  );
}

/* ══ COUNTDOWN ══ */
function Countdown({iso,days}){
  const{t}=useApp();
  const[tl,setTl]=useState(()=>tleft(iso,days));
  useEffect(()=>{const id=setInterval(()=>setTl(tleft(iso,days)),30000);return()=>clearInterval(id)},[iso,days]);
  if(!tl)return<span style={{fontSize:11,fontWeight:700,color:'var(--muted)'}}>{t('finished')}</span>;
  return(
    <div className="cdown">
      {[{v:tl.d,l:t('days')},{v:tl.h,l:t('hrs')},{v:tl.m,l:t('min')}].map((x,i)=>(
        <React.Fragment key={i}>
          {i>0&&<span className="cs">:</span>}
          <div className="cb"><div className="cn">{String(x.v).padStart(2,'0')}</div><div className="cl">{x.l}</div></div>
        </React.Fragment>
      ))}
    </div>
  );
}

    try{
      if(liked){
        await SB.from('likes').delete().eq('post_id',post.id).eq('user_id',user.id);
        const n=Math.max(0,likes-1);
        await SB.from('posts').update({like_count:n}).eq('id',post.id);
        setLiked(false);setLikes(n);
      }else{
        const{error}=await SB.from('likes').insert({post_id:post.id,user_id:user.id});
        if(error)throw error;
        const n=likes+1;
        await SB.from('posts').update({like_count:n}).eq('id',post.id);
        setLiked(true);setLikes(n);
      }
    }catch(e){toast(e.message||'Like failed',false)}
  };

  const handleShare=async()=>{
    if(navigator.share){try{await navigator.share({title,url:window.location.href})}catch(e){}}
    else if(navigator.clipboard){await navigator.clipboard.writeText(window.location.href);setCopied(true);setTimeout(()=>setCopied(false),2000)}
  };

  const n=imgs.length;
  const gc=n===1?'g1':n===2?'g2i':n===3?'g3i':n===4?'g4i':'g5i';
  const vis=Math.min(n,5);

  return(
    <div className="card">
      <div className="pimg">
        {n===0
          ?<div style={{height:190,background:'var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36}}>🏷️</div>
          :n===1
          ?<div className="fi g1" onClick={()=>setLb(0)}><img src={imgs[0]} alt="" loading="lazy"/></div>
          :<div className={gc}>
            {imgs.slice(0,vis).map((img,i)=>(
              <div key={i} className="fi" onClick={()=>setLb(i)}>
                <img src={img} alt="" loading="lazy"/>
                {n>5&&i===vis-1&&<div className="more-over">+{n-4}</div>}
              </div>
            ))}
          </div>
        }
        {post.discount_pct>0&&!expired&&(
          <div className={`disc${dir==='ltr'?' ltr':''}`}>
            <span style={{fontSize:13}}>{post.discount_pct}%</span>
            <span style={{fontSize:7,opacity:.88}}>OFF</span>
          </div>
        )}
        {expired&&<div className="expover"><span>{t('finished')}</span></div>}
      </div>

      {lb!==null&&<Lightbox imgs={imgs} start={lb} onClose={()=>setLb(null)}/>}

      <div style={{padding:'13px 14px 14px'}}>
        <h3 style={{fontWeight:800,fontSize:15,lineHeight:1.35,marginBottom:10,fontFamily:'Noto Sans Arabic,Outfit,sans-serif'}}>{title}</h3>
        <div style={{marginBottom:12}}><Countdown iso={post.created_at} days={post.discount_days}/></div>

        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:10,borderTop:'1px solid var(--border)',gap:4,flexWrap:'wrap'}}>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {/* LIKE */}
            <button onClick={handleLike} className="btn btn-g" style={{padding:'6px 10px',fontSize:12,gap:4,background:liked?'rgba(239,68,68,.13)':'',color:liked?'var(--danger)':'var(--muted)',borderColor:liked?'rgba(239,68,68,.3)':'var(--border)'}}>
              <i className={liked?'fas fa-heart':'far fa-heart'}/>{likes>0?` ${likes}`:''}
            </button>
            {/* SHARE */}
            <button onClick={handleShare} className="btn btn-g" style={{padding:'6px 10px',fontSize:12,gap:4}}>
              <i className="fas fa-share-alt"/>{copied&&' ✓'}
            </button>
            {/* COMMENT */}
            <button onClick={()=>setShowCmt(s=>!s)} className="btn btn-g" style={{padding:'6px 10px',fontSize:12,gap:4,color:showCmt?'var(--accent)':'var(--muted)',borderColor:showCmt?'var(--accent)':'var(--border)'}}>
              <i className="fas fa-comment-alt"/>
            </button>
          </div>
          {isAdmin&&(
            <div style={{display:'flex',gap:5}}>
              <button onClick={()=>onEdit(post)} className="btn btn-g" style={{padding:'6px 9px',fontSize:11}}><i className="fas fa-pencil-alt"/></button>
              <button onClick={()=>onDelete(post.id)} className="btn btn-d" style={{padding:'6px 9px',fontSize:11}}><i className="fas fa-trash"/></button>
            </div>
          )}
        </div>
        {showCmt&&<Comments postId={post.id} user={user}/>}
      </div>
    </div>
  );
}

/* ══ POST MODAL ══ */
function PostModal({editing,onSave,onClose}){
  const{t,toast}=useApp();
  const[imgs,setImgs]=useState(()=>editing?parseImgs(editing.images):[]);
  const[form,setForm]=useState({
    title_ckb:editing?.title_ckb||'',
    discount_pct:editing?.discount_pct??0,
    discount_days:editing?.discount_days||7,
    category:editing?.category||'rice',
  });
  const[saving,setSaving]=useState(false);
  const[cropFile,setCropFile]=useState(null);
  const[cropAsp,setCropAsp]=useState(1);
  const[upBusy,setUpBusy]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const onCropped=async blob=>{
    setCropFile(null);setUpBusy(true);
    try{const url=await upload('posts-images',blob);setImgs(p=>[...p,url]);toast('Image ready ✓');}
    catch(e){toast(e.message||'Upload failed',false);}
    setUpBusy(false);
  };

  const submit=async()=>{
    if(!form.title_ckb.trim()||imgs.length===0){toast('ناونیشان و وێنە پێویستن',false);return}
    setSaving(true);
    const payload={
      title_ckb:form.title_ckb.trim(),
      title_ar:form.title_ckb.trim(),
      title_en:form.title_ckb.trim(),
      discount_pct:+form.discount_pct,
      discount_days:+form.discount_days,
      category:form.category,
      images:JSON.stringify(imgs),
    };
    const{error}=editing
      ?await SB.from('posts').update(payload).eq('id',editing.id)
      :await SB.from('posts').insert({...payload,created_at:new Date().toISOString(),like_count:0});
    setSaving(false);
    if(error){toast(error.message,false);return}
    toast(editing?'Updated ✓':'Published ✓');onSave();
  };

  return(
    <div className="ov" onClick={onClose}>
      <div className="mbox" onClick={e=>e.stopPropagation()}>
        <div className="mhdr">
          <h3>{editing?t('edit'):t('addPost')}</h3>
          <button className="btn btn-g" onClick={onClose} style={{padding:'5px 10px'}}>×</button>
        </div>
        <div className="mbody" style={{display:'flex',flexDirection:'column',gap:16}}>

          {/* Images */}
          <div>
            <label style={{fontSize:11,fontWeight:700,color:'var(--accent)',display:'block',marginBottom:8,textTransform:'uppercase',letterSpacing:.5}}>Images *</label>
            <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4}} className="nsb">
              {imgs.map((img,i)=>(
                <div key={i} style={{position:'relative',flexShrink:0}}>
                  <img src={img} alt="" style={{width:64,height:64,objectFit:'cover',borderRadius:8,border:'1px solid var(--border)',display:'block'}}/>
                  <button onClick={()=>setImgs(p=>p.filter((_,j)=>j!==i))} style={{position:'absolute',top:-4,right:-4,width:18,height:18,borderRadius:'50%',background:'var(--danger)',color:'#fff',border:'2px solid var(--elevated)',fontSize:9,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900}}>×</button>
                </div>
              ))}
              {imgs.length<5&&(
                <label style={{width:64,height:64,borderRadius:8,border:'1.5px dashed var(--border2)',background:'var(--bg)',flexShrink:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,cursor:upBusy?'wait':'pointer'}}>
                  {upBusy?<i className="fas fa-spinner fa-spin accent"/>:<i className="fas fa-camera accent"/>}
                  <span style={{fontSize:9,color:'var(--muted)'}}>{upBusy?'...':'Add'}</span>
                  <input type="file" accept="image/*" style={{display:'none'}} disabled={upBusy} onChange={e=>{const f=e.target.files[0];if(f)setCropFile(f);}}/>
                </label>
              )}
            </div>
            {/* Crop ratio chooser */}
            <div style={{display:'flex',gap:6,marginTop:8}}>
              {[[1,'1:1'],[4/3,'4:3']].map(([r,l])=>(
                <button key={l} className={`btn ${cropAsp===r?'btn-p':'btn-g'}`} style={{padding:'5px 12px',fontSize:11,borderRadius:20}} onClick={()=>setCropAsp(r)}>{l}</button>
              ))}
            </div>
          </div>

          {cropFile&&<CropModal file={cropFile} aspect={cropAsp} onDone={onCropped} onClose={()=>setCropFile(null)}/>}

          {/* Title */}
          <div>
            <label style={{fontSize:11,fontWeight:700,color:'var(--accent)',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:.5}}>Title *</label>
            <input className="inp" dir="rtl" value={form.title_ckb} onChange={e=>set('title_ckb',e.target.value)} placeholder="بۆ نمونە: برنجی تازە — داشکاندنی ئەم هەفتەیە"/>
          </div>

          {/* Discount + Days */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',display:'block',marginBottom:5}}>Discount % <span className="accent">(0=none)</span></label>
              <input className="inp" type="number" min="0" max="99" value={form.discount_pct} onChange={e=>set('discount_pct',e.target.value)}/>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',display:'block',marginBottom:5}}>Days</label>
              <input className="inp" type="number" min="1" max="365" value={form.discount_days} onChange={e=>set('discount_days',e.target.value)}/>
            </div>
          </div>

          {/* Category */}
          <div>
            <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',display:'block',marginBottom:8}}>Category</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {CATS.filter(c=>c!=='all').map(c=>(
                <button key={c} onClick={()=>set('category',c)} className={`btn ${form.category===c?'btn-p':'btn-g'}`} style={{borderRadius:20,padding:'7px 14px',fontSize:12}}>
                  {TX.ckb.cats[c]}
                </button>
              ))}
            </div>
          </div>

          <button className="btn btn-p wf" onClick={submit} disabled={saving||!form.title_ckb.trim()||imgs.length===0} style={{padding:'13px',fontSize:14}}>
            {saving?<><i className="fas fa-spinner fa-spin"/> Saving…</>:'✓ '+t('pub')}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ══ SPONSOR MODAL ══ */
function SpModal({sponsors,onUpdate,onClose}){
  const{t,toast}=useApp();
  const[list,setList]=useState(sponsors);
  const[link,setLink]=useState('');
  const[cropFile,setCropFile]=useState(null);
  const[busy,setBusy]=useState(false);

  const onCropped=async blob=>{
    setCropFile(null);setBusy(true);
    try{
      const url=await upload('images',blob);
      const{data,error}=await SB.from('sponsors')
        .insert({image_url:url,visible:true,link_url:link.trim()||null,sort_order:list.length})
        .select().single();
      if(error)throw error;
      setList(p=>[...p,data]);setLink('');toast('Sponsor added ✓');
    }catch(e){toast(e.message||'Upload failed',false);}
    setBusy(false);
  };

  const toggle=async(id,cur)=>{
    await SB.from('sponsors').update({visible:!cur}).eq('id',id);
    setList(p=>p.map(s=>s.id===id?{...s,visible:!cur}:s));
  };
  const remove=async id=>{
    if(!window.confirm('Remove?'))return;
    await SB.from('sponsors').delete().eq('id',id);
    setList(p=>p.filter(s=>s.id!==id));
  };

  return(
    <div className="ov" onClick={onClose}>
      <div className="mbox" onClick={e=>e.stopPropagation()}>
        <div className="mhdr">
          <h3>{t('mgSp')}</h3>
          <button className="btn btn-p" style={{padding:'6px 14px',fontSize:12}} onClick={()=>{onUpdate(list);onClose()}}>✓ {t('save')}</button>
        </div>
        <div className="mbody" style={{display:'flex',flexDirection:'column',gap:14}}>
          <p style={{fontSize:11,color:'var(--muted)',lineHeight:1.5}}>Upload a wide horizontal banner (4:1 ratio). It will animate into view at the top of the page.</p>

          {/* Optional link */}
          <input className="inp" placeholder={t('spLink')} value={link} onChange={e=>setLink(e.target.value)}/>

          {/* File picker — opens crop automatically */}
          <label className="btn btn-g wf" style={{cursor:busy?'wait':'pointer',padding:'12px',gap:8}}>
            {busy?<><i className="fas fa-spinner fa-spin"/>{t('uploading')}</>:<><i className="fas fa-image"/> Select Banner Image</>}
            <input type="file" accept="image/*" style={{display:'none'}} disabled={busy} onChange={e=>{const f=e.target.files[0];if(f)setCropFile(f)}}/>
          </label>

          {cropFile&&<CropModal file={cropFile} aspect={4} onDone={onCropped} onClose={()=>setCropFile(null)}/>}

          {/* Existing sponsors */}
          {list.map(s=>(
            <div key={s.id} style={{display:'flex',alignItems:'center',gap:8,borderBottom:'1px solid var(--border)',paddingBottom:10}}>
              <img src={s.image_url} alt="" style={{width:110,height:36,objectFit:'cover',borderRadius:6,border:'1px solid var(--border)',flexShrink:0}}/>
              <div style={{flex:1,fontSize:11,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',direction:'ltr'}}>{s.link_url||'No link'}</div>
              <button className="btn btn-g" style={{padding:'5px 9px',fontSize:11,flexShrink:0}} onClick={()=>toggle(s.id,s.visible)}>{s.visible?t('hide')||'Hide':t('show')||'Show'}</button>
              <button className="btn btn-d" style={{padding:'5px 9px',fontSize:11,flexShrink:0}} onClick={()=>remove(s.id)}>×</button>
            </div>
          ))}
          {!list.length&&<p style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'16px 0'}}>No sponsors yet.</p>}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   APP
══════════════════════════════════════════════════ */
function App(){
  const{t,lang,dir,user,isAdmin,toast}=useApp();
  const[posts,setPosts]=useState([]);
  const[sponsors,setSponsors]=useState([]);
  const[cat,setCat]=useState('all');
  const[shown,setShown]=useState(3);
  const[loading,setLoading]=useState(true);
  const[active,setActive]=useState('hero');
  const[drawer,setDrawer]=useState(false);
  const[authOpen,setAuthOpen]=useState(false);
  const[postModal,setPostModal]=useState(false);
  const[editing,setEditing]=useState(null);
  const[spOpen,setSpOpen]=useState(false);
  const[needLogin,setNeedLogin]=useState(false);
  const vidRef=useRef(null);

  /* ── DATA LOADING ── */
  const loadPosts=useCallback(async()=>{
    setLoading(true);
    try{
      const{data,error}=await SB.from('posts').select('*').order('created_at',{ascending:false});
      if(error)throw error;
      setPosts(data||[]);
    }catch(e){toast('Posts failed to load. Check connection.',false)}
    setLoading(false);
  },[toast]);

  const loadSponsors=useCallback(async()=>{
    try{
      const{data}=await SB.from('sponsors').select('*').eq('visible',true).order('sort_order');
      setSponsors(data||[]);
    }catch{}
  },[]);

  useEffect(()=>{loadPosts();loadSponsors()},[]);
  useEffect(()=>{setShown(3)},[cat]);
  useEffect(()=>{const id=setInterval(loadPosts,30000);return()=>clearInterval(id)},[loadPosts]);

  /* ── VIDEO AUTOPLAY ── */
  useEffect(()=>{
    const v=vidRef.current;if(!v)return;
    /* try immediately, then on canplay, then on loadeddata */
    const tryPlay=()=>v.play().catch(()=>{});
    tryPlay();
    v.addEventListener('canplay',tryPlay,{once:true});
    v.addEventListener('loadeddata',tryPlay,{once:true});
    v.load();
    return()=>{v.removeEventListener('canplay',tryPlay);v.removeEventListener('loadeddata',tryPlay)};
  },[]);

  /* ── INTERSECTION OBSERVER (active nav) ── */
  useEffect(()=>{
    const ids=['hero','deals','locs','about'];
    const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)setActive(e.target.id)}),{threshold:.2});
    ids.forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el)});
    return()=>obs.disconnect();
  },[]);

  /* ── ACTIONS ── */
  const deletePost=async id=>{
    if(!window.confirm(t('del')+'?'))return;
    await SB.from('posts').delete().eq('id',id);
    setPosts(p=>p.filter(x=>x.id!==id));
    toast('Deleted');
  };
  const handleSaved=()=>{setPostModal(false);setEditing(null);loadPosts()};

  const filtered=useMemo(()=>cat==='all'?posts:posts.filter(p=>p.category===cat),[posts,cat]);
  const visible=filtered.slice(0,shown);
  const go=id=>document.getElementById(id)?.scrollIntoView({behavior:'smooth'});

  const nav=[
    {id:'hero',i:'fa-home',l:t('home')},
    {id:'deals',i:'fa-tags',l:'Deals'},
    {id:'locs',i:'fa-map-marker-alt',l:t('locs')},
    {id:'about',i:'fa-info-circle',l:t('about')},
  ];

  return(
    <div className={dir==='rtl'?'rtl':'ltr'}>

      {/* ── SPONSOR STRIP ── */}
      <SpStrip sponsors={sponsors}/>

      {/* ── HEADER ── */}
      <header className="hdr">
        <div className="c flex ac jb" style={{height:52}}>
          <div style={{display:'flex',alignItems:'center',gap:9,cursor:'pointer'}} onClick={()=>go('hero')}>
            <div style={{width:32,height:32,borderRadius:8,background:'linear-gradient(135deg,var(--accent),var(--accent2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:900,color:'#02140d',flexShrink:0}}>B</div>
            <div>
              <div style={{fontWeight:900,fontSize:14,color:'#fff'}}>Bilal Bazar</div>
              <div style={{fontSize:8,fontWeight:700,color:'var(--accent)',letterSpacing:2,textTransform:'uppercase'}}>Erbil · Kurdistan</div>
            </div>
          </div>

          <nav className="hd flex gap2">
            {nav.map(x=>(
              <button key={x.id} onClick={()=>go(x.id)} className="btn btn-g" style={{padding:'6px 10px',fontSize:13,color:active===x.id?'var(--accent)':'var(--muted)',borderColor:'transparent'}}>
                {x.l}
              </button>
            ))}
          </nav>

          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {isAdmin&&<button onClick={()=>{setEditing(null);setPostModal(true)}} className="btn btn-p hd" style={{padding:'7px 12px',fontSize:12}}><i className="fas fa-plus"/> {t('addPost')}</button>}
            {user&&<div style={{width:28,height:28,borderRadius:'50%',background:'var(--elevated)',border:'2px solid var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:'var(--accent)',flexShrink:0}}>{user.email[0].toUpperCase()}</div>}
            <button className="btn btn-g" style={{padding:'8px 10px'}} onClick={()=>setDrawer(true)}><i className="fas fa-bars"/></button>
          </div>
        </div>
      </header>

      {/* ═══════════════════════════════════════
          HERO — VIDEO BACKGROUND (fully fixed)
      ════════════════════════════════════════ */}
      <section id="hero">
        {/* VIDEO: position absolute, fills section, z-index 0
            Overlay ::after sits at z-index 1
            Content .hero-body at z-index 2                     */}
        <div className="hero-vid">
          <video
            ref={vidRef}
            autoPlay muted loop playsInline preload="auto"
          >
            {/* IMPORTANT: bg.mp4 must be in the same folder as index.html */}
            <source src="bg.mp4" type="video/mp4"/>
            <source src="./bg.mp4" type="video/mp4"/>
          </video>
        </div>

        {/* decorative orbs — must be z-index 2 to appear over overlay */}
        <div style={{position:'absolute',width:520,height:520,borderRadius:'50%',background:'radial-gradient(circle,rgba(16,185,129,.07),transparent 70%)',top:'6%',insetInlineEnd:'-7%',filter:'blur(72px)',animation:'glow 5s ease-in-out infinite',zIndex:2,pointerEvents:'none'}}/>
        <div style={{position:'absolute',width:380,height:380,borderRadius:'50%',background:'radial-gradient(circle,rgba(52,211,153,.05),transparent 70%)',bottom:'9%',insetInlineStart:'-5%',filter:'blur(72px)',animation:'glow 7s ease-in-out 1.5s infinite',zIndex:2,pointerEvents:'none'}}/>

        {/* hero content */}
        <div className="hero-body">
          <h1 className="hero-title">BILAL BAZAR</h1>

          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:14,margin:'10px 0'}}>
            <div style={{width:40,height:1,background:'linear-gradient(90deg,transparent,var(--accent))'}}/>
            <span style={{fontSize:9,fontWeight:700,letterSpacing:4.5,color:'var(--accent)',textTransform:'uppercase'}}>Erbil · Est. 2020</span>
            <div style={{width:40,height:1,background:'linear-gradient(90deg,var(--accent),transparent)'}}/>
          </div>

          <div className="hero-sub">
            {lang==='ckb'?'بیلال بازار':lang==='ar'?'بيلال بازار':'Bilal Bazar'}
          </div>

          <p className="hero-desc">{t('sub')}</p>

          <div className="hero-btns">
            <button onClick={()=>go('deals')} className="btn btn-p" style={{padding:'14px 30px',borderRadius:30,fontSize:15}}>
              <i className="fas fa-fire" style={{opacity:.7}}/>{' '}{t('deals')}
            </button>
            <button onClick={()=>go('locs')} className="btn btn-g" style={{padding:'14px 30px',borderRadius:30,fontSize:15,color:'#fff',borderColor:'rgba(255,255,255,.2)',background:'rgba(255,255,255,.06)'}}>
              <i className="fas fa-map-marker-alt"/>{' '}{t('stores')}
            </button>
          </div>

          <div className="hero-stats">
            {[{n:'4',l:t('br')},{n:'10K+',l:t('pr')},{n:t('wk'),l:t('dc')}].map((s,i)=>(
              <div key={i} style={{textAlign:'center'}}>
                <div style={{fontWeight:900,fontSize:28,color:'#fff',lineHeight:1}}>{s.n}</div>
                <div style={{fontSize:9,fontWeight:700,color:'var(--accent)',letterSpacing:.8,marginTop:5,textTransform:'uppercase'}}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>

        <div style={{position:'absolute',bottom:18,left:'50%',transform:'translateX(-50%)',zIndex:3,display:'flex',flexDirection:'column',alignItems:'center',gap:5,color:'rgba(255,255,255,.2)',animation:'fadeIn 1s ease 2.5s both'}}>
          <span style={{fontSize:8,letterSpacing:2.5,fontWeight:700,textTransform:'uppercase'}}>scroll</span>
          <i className="fas fa-chevron-down" style={{fontSize:10,animation:'float 2.4s ease-in-out infinite'}}/>
        </div>
      </section>

      {/* ── DEALS ── */}
      <section id="deals" style={{padding:'50px 0',background:'var(--bg)'}}>
        <div className="c">
          <div className="stitle">
            <h2>{t('dtitle')}</h2>
            <span className="badge">{filtered.length}</span>
            {isAdmin&&<button onClick={()=>{setEditing(null);setPostModal(true)}} className="btn btn-p" style={{marginInlineStart:'auto',padding:'7px 12px',fontSize:12}}><i className="fas fa-plus"/> {t('addPost')}</button>}
          </div>

          {/* Category filter */}
          <div style={{display:'flex',gap:7,overflowX:'auto',paddingBottom:14,marginBottom:22}} className="nsb">
            {CATS.map(c=>(
              <button key={c} onClick={()=>setCat(c)} className={`btn ${cat===c?'btn-p':'btn-g'}`} style={{borderRadius:22,padding:'8px 18px',fontSize:13,whiteSpace:'nowrap'}}>
                {t('cats.'+c)}
              </button>
            ))}
          </div>

          {loading?(
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
              {[1,2,3].map(i=>(<div key={i} className="card"><div className="sk" style={{height:190}}/><div style={{padding:14,display:'flex',flexDirection:'column',gap:8}}><div className="sk" style={{height:13,width:'72%'}}/><div className="sk" style={{height:11,width:'46%'}}/></div></div>))}
            </div>
          ):filtered.length===0?(
            <div style={{textAlign:'center',padding:'60px 20px',color:'var(--muted)'}}>
              <div style={{fontSize:44,marginBottom:10}}>🏷️</div>
              <p style={{fontSize:15}}>{t('noPosts')}</p>
            </div>
          ):(
            <>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
                {visible.map(post=>(
                  <DealCard key={post.id} post={post} user={user} isAdmin={isAdmin}
                    onLogin={()=>setNeedLogin(true)}
                    onDelete={deletePost}
                    onEdit={p=>{setEditing(p);setPostModal(true)}}/>
                ))}
              </div>
              {filtered.length>3&&shown<=3&&(
                <div style={{textAlign:'center',marginTop:24}}>
                  <button className="btn btn-p" style={{borderRadius:30,padding:'12px 28px'}} onClick={()=>setShown(filtered.length)}>
                    <i className="fas fa-chevron-down"/> {t('more')} ({filtered.length-3})
                  </button>
                </div>
              )}
              {shown>3&&filtered.length>3&&(
                <div style={{textAlign:'center',marginTop:24}}>
                  <button className="btn btn-g" style={{borderRadius:30,padding:'12px 28px'}} onClick={()=>setShown(3)}>
                    <i className="fas fa-chevron-up"/> {t('less')}
                  </button>
                </div>
              )}
            </>
          )}
        </div>
      </section>

      <div className="div"/>

      {/* ── LOCATIONS ── */}
      <section id="locs" style={{padding:'50px 0',background:'var(--surface)',borderTop:'1px solid var(--border)'}}>
        <div className="c">
          <div className="stitle" style={{justifyContent:'center'}}><h2>{t('ltitle')}</h2></div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:14}}>
            {LOCS.map(loc=>(
              <a key={loc.id} href={loc.link} target="_blank" rel="noopener noreferrer" className="lcard">
                <div style={{width:40,height:40,borderRadius:10,background:'rgba(16,185,129,.1)',border:'1px solid rgba(16,185,129,.18)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:14,fontSize:17}}>
                  <i className="fas fa-store accent"/>
                </div>
                <h3 style={{fontWeight:800,fontSize:14,marginBottom:5,lineHeight:1.3,fontFamily:'Noto Sans Arabic,Outfit,sans-serif'}}>{loc[lang]||loc.en}</h3>
                <p style={{fontSize:12,color:'var(--muted)',marginBottom:14,lineHeight:1.4}}>{loc.addr[lang]||loc.addr.en}</p>
                <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:14,fontSize:11,color:'var(--soft)',direction:'ltr',textAlign:'start'}}>
                  <span style={{display:'flex',alignItems:'center',gap:6}}><i className="far fa-clock accent" style={{width:14}}/>{loc.hr}</span>
                  <span style={{display:'flex',alignItems:'center',gap:6}}><i className="fas fa-phone accent" style={{width:14}}/>{loc.ph}</span>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <span className="btn btn-p f1" style={{padding:'8px',fontSize:12,borderRadius:8}}><i className="fas fa-map-marker-alt"/> {t('openMap')}</span>
                  <a href={`tel:+964${loc.ph.replace(/^0/,'').replace(/\s/g,'')}`} onClick={e=>e.stopPropagation()} className="btn btn-g" style={{padding:'8px 12px'}}><i className="fas fa-phone"/></a>
                </div>
              </a>
            ))}
          </div>
        </div>
      </section>

      <div className="div"/>

      {/* ── ABOUT ── */}
      <section id="about" style={{padding:'50px 16px',maxWidth:700,margin:'0 auto',textAlign:'center'}}>
        <div className="stitle" style={{justifyContent:'center'}}><h2>{t('atitle')}</h2></div>
        <p style={{color:'var(--soft)',fontSize:15,lineHeight:1.88}}>{t('atext')}</p>
        <div className="feats">
          {[{i:'fa-leaf',l:t('feat1')},{i:'fa-tag',l:t('feat2')},{i:'fa-award',l:t('feat3')}].map((f,i)=>(
            <div key={i} className="feat">
              <div className="feat-ico"><i className={`fas ${f.i}`}/></div>
              <div style={{fontSize:12,fontWeight:700}}>{f.l}</div>
            </div>
          ))}
        </div>
      </section>

      {/* ── FOOTER ── */}
      <footer style={{background:'var(--bg)',borderTop:'1px solid var(--border)',padding:'36px 16px 74px',textAlign:'center'}}>
        <div style={{fontWeight:900,fontSize:28,marginBottom:5,background:'linear-gradient(120deg,#fff,var(--accent))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Bilal Bazar</div>
        <div style={{fontSize:8,fontWeight:700,letterSpacing:3,color:'var(--accent)',marginBottom:8,textTransform:'uppercase'}}>ERBIL · KURDISTAN</div>
        <div style={{fontFamily:'Noto Sans Arabic',fontSize:14,color:'var(--muted)',marginBottom:20}}>
          {lang==='ckb'?'بیلال بازار':lang==='ar'?'بيلال بازار':'Bilal Bazar'}
        </div>
        <a href="https://wa.me/9647509193030" target="_blank" rel="noreferrer" className="btn btn-g" style={{borderRadius:12,padding:'10px 22px',color:'#25d366',borderColor:'rgba(37,211,102,.2)',display:'inline-flex',gap:8,marginBottom:18}}>
          <i className="fab fa-whatsapp" style={{fontSize:17}}/> WhatsApp
        </a>
        <p style={{fontSize:10,color:'var(--border2)'}}>{t('copy')}</p>
      </footer>

      {/* ── MOBILE NAV ── */}
      <div className="mnav md">
        {nav.map(x=>(
          <button key={x.id} className={`mnb ${active===x.id?'act':''}`} onClick={()=>go(x.id)}>
            <i className={`fas ${x.i}`} style={{fontSize:20}}/>{x.l}
          </button>
        ))}
        <button className="mnb" onClick={()=>setDrawer(true)}>
          <i className="fas fa-bars" style={{fontSize:20}}/>{t('menu')}
        </button>
      </div>

      {/* ── FABs ── */}
      <a href="https://wa.me/9647509193030" target="_blank" rel="noreferrer" className="fab-wa"><i className="fab fa-whatsapp"/></a>
      {isAdmin&&<button className="fab-add" onClick={()=>{setEditing(null);setPostModal(true)}}><i className="fas fa-plus"/></button>}

      {/* ── MODALS ── */}
      {drawer&&<Drawer onClose={()=>setDrawer(false)} onAuth={()=>setAuthOpen(true)} onAdd={()=>{setEditing(null);setPostModal(true)}} onSp={()=>setSpOpen(true)}/>}
      {authOpen&&<AuthModal onClose={()=>setAuthOpen(false)}/>}
      {postModal&&<PostModal editing={editing} onSave={handleSaved} onClose={()=>{setPostModal(false);setEditing(null)}}/>}
      {spOpen&&<SpModal sponsors={sponsors} onUpdate={s=>{setSponsors(s);loadSponsors()}} onClose={()=>setSpOpen(false)}/>}

      {/* Need-login nudge */}
      {needLogin&&(
        <div className="ov" onClick={()=>setNeedLogin(false)}>
          <div className="mbox" style={{maxWidth:320}} onClick={e=>e.stopPropagation()}>
            <div className="mbody" style={{textAlign:'center'}}>
              <div style={{fontSize:42,marginBottom:10}}>❤️</div>
              <h3 style={{fontWeight:800,fontSize:17,marginBottom:6}}>{t('loginFirst')}</h3>
              <p style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>تۆمار بکە یان بچۆ ژوورەوە بۆ دڵنیاکردن</p>
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-p f1" onClick={()=>{setNeedLogin(false);setAuthOpen(true)}}>{t('login')}</button>
                <button className="btn btn-g f1" onClick={()=>{setNeedLogin(false);setAuthOpen(true)}}>{t('signup')}</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const Root=()=><Provider><App/></Provider>;
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
