<style>
/* ═══════════════════════════════════════════
   BILAL BAZAR — PROFESSIONAL DARK THEME
═══════════════════════════════════════════ */
:root{
  --bg:    #040d08;
  --dark:  #061210;
  --card:  #081812;
  --mid:   #0c2018;
  --lift:  #102818;
  --rim:   #163825;
  --rim2:  #1c4830;
  --muted: #3a6a50;
  --soft:  #68a880;
  --text:  #d4eee2;
  --white: #eef8f2;
  --gold:  #05875a;
  --gold2: #0fa870;
  --gold3: #5ddda0;
  --teal:  #037a52;
  --teal2: #2ed48a;
  --red:   #c0392b;
  --red2:  #e74c3c;
  --green: #05875a;
  --r:     10px;
  --r2:    16px;
  --r3:    22px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Inter','Noto Sans Arabic',sans-serif;
  background:var(--bg);color:var(--text);
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
}
.rtl{direction:rtl;} .ltr{direction:ltr;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--gold2);border-radius:2px;}
.nsb::-webkit-scrollbar{display:none;} .nsb{-ms-overflow-style:none;scrollbar-width:none;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes shimmer{0%{background-position:200% center;}100%{background-position:-200% center;}}
@keyframes glow{0%,100%{opacity:.5;}50%{opacity:1;}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94);}to{opacity:1;transform:scale(1);}}
@keyframes slideRight{from{opacity:0;transform:translateX(100%);}to{opacity:1;transform:translateX(0);}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-100%);}to{opacity:1;transform:translateX(0);}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
@keyframes marquee{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}

/* ── REVEAL ON SCROLL ── */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease;}
.reveal.vis{opacity:1;transform:none;}

/* ── HERO VIDEO ── */
#hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.vbg{position:absolute;inset:0;z-index:0;}
.vbg video{width:100%;height:100%;object-fit:cover;opacity:.35;}
.vbg::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 30%, rgba(5,135,90,.08) 0%, transparent 70%),
    linear-gradient(to bottom, rgba(4,13,8,.7) 0%, rgba(4,13,8,.1) 40%, rgba(4,13,8,.92) 100%);
}

/* ── HERO TITLE ── */
.hero-title{
  font-family:'Inter',sans-serif;font-weight:900;
  font-size:clamp(52px,10vw,96px);
  letter-spacing:-2px;line-height:.95;
  background:linear-gradient(120deg,#fff 0%,#c8f5e0 25%,var(--gold2) 52%,#fff 72%,var(--gold3) 100%);
  background-size:260% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:fadeUp .7s ease .2s both, shimmer 6s linear infinite;
}
.hero-sub{
  font-family:'Noto Sans Arabic',sans-serif;font-weight:900;
  font-size:clamp(15px,2.8vw,22px);
  color:rgba(240,200,100,.82);
  animation:fadeUp .7s ease .45s both;
  letter-spacing:1px;
}
.hero-desc{
  color:rgba(210,235,255,.65);
  font-size:clamp(13px,2vw,15px);
  line-height:1.8;font-weight:400;
  animation:fadeUp .7s ease .68s both;
}

/* ── ORB GLOW ── */
.orb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(80px);}

/* ── SPONSOR BANNER ── */
.sp-banner{
  position:relative;overflow:hidden;
  background:var(--dark);
  border-bottom:1px solid var(--rim);
  height:52px;display:flex;align-items:center;
}
.sp-marquee-wrap{display:flex;overflow:hidden;width:100%;height:100%;}
.sp-marquee{display:flex;gap:0;animation:marquee 22s linear infinite;width:max-content;}
.sp-marquee:hover{animation-play-state:paused;}
.sp-img-item{
  height:52px;min-width:160px;max-width:240px;flex-shrink:0;
  border-inline-end:1px solid var(--rim);
  display:flex;align-items:center;justify-content:center;
  padding:6px 16px;overflow:hidden;
}
.sp-img-item img{height:36px;width:auto;max-width:100%;object-fit:contain;filter:brightness(.9) contrast(1.05);}

/* ── HEADER ── */
.hdr{
  position:sticky;top:0;z-index:60;
  background:rgba(4,13,8,.96);
  border-bottom:1px solid var(--rim);
  backdrop-filter:blur(16px);
}

/* ── CARDS ── */
.card{
  background:var(--card);border:1px solid var(--rim);
  border-radius:var(--r2);overflow:hidden;
  transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;
}
.card:hover{
  transform:translateY(-5px);
  box-shadow:0 20px 52px rgba(0,0,0,.55),0 0 30px rgba(10,160,100,.08);
  border-color:rgba(10,160,100,.28);
}

/* ── DISCOUNT BADGE (circular) ── */
.disc-badge{
  position:absolute;top:10px;right:10px;z-index:6;
  background:linear-gradient(135deg,var(--red),var(--red2));
  color:#fff;
  width:46px;height:46px;
  border-radius:50%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-weight:900;font-size:13px;line-height:1;
  box-shadow:0 4px 14px rgba(192,57,43,.55);
  animation:pulse 2.5s ease-in-out infinite;
  text-align:center;
}
.disc-badge .pct{font-size:14px;font-weight:900;}
.disc-badge .off{font-size:7px;font-weight:700;letter-spacing:.3px;opacity:.9;}

/* ── IMAGE GRID ── */
.fb1 .fi{height:260px;}
.fb2{display:grid;grid-template-columns:1fr 1fr;gap:2px;height:220px;}
.fb3{display:grid;grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr;gap:2px;height:240px;}
.fb3 .fi:first-child{grid-row:1/3;}
.fb4{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;height:240px;}
.fb5{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;gap:2px;height:220px;}
.fi{overflow:hidden;position:relative;background:var(--mid);cursor:pointer;}
.fi img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s ease;}
.fi:hover img{transform:scale(1.06);}
.fi-more{position:absolute;inset:0;background:rgba(4,13,8,.6);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;}

/* ── COUNTDOWN ── */
.cdown{
  display:inline-flex;align-items:center;gap:4px;
  padding:6px 12px;border-radius:8px;
  background:rgba(10,160,100,.07);border:1px solid rgba(10,160,100,.16);
}
.cdb{text-align:center;min-width:26px;}
.cdn{font-weight:900;font-size:16px;line-height:1;color:#fff;}
.cdl{font-size:7px;color:var(--gold2);text-transform:uppercase;letter-spacing:.8px;margin-top:1px;}
.cds{color:rgba(10,160,100,.45);font-weight:900;font-size:14px;align-self:center;margin-bottom:3px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border:none;border-radius:var(--r);font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;transition:all .16s ease;text-decoration:none;}
.btn:disabled{opacity:.42;cursor:not-allowed;transform:none!important;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;box-shadow:0 4px 16px rgba(10,160,100,.3);}
.btn-gold:hover:not(:disabled){box-shadow:0 6px 26px rgba(10,160,100,.45);transform:translateY(-1px);}
.btn-dark{background:var(--mid);color:var(--text);border:1px solid var(--rim);}
.btn-dark:hover{border-color:var(--gold2);color:var(--gold2);}
.btn-ghost{background:transparent;color:var(--soft);border:1px solid var(--rim);}
.btn-ghost:hover{color:var(--text);border-color:var(--gold2);background:var(--mid);}
.btn-red{background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;box-shadow:0 4px 14px rgba(192,57,43,.28);}

/* ── INPUTS ── */
.inp{width:100%;background:var(--bg);border:1.5px solid var(--rim);border-radius:var(--r);padding:11px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--gold2);}
.inp::placeholder{color:var(--muted);}

/* ── AUTH INPUTS ── */
.ainp{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:11px 14px;color:#1a202c;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:all .2s;}
.ainp:focus{border-color:#0fa870;box-shadow:0 0 0 3px rgba(15,168,112,.1);}
.ainp::placeholder{color:#94a3b8;font-size:13px;}

/* ── DARK MODAL ── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:90;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(7px);}
@media(min-width:640px){.mbg{align-items:center;padding:20px;}}
.mbox{background:var(--card);border:1px solid var(--rim);border-radius:var(--r3) var(--r3) 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;box-shadow:0 -14px 52px rgba(0,0,0,.65);animation:slideUp .24s ease;}
@media(min-width:640px){.mbox{border-radius:var(--r3);animation:scaleIn .22s ease;}}
.mhdr{position:sticky;top:0;z-index:2;background:var(--card);padding:16px 20px;border-bottom:1px solid var(--rim);display:flex;align-items:center;justify-content:space-between;}
.mhdr h3{font-weight:800;font-size:15px;color:var(--white);}

/* ── AUTH MODAL ── */
.abg{position:fixed;inset:0;background:rgba(0,0,0,.86);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px);}
.acard{background:#fff;border-radius:20px;width:100%;max-width:380px;overflow:hidden;animation:scaleIn .23s ease;box-shadow:0 32px 80px rgba(0,0,0,.55);}
.atop{padding:30px 30px 8px;text-align:center;}
.atop .logo-a{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#fff;margin:0 auto 14px;}
.atop h2{font-family:'Inter',sans-serif;font-weight:800;font-size:24px;color:#0f172a;margin-bottom:4px;}
.atop p{font-size:13px;color:#64748b;} .atop span{color:#0fa870;cursor:pointer;font-weight:700;}
.abody{padding:20px 30px 30px;}
.afield{margin-bottom:14px;}
.afield label{display:block;font-size:11px;font-weight:700;color:#475569;font-family:'Inter',sans-serif;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.asubmit{width:100%;padding:13px;margin-top:16px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border:none;border-radius:11px;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .16s;box-shadow:0 4px 14px rgba(15,168,112,.3);}
.asubmit:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(15,168,112,.42);}
.asubmit:disabled{opacity:.55;cursor:not-allowed;transform:none;}

/* ── DRAWER ── */
.dbg{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.78);backdrop-filter:blur(5px);}
.dpanel{position:absolute;top:0;bottom:0;width:min(290px,86vw);background:var(--dark);border-inline-end:1px solid var(--rim);display:flex;flex-direction:column;overflow-y:auto;}
.ltr .dpanel{left:0;animation:slideLeft .22s ease;}
.rtl .dpanel{right:0;animation:slideRight .22s ease;}
.di{display:flex;align-items:center;gap:13px;padding:13px 18px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;width:100%;text-align:inherit;text-decoration:none;font-family:inherit;transition:background .14s;}
.di:hover{background:var(--mid);}
.dico{width:33px;height:33px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;}

/* ── MOBILE NAV ── */
.mnav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(4,13,8,.97);border-top:1px solid var(--rim);backdrop-filter:blur(16px);display:flex;justify-content:space-around;align-items:center;height:56px;padding-bottom:env(safe-area-inset-bottom);}
.mnb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit;font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:7px 0;transition:color .15s;}
.mnb.act{color:var(--gold2);}

/* ── LIGHTBOX ── */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:300;display:flex;align-items:center;justify-content:center;}

/* ── SKELETON ── */
.sk{background:linear-gradient(90deg,var(--mid) 25%,var(--lift) 50%,var(--mid) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;}

/* ── SECTION TITLE ── */
.stitle{display:flex;align-items:center;gap:12px;}
.stitle::before{content:'';display:block;width:26px;height:2.5px;border-radius:1px;background:linear-gradient(90deg,var(--gold),var(--gold2));flex-shrink:0;}

/* ── GOLD PILL ── */
.gpill{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:18px;font-size:11px;font-weight:700;background:rgba(10,160,100,.1);border:1px solid rgba(10,160,100,.2);color:var(--gold2);}

/* ── LOCATION CARD ── */
.loccard{background:var(--card);border:1px solid var(--rim);border-radius:var(--r2);padding:20px;text-decoration:none;color:inherit;display:block;transition:all .22s ease;}
.loccard:hover{border-color:rgba(10,160,100,.35);transform:translateY(-5px);box-shadow:0 18px 46px rgba(0,0,0,.46),0 0 24px rgba(10,160,100,.08);}

/* ── CATEGORY PILLS ── */
.cat-pill{padding:8px 20px;border-radius:24px;border:none;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .18s;}
.cat-pill.act{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;box-shadow:0 4px 14px rgba(10,160,100,.3);}
.cat-pill.inact{background:var(--mid);color:var(--soft);border:1px solid var(--rim);}
.cat-pill.inact:hover{border-color:var(--gold2);color:var(--text);}

/* ── RESPONSIVE ── */
@media(max-width:640px){.hd{display:none!important;}}
@media(min-width:641px){.mnav{display:none!important;}}

/* ── ERR MSG ── */
.errmsg{background:#fef2f2;border:1px solid #fecaca;border-radius:9px;padding:9px 13px;margin-top:10px;}
.errmsg p{color:#dc2626;font-size:12px;font-family:'Inter',sans-serif;}

/* ── SUCCESS MSG ── */
.okmsg{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:9px;padding:9px 13px;margin-top:10px;}
.okmsg p{color:#15803d;font-size:12px;font-family:'Inter',sans-serif;}
</style>

   APP CONTEXT
════════════════════════════════════════ */
const Ctx=React.createContext();
const Provider=({children})=>{
  const [lang,setLang]=useState('ckb');
  const [user,setUser]=useState(null);
  const [ready,setReady]=useState(false);

  const t=useCallback(k=>{
    const keys=k.split('.');
    let v=T[lang];
    for(const x of keys){
      if(v==null)return k;
      v=v[x];
    }
    return v==null?k:String(v);
  },[lang]);

  const sw=useCallback(l=>{
    setLang(l);
    document.documentElement.lang=l;
    document.documentElement.dir=l==='en'?'ltr':'rtl';
    window.scrollTo(0,0);
  },[]);

  const isAdmin=user?.email===ADMIN_EMAIL;
  const dir=lang==='en'?'ltr':'rtl';

  useEffect(()=>{
    SB.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user||null);
      setReady(true);
    });
    const {data:{subscription}}=SB.auth.onAuthStateChange((_,s)=>{
      setUser(s?.user||null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  return(
    <Ctx.Provider value={{lang,t,sw,dir,user,isAdmin,ready}}>
      {children}
    </Ctx.Provider>
  );
};
const useApp=()=>useContext(Ctx);

/* ════ HELPERS ════ */
const tLeft=(iso,days)=>{
  const diff=new Date(iso).getTime()+days*86400000-Date.now();
  if(diff<=0)return null;
  return{d:Math.floor(diff/86400000),h:Math.floor(diff%86400000/3600000),m:Math.floor(diff%3600000/60000)};
};
const parseImgs=v=>Array.isArray(v)?v:(typeof v==='string'?JSON.parse(v||'[]'):[]);

/* ════ SCROLL REVEAL ════ */
const useReveal=()=>{
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current;
    if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){el.classList.add('vis');obs.disconnect();}},{threshold:.07});
    obs.observe(el);
    return()=>obs.disconnect();
  },[]);
  return ref;
};

/* ════════════════════════════════════════
   COUNTDOWN
════════════════════════════════════════ */
const Countdown=({iso,days})=>{
  const {t}=useApp();
  const [tl,setTl]=useState(()=>tLeft(iso,days));
  useEffect(()=>{
    const id=setInterval(()=>setTl(tLeft(iso,days)),30000);
    return()=>clearInterval(id);
  },[iso,days]);
  if(!tl)return(
    <div className="cdown">
      <span style={{color:'var(--muted)',fontSize:11,fontWeight:700}}>{t('expired')}</span>
    </div>
  );
  return(
    <div className="cdown">
      {[{v:tl.d,l:t('days')},{v:tl.h,l:t('hrs')},{v:tl.m,l:t('min')}].map((x,i)=>(
        <React.Fragment key={i}>
          {i>0&&<span className="cds">:</span>}
          <div className="cdb">
            <div className="cdn">{String(x.v).padStart(2,'0')}</div>
            <div className="cdl">{x.l}</div>
          </div>
        </React.Fragment>
      ))}
    </div>
  );
};

/* ════════════════════════════════════════

════════════════════════════════════════ */
const ImgGrid=({images,pct,expired,onImg})=>{
  const n=images.length;
  if(!n)return(
    <div style={{height:200,background:'var(--mid)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:40}}>🏷️</div>
  );
  const vis=Math.min(n,5);
  const extra=n>5?n-5:0;
  const cls=n===1?'fb1':n===2?'fb2':n===3?'fb3':n===4?'fb4':'fb5';
  return(
    <div style={{position:'relative'}}>
      {n===1
        ?<div className="fi fb1" onClick={()=>onImg(0)}><img src={images[0]} alt="" loading="lazy"/></div>
        :<div className={cls}>
          {images.slice(0,vis).map((img,i)=>(
            <div key={i} className="fi" onClick={()=>onImg(i)}>
              <img src={img} alt="" loading="lazy"/>
              {extra>0&&i===vis-1&&<div className="fi-more">+{extra+1}</div>}
            </div>
          ))}
        </div>
      }
      {/* Circular discount badge — only show if pct > 0 */}
      {pct>0&&(
        <div className="disc-badge">
          <span className="pct">{pct}%</span>
          <span className="off">OFF</span>
        </div>
      )}
      {expired&&(
        <div style={{position:'absolute',inset:0,background:'rgba(4,13,8,.68)',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)',zIndex:6}}>
          <span style={{background:'var(--red)',color:'#fff',padding:'8px 22px',borderRadius:8,fontWeight:900,fontSize:14,letterSpacing:1}}>EXPIRED</span>
        </div>
      )}
    </div>
  );
};

/* ════════════════════════════════════════
   LIGHTBOX
════════════════════════════════════════ */
const Lightbox=({images,start,onClose})=>{
  const [i,setI]=useState(start);
  useEffect(()=>{
    const h=e=>{
      if(e.key==='Escape')onClose();
      if(e.key==='ArrowLeft')setI(x=>(x-1+images.length)%images.length);
      if(e.key==='ArrowRight')setI(x=>(x+1)%images.length);
    };
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[images,onClose]);
  return(
    <div className="lb" onClick={onClose}>
      <button onClick={onClose} style={{position:'absolute',top:16,right:20,background:'rgba(255,255,255,.08)',border:'none',color:'#fff',fontSize:28,cursor:'pointer',zIndex:5,lineHeight:1,width:40,height:40,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
      {images.length>1&&<div style={{position:'absolute',top:18,left:'50%',transform:'translateX(-50%)',color:'rgba(255,255,255,.5)',fontSize:13,fontWeight:600}}>{i+1}/{images.length}</div>}
      <img src={images[i]} alt="" style={{maxWidth:'92vw',maxHeight:'88vh',objectFit:'contain',borderRadius:12}} onClick={e=>e.stopPropagation()}/>
      {images.length>1&&<>
        <button onClick={e=>{e.stopPropagation();setI(x=>(x-1+images.length)%images.length);}} style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',background:'rgba(255,255,255,.1)',border:'none',color:'#fff',width:46,height:46,borderRadius:'50%',fontSize:24,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
        <button onClick={e=>{e.stopPropagation();setI(x=>(x+1)%images.length);}} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'rgba(255,255,255,.1)',border:'none',color:'#fff',width:46,height:46,borderRadius:'50%',fontSize:24,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>
      </>}
    </div>
  );
};

const DealCard=({post,onDelete,onEdit,onNeedLogin})=>{
  const {t,user,isAdmin,lang}=useApp();
  const [liked,setLiked]=useState(false);
  const [likeCount,setLikeCount]=useState(post.like_count||0);
  const [lbIdx,setLbIdx]=useState(null);
  const ref=useReveal();
  const images=parseImgs(post.images);
  const expired=!tLeft(post.created_at,post.discount_days);
  const title=(lang==='ckb'?post.title_ckb:lang==='ar'?post.title_ar:post.title_en)||post.title_ckb||'Bilal Bazar';

  useEffect(()=>{
    if(!user)return;
    SB.from('likes').select('id').eq('post_id',post.id).eq('user_id',user.id).maybeSingle()
      .then(({data})=>setLiked(!!data));
  },[user?.id,post.id]);

  const handleLike=async()=>{
    if(!user){onNeedLogin();return;}
    if(liked){
      await SB.from('likes').delete().eq('post_id',post.id).eq('user_id',user.id);
      await SB.rpc('decrement_like_count',{post_id:post.id});
      setLikeCount(c=>Math.max(0,c-1));setLiked(false);
    }else{
      const{error}=await SB.from('likes').insert({post_id:post.id,user_id:user.id});
      if(!error){
        await SB.rpc('increment_like_count',{post_id:post.id});
        setLikeCount(c=>c+1);setLiked(true);
      }
    }
  };

  const handleShare=async()=>{
    const shareData={title:`بیلال بازار — ${title}`,url:window.location.href};
    if(navigator.share){try{await navigator.share(shareData);}catch(e){}}
    else{try{await navigator.clipboard.writeText(window.location.href);}catch(e){}}
  };

  return(
    <div ref={ref} className="card reveal" style={{animationDelay:`${Math.random()*0.15}s`}}>
      <ImgGrid images={images} pct={post.discount_pct} expired={expired} onImg={i=>setLbIdx(i)}/>
      {lbIdx!==null&&<Lightbox images={images} start={lbIdx} onClose={()=>setLbIdx(null)}/>}
      <div style={{padding:'14px 15px 15px'}}>
        <h3 style={{fontWeight:800,fontSize:15,lineHeight:1.45,marginBottom:11,color:'var(--white)',fontFamily:'Noto Sans Arabic,Inter,sans-serif'}}>{title}</h3>
        <div style={{marginBottom:12}}><Countdown iso={post.created_at} days={post.discount_days}/></div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:10,borderTop:'1px solid var(--rim)'}}>
          <div style={{display:'flex',gap:7}}>
            <button onClick={handleLike} style={{display:'flex',alignItems:'center',gap:5,padding:'7px 12px',borderRadius:8,background:liked?'rgba(192,57,43,.18)':'var(--mid)',color:liked?'#ef9a9a':'var(--soft)',border:'none',fontSize:13,fontWeight:700,cursor:'pointer',transition:'all .15s',fontFamily:'inherit'}}>
              <i className={liked?'fas fa-heart':'far fa-heart'} style={{fontSize:12}}/>{likeCount>0&&likeCount}
            </button>
            <button onClick={handleShare} style={{display:'flex',alignItems:'center',gap:5,padding:'7px 12px',borderRadius:8,background:'var(--mid)',color:'var(--soft)',border:'none',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
              <i className="fas fa-share-alt" style={{fontSize:12}}/>{t('share')}
            </button>
          </div>
          {isAdmin&&(
            <div style={{display:'flex',gap:5}}>
              <button onClick={()=>onEdit(post)} title="Edit" style={{width:32,height:32,borderRadius:7,background:'rgba(59,130,246,.12)',color:'#7ab4fa',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12}}>
                <i className="fas fa-pencil-alt"/>
              </button>
              <button onClick={()=>onDelete(post.id)} title="Delete" style={{width:32,height:32,borderRadius:7,background:'rgba(192,57,43,.12)',color:'#f08080',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12}}>
                <i className="fas fa-trash"/>
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

    title_ckb:editingPost?.title_ckb||'',

    discount_days:editingPost?.discount_days||7,
    category:editingPost?.category||'rice',
  });
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const addFiles=files=>{
    Array.from(files).forEach(f=>{
      if(f.size>5*1024*1024){setErr('وێنەکە زیاتر لە 5MB e — وێنەیەکی بچووکتر هەڵبژێرە');return;}
      const r=new FileReader();
      r.onload=e=>setImages(p=>[...p,e.target.result]);
      r.readAsDataURL(f);
    });

  const submit=async()=>{
    if(!form.title_ckb.trim()||images.length===0){setErr('* ناونیشان و وێنە پێویستن');return;}

      const{error}=await SB.from('posts').insert({...payload,created_at:new Date().toISOString(),like_count:0});

                  <img src={img} alt="" style={{width:72,height:72,objectFit:'cover',borderRadius:10,border:'1px solid var(--rim)',display:'block'}}/>
                  <button onClick={()=>setImages(p=>p.filter((_,j)=>j!==i))} style={{position:'absolute',top:-4,right:-4,background:'var(--red2)',color:'#fff',width:20,height:20,borderRadius:'50%',border:'2px solid var(--card)',fontSize:10,cursor:'pointer',lineHeight:'20px',textAlign:'center',fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>

                <input type="file" accept="image/*" multiple style={{display:'none'}} onChange={e=>addFiles(e.target.files)}/>

const SponsorMgr=({sponsors,onUpdate,onClose})=>{
  const {t}=useApp();
  const [list,setList]=useState(sponsors);
  const [url,setUrl]=useState('');

  const add=async()=>{
    if(!url.trim())return;
    const{data,error}=await SB.from('sponsors').insert({image_url:url.trim(),visible:true,type:'banner'}).select().single();
    if(data)setList(p=>[...p,data]);
    setUrl('');
  };
  const toggle=async(id,cur)=>{
    await SB.from('sponsors').update({visible:!cur}).eq('id',id);
    setList(p=>p.map(s=>s.id===id?{...s,visible:!cur}:s));
  };
  const remove=async id=>{

const AuthModal=({mode,onClose,onDone})=>{
  const {t}=useApp();
  const [m,setM]=useState(mode||'login');
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [ok,setOk]=useState('');
  const [loading,setLoading]=useState(false);

  const submit=async e=>{
    e.preventDefault();
    setLoading(true);setErr('');setOk('');
    try{
      if(m==='login'){
        const{error}=await SB.auth.signInWithPassword({email:email.trim(),password:pass});
        if(error)throw error;
        onDone?.();onClose();
      }else{
        const{data,error}=await SB.auth.signUp({email:email.trim(),password:pass});
        if(error)throw error;
        if(data?.user&&!data?.session){
          setOk('ئیمەیڵت چەک بکەرەوە — لینکی دڵنیاکردنەوەمان نێردووە.');
          setLoading(false);return;
        }
        onDone?.();onClose();
      }
    }catch(e){
      let msg=e.message||'هەڵە';
      if(msg.includes('Invalid login')||msg.includes('invalid'))msg='ئیمەیڵ یان وشەی نهێنی هەڵەیە';
      if(msg.includes('already registered'))msg='ئەم ئیمەیڵە پێشتر تۆمار کراوە. تکایە بچۆ ژوورەوە.';
      if(msg.includes('weak')||msg.includes('least 6'))msg='وشەی نهێنی دەبێت کەمی 6 پیت بێت.';
      if(msg.includes('rate'))msg='تکایە کەمێک چاوەڕێ بکە و دووبارە هەوڵبدەرەوە.';
      setErr(msg);
    }
    setLoading(false);
  };

  return(
    <div className="abg" onClick={onClose}>
      <div className="acard" onClick={e=>e.stopPropagation()}>
        <div className="atop">
          <div className="logo-a">B</div>
          <h2>{m==='login'?'چوونەژوورەوە':'تۆمارکردن'}</h2>
          <p style={{marginBottom:0}}>
            {m==='login'?'هەژمارت نییە؟':'ئایا ئەندامیتی؟'}{' '}
            <span onClick={()=>{setM(x=>x==='login'?'signup':'login');setErr('');setOk('');}}>
              {m==='login'?'تۆمارکردن':'چوونەژوورەوە'}
            </span>
          </p>
        </div>
        <div className="abody">
          <form onSubmit={submit} autoComplete="off">
            <input type="text" style={{display:'none'}} autoComplete="username"/>
            <div className="afield">
              <label>ئیمەیڵ</label>
              <input className="ainp" type="email" placeholder="you@example.com"
                value={email} onChange={e=>setEmail(e.target.value)}
                autoComplete="off" required/>
            </div>
            <div className="afield">
              <label>وشەی نهێنی</label>
              <input className="ainp" type="password" placeholder="••••••••"
                value={pass} onChange={e=>setPass(e.target.value)}
                autoComplete="new-password" required minLength={6}/>
            </div>
            {err&&<div className="errmsg"><p>{err}</p></div>}
            {ok&&<div className="okmsg"><p>{ok}</p></div>}
            <button type="submit" className="asubmit" disabled={loading}>
              {loading?<><i className="fas fa-spinner fa-spin" style={{marginInlineEnd:7}}/>چاوەڕێ بکە…</>
              :m==='login'?'چوونەژوورەوە':'دروستکردنی هەژمار'}
            </button>
          </form>
          <p style={{textAlign:'center',marginTop:16,fontSize:11,color:'#94a3b8',fontFamily:'Inter'}}>
            {m==='signup'?'By signing up you agree to our terms.':''}
          </p>
        </div>
      </div>
    </div>
  );
};

  useEffect(()=>{loadPosts();loadSponsors();},[]);
  useEffect(()=>{setShown(3);},[cat]);   // reset to 3 on cat change

  /* Video autoplay */
  useEffect(()=>{
    const v=videoRef.current;
    if(!v)return;
    const play=()=>{v.play().catch(()=>{});};
    v.addEventListener('canplay',play,{once:true});
    v.load();
    return()=>v.removeEventListener('canplay',play);
  },[]);

  /* Active section highlight */
  useEffect(()=>{
    const ids=['hero','deals','locs','about'];
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting)setActive(e.target.id);});
    },{threshold:.18});

    setLoading(true);

                <div key={i} className="card">
                  <div className="sk" style={{height:200}}/>
                  <div style={{padding:14,display:'flex',flexDirection:'column',gap:8}}>
                    <div className="sk" style={{height:14,width:'75%'}}/>
                    <div className="sk" style={{height:12,width:'50%'}}/>
                  </div>
                </div>
              ))}
            </div>
          ):filtered.length===0?(
            <div style={{textAlign:'center',padding:'64px 20px',color:'var(--muted)'}}>
              <div style={{fontSize:46,marginBottom:12}}>🏷️</div>
              <p style={{fontSize:16,fontWeight:500}}>{t('noDeals')}</p>
            </div>
          ):(
            <>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
                {visiblePosts.map(post=>(
                  <DealCard key={post.id} post={post} onDelete={deletePost} onEdit={p=>{setEditing(p);setPostModal(true);}} onNeedLogin={()=>setNeedLogin(true)}/>
                ))}
              </div>

              {/* See More button — shown when there are more than 3 and we haven't expanded yet */}
              {filtered.length>3&&shown<=3&&(
                <div style={{textAlign:'center',marginTop:28}}>
                  <button className="btn btn-gold" onClick={()=>setShown(filtered.length)} style={{padding:'12px 36px',borderRadius:30,fontSize:14}}>
                    <i className="fas fa-chevron-down" style={{marginInlineEnd:8}}/>{t('more')} ({filtered.length-3})
                  </button>
                </div>
              )}

              {/* Show Less */}
              {shown>3&&filtered.length>3&&(
                <div style={{textAlign:'center',marginTop:28}}>
                  <button className="btn btn-ghost" onClick={()=>setShown(3)} style={{padding:'12px 36px',borderRadius:30,fontSize:14}}>
                    <i className="fas fa-chevron-up" style={{marginInlineEnd:8}}/>{t('less')}
                  </button>
                </div>
              )}
            </>
          )}
        </div>
      </section>

      <div style={{height:1,background:'linear-gradient(90deg,transparent,var(--rim),transparent)'}}/>

      {/* ══ LOCATIONS ══ */}
      <section id="locs" style={{padding:'56px 16px 60px',background:'var(--dark)',borderTop:'1px solid var(--rim)'}}>
        <div ref={r2} className="reveal" style={{maxWidth:1100,margin:'0 auto'}}>
          <div className="stitle" style={{marginBottom:28,justifyContent:'center'}}>
            <h2 style={{fontWeight:900,fontSize:24,color:'var(--white)'}}>{t('ltitle')}</h2>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:14}}>
            {LOCS.map(loc=>(
              <a key={loc.id} href={loc.link} target="_blank" rel="noopener noreferrer" className="loccard">
                <div style={{width:42,height:42,borderRadius:11,background:'rgba(10,160,100,.1)',border:'1px solid rgba(10,160,100,.22)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:14,fontSize:18}}>
                  <i className="fas fa-store" style={{color:'var(--gold2)'}}/>
                </div>
                <h3 style={{fontWeight:800,fontSize:14,marginBottom:5,color:'var(--white)',lineHeight:1.38}}>{loc[lang]||loc.en}</h3>
                <p style={{fontSize:12,color:'var(--muted)',marginBottom:14,lineHeight:1.45}}>{loc.addr[lang]||loc.addr.en}</p>
                <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:14,fontSize:11,color:'var(--soft)'}}>
                  <span style={{direction:'ltr',display:'flex',alignItems:'center',gap:6}}><i className="far fa-clock" style={{color:'var(--gold2)',width:14}}/>{loc.hr}</span>
                  <span style={{direction:'ltr',display:'flex',alignItems:'center',gap:6}}><i className="fas fa-phone" style={{color:'var(--gold2)',width:14}}/>{loc.ph}</span>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <span style={{flex:1,background:'linear-gradient(135deg,var(--gold),var(--gold2))',color:'#fff',borderRadius:9,padding:'9px 8px',textAlign:'center',fontSize:12,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                    <i className="fas fa-map-marker-alt"/>{t('openMap')}
                  </span>
                  <a href={`tel:+964${loc.ph.replace(/^0/,'').replace(/\s/g,'')}`} onClick={e=>e.stopPropagation()} style={{background:'var(--mid)',border:'1px solid var(--rim)',borderRadius:9,padding:'9px 14px',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--soft)',fontSize:14,textDecoration:'none'}}>
                    <i className="fas fa-phone"/>
                  </a>
                </div>
              </a>
            ))}
          </div>
        </div>
      </section>

      <div style={{height:1,background:'linear-gradient(90deg,transparent,var(--rim),transparent)'}}/>

      {/* ══ ABOUT ══ */}
      <section id="about" style={{padding:'56px 16px 60px',maxWidth:700,margin:'0 auto',textAlign:'center'}}>
        <div ref={r3} className="reveal">
          <div className="stitle" style={{justifyContent:'center',marginBottom:18}}>
            <h2 style={{fontWeight:900,fontSize:24,color:'var(--white)'}}>{t('atitle')}</h2>
          </div>
          <p style={{color:'var(--soft)',fontSize:15,lineHeight:1.9,fontWeight:400}}>{t('atext')}</p>

          {/* Product highlights */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',gap:10,marginTop:32}}>
            {[
              {icon:'🌾',ckb:'برنج',ar:'أرز',en:'Rice'},
              {icon:'🥩',ckb:'گۆشت',ar:'لحوم',en:'Meat'},
              {icon:'🌽',ckb:'دانەوێڵە',ar:'حبوب',en:'Cereals'},
              {icon:'🫒',ckb:'روون',ar:'زيت',en:'Oil'},
              {icon:'🥛',ckb:'شیرینی',ar:'منتجات ألبان',en:'Dairy'},
              {icon:'🧴',ckb:'بستەبەند',ar:'معبأ',en:'Packaged'},
            ].map((x,i)=>(
              <div key={i} style={{background:'var(--card)',border:'1px solid var(--rim)',borderRadius:12,padding:'14px 8px',textAlign:'center',transition:'all .18s'}}
                onMouseOver={e=>{e.currentTarget.style.borderColor='var(--rim2)';e.currentTarget.style.background='var(--mid)';}}
                onMouseOut={e=>{e.currentTarget.style.borderColor='var(--rim)';e.currentTarget.style.background='var(--card)';}}>
                <div style={{fontSize:26,marginBottom:6}}>{x.icon}</div>
                <div style={{fontSize:12,fontWeight:700,color:'var(--text)'}}>{x[lang]||x.en}</div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ══ FOOTER ══ */}
      <footer style={{background:'var(--bg)',borderTop:'1px solid var(--rim)',padding:'36px 16px 72px',textAlign:'center'}}>
        <div style={{fontWeight:900,fontSize:28,marginBottom:5,background:'linear-gradient(120deg,#fff,var(--gold2))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text',fontFamily:'Inter,sans-serif'}}>Bilal Bazar</div>
        <div style={{fontSize:8,fontWeight:700,letterSpacing:3,color:'var(--gold2)',marginBottom:8,textTransform:'uppercase'}}>ERBIL · KURDISTAN</div>
        <div style={{fontFamily:'Noto Sans Arabic',fontSize:14,color:'var(--muted)',marginBottom:22}}>
          {lang==='ckb'?'بیلال بازار':lang==='ar'?'بيلال بازار':'Bilal Bazar'}
        </div>
        <a href="https://wa.me/9647509193030" target="_blank" rel="noreferrer" style={{display:'inline-flex',alignItems:'center',gap:9,background:'rgba(37,211,102,.08)',border:'1px solid rgba(37,211,102,.2)',borderRadius:12,padding:'11px 22px',color:'#25d366',textDecoration:'none',fontSize:14,fontWeight:700,marginBottom:22}}>
          <i className="fab fa-whatsapp" style={{fontSize:18}}/>WhatsApp
        </a>
        <p style={{fontSize:11,color:'var(--rim2)'}}>{t('copy')}</p>
      </footer>

      {/* ══ MOBILE BOTTOM NAV ══ */}
      <div className="mnav">
        {navItems.map(x=>(
          <button key={x.id} className={`mnb${active===x.id?' act':''}`} onClick={()=>go(x.id)}>
            <i className={`fas ${x.icon}`} style={{fontSize:19}}/>
            {x.l}
          </button>
        ))}
        <button className="mnb" onClick={()=>setDrawer(true)}>
          <i className="fas fa-bars" style={{fontSize:19}}/>{t('menu')}
        </button>
      </div>

      {/* ══ FLOATING BUTTONS ══ */}
      {/* WhatsApp */}
      <a href="https://wa.me/9647509193030" target="_blank" rel="noreferrer"
        style={{position:'fixed',bottom:68,right:16,width:52,height:52,borderRadius:'50%',background:'#25d366',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:24,zIndex:45,boxShadow:'0 4px 20px rgba(37,211,102,.42)',textDecoration:'none',transition:'transform .18s'}}
        onMouseOver={e=>e.currentTarget.style.transform='scale(1.1)'}
        onMouseOut={e=>e.currentTarget.style.transform='scale(1)'}
      ><i className="fab fa-whatsapp"/></a>

      {/* Admin add button */}
      {isAdmin&&(
        <button onClick={()=>{setEditing(null);setPostModal(true);}}
          style={{position:'fixed',bottom:68,left:16,width:52,height:52,borderRadius:'50%',background:'linear-gradient(135deg,var(--gold),var(--gold2))',border:'none',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:24,zIndex:45,cursor:'pointer',boxShadow:'0 4px 20px rgba(10,160,100,.45)',transition:'transform .18s'}}
          onMouseOver={e=>e.currentTarget.style.transform='scale(1.1) rotate(90deg)'}
          onMouseOut={e=>e.currentTarget.style.transform='scale(1) rotate(0deg)'}
        ><i className="fas fa-plus"/></button>
      )}

      {/* ══ MODALS ══ */}
      {drawer&&<Drawer onClose={()=>setDrawer(false)} onAuth={m=>setAuthMode(m)} setSpMgr={setSpMgr} onAddPost={()=>{setEditing(null);setPostModal(true);}}/>}

      {authMode&&<AuthModal mode={authMode} onClose={()=>setAuthMode(null)} onDone={()=>setAuthMode(null)}/>}

      {needLogin&&(
        <div className="mbg" onClick={()=>setNeedLogin(false)}>
          <div className="mbox" onClick={e=>e.stopPropagation()} style={{maxWidth:330}}>
            <div style={{padding:30,textAlign:'center'}}>
              <div style={{fontSize:46,marginBottom:12}}>❤️</div>
              <h3 style={{fontWeight:800,fontSize:17,marginBottom:6,color:'var(--white)'}}>{t('loginLike')}</h3>
              <p style={{fontSize:12,color:'var(--muted)',marginBottom:18}}>تۆمار بکە یان بچۆ ژوورەوە بۆ ئەوەی داشکاندنەکان دڵنیا بکەیت</p>
              <div style={{display:'flex',gap:9}}>
                <button className="btn btn-gold" style={{flex:1}} onClick={()=>{setNeedLogin(false);setAuthMode('login');}}>{t('login')}</button>
                <button className="btn btn-ghost" style={{flex:1}} onClick={()=>{setNeedLogin(false);setAuthMode('signup');}}>{t('signup')}</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {postModal&&<PostModal editingPost={editing} onSave={handleSaved} onClose={()=>{setPostModal(false);setEditing(null);}}/>}

      {spMgr&&<SponsorMgr sponsors={sponsors} onUpdate={s=>setSponsors(s)} onClose={()=>setSpMgr(false)}/>}
    </div>
  );
};

const Root=()=><Provider><App/></Provider>;
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
