<style>
/* ══ CSS Variables ══ */
:root {
  --bg: #080f1c;
  --s1: #0c1828;
  --s2: #102035;
  --s3: #152740;
  --border: #1c3050;
  --green: #059669;
  --green2: #34d399;
  --gold: #f59e0b;
  --red: #dc2626;
  --text: #e8f4ff;
  --muted: #527a9a;
  --card: #0e1f32;
  --radius: 14px;
}

/* ══ Reset ══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', 'Noto Sans Arabic', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
.rtl { direction: rtl; }
.ltr { direction: ltr; }

/* ══ Scrollbar ══ */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--green); border-radius: 3px; }
.no-sb::-webkit-scrollbar { display: none; }
.no-sb { -ms-overflow-style: none; scrollbar-width: none; }

/* ══ Video Hero ══ */
.hero-video-wrap {
  position: relative;
  overflow: hidden;
  min-height: 92vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hero-video-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
}
.hero-video-bg video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.35;
}
.hero-video-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(8,15,28,0.6) 0%,
    rgba(8,15,28,0.3) 50%,
    rgba(8,15,28,0.85) 100%
  );
  z-index: 1;
}
.hero-content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 80px 20px 60px;
  max-width: 700px;
  margin: 0 auto;
  width: 100%;
}

/* ══ Typography ══ */
.heading { font-family: 'Syne', sans-serif; font-weight: 900; }
.gradient-text {
  background: linear-gradient(120deg, #34d399, #059669);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ══ Cards ══ */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 36px rgba(5,150,105,0.15);
}

/* ══ Discount ribbon (clean, professional) ══ */
.discount-ribbon {
  position: absolute;
  top: 0;
  right: 0;
  z-index: 5;
  background: var(--red);
  color: #fff;
  padding: 6px 16px 6px 20px;
  font-family: 'Syne', sans-serif;
  font-weight: 900;
  font-size: 14px;
  clip-path: polygon(0 0, 100% 0, 100% 100%, 8% 100%);
  border-radius: 0 var(--radius) 0 0;
  letter-spacing: 0.5px;
}
.discount-ribbon.rtl-side {
  right: auto;
  left: 0;
  clip-path: polygon(0 0, 100% 0, 92% 100%, 0 100%);
  border-radius: var(--radius) 0 0 0;
}

/* ══ FB-style image grid ══ */
.fb1 { height: 320px; }
.fb1 .fi { height: 100%; }
.fb2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; height: 240px; }
.fb3 { display: grid; grid-template-columns: 2fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px; height: 260px; }
.fb3 .fi:first-child { grid-row: 1 / 3; }
.fb4 { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px; height: 260px; }
.fb5 { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px; height: 240px; }
.fi { overflow: hidden; position: relative; cursor: pointer; background: var(--s2); }
.fi img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; display: block; }
.fi:hover img { transform: scale(1.04); }
.fi-more {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 900; color: #fff;
}

/* ══ Countdown ══ */
.countdown {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 7px 12px; border-radius: 8px;
  background: rgba(0,0,0,0.3); border: 1px solid var(--border);
}
.cd-block { text-align: center; min-width: 30px; }
.cd-num { font-family: 'Syne', sans-serif; font-weight: 900; font-size: 18px; line-height: 1; color: #fff; }
.cd-lbl { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 1px; }
.cd-sep { color: var(--muted); font-weight: 900; font-size: 16px; margin-bottom: 6px; }

/* ══ Buttons ══ */
.btn { display: inline-flex; align-items: center; gap: 7px; padding: 11px 20px; border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: var(--green); color: #fff; }
.btn-primary:hover { background: #047857; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary { background: var(--s3); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--green); color: var(--green2); }
.btn-danger { background: rgba(220,38,38,0.15); color: #f87171; border: 1px solid rgba(220,38,38,0.3); }
.btn-ghost { background: none; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }

/* ══ Form inputs ══ */
.inp {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 14px; color: var(--text);
  font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s;
}
.inp:focus { border-color: var(--green); }
.inp::placeholder { color: var(--muted); }
textarea.inp { resize: vertical; min-height: 70px; }

/* ══ Modal ══ */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  z-index: 90; display: flex; align-items: flex-end; justify-content: center;
  padding: 16px;
}
@media (min-width: 640px) { .modal-bg { align-items: center; } }
.modal-box {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 20px 20px 0 0; width: 100%; max-width: 480px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
}
@media (min-width: 640px) { .modal-box { border-radius: 20px; } }
.modal-header {
  position: sticky; top: 0; z-index: 2;
  background: var(--s1); padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

/* ══ Menu drawer ══ */
.drawer {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  display: flex;
}
.drawer-panel {
  background: var(--s1);
  border-inline-end: 1px solid var(--border);
  width: min(320px, 85vw);
  height: 100%;
  overflow-y: auto;
  display: flex; flex-direction: column;
  animation: slideIn 0.2s ease;
}
@keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
.rtl .drawer-panel { border-inline-end: none; border-inline-start: 1px solid var(--border); animation-name: slideInRtl; }
@keyframes slideInRtl { from { transform: translateX(100%); } to { transform: translateX(0); } }
.drawer-item {
  display: flex; align-items: center; gap: 14px;
  padding: 15px 20px; border-bottom: 1px solid var(--border);
  color: var(--text); font-size: 15px; font-weight: 600;
  cursor: pointer; text-decoration: none; background: none; border: none; width: 100%;
  text-align: inherit; transition: background 0.15s;
}
.drawer-item:hover { background: var(--s2); }
.drawer-icon {
  width: 36px; height: 36px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
}

/* ══ Sponsor strip ══ */
.sponsor-strip {
  display: flex; gap: 10px; overflow-x: auto; align-items: center; padding: 10px 0;
}
.sponsor-item {
  background: var(--s2); border: 1px solid var(--border); border-radius: 8px;
  width: 110px; height: 52px; flex-shrink: 0; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; animation: fadeIn 0.6s ease forwards;
}
@keyframes fadeIn { to { opacity: 1; } }
.sponsor-item img { width: 100%; height: 100%; object-fit: contain; padding: 6px; }

/* ══ Mobile nav ══ */
.mob-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: rgba(8,15,28,0.97); border-top: 1px solid var(--border);
  backdrop-filter: blur(12px);
  display: flex; justify-content: space-around; align-items: center;
  height: 58px; padding-bottom: env(safe-area-inset-bottom);
}
.mob-nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  color: var(--muted); background: none; border: none; cursor: pointer; transition: color 0.15s;
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
}
.mob-nav-btn.active { color: var(--green2); }

/* ══ Lightbox ══ */
.lightbox {
  position: fixed; inset: 0; background: rgba(0,0,0,0.95);
  z-index: 200; display: flex; align-items: center; justify-content: center;
}

/* ══ Tag pill ══ */
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
}

/* ══ Pulse ══ */
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
.pulse-dot { animation: pulse 2s infinite; }

/* ══ Section divider ══ */
.section-divider {
  height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin: 0;
}

/* ══ Responsive utilities ══ */
@media (max-width: 640px) {
  .hide-mobile { display: none !important; }
}
@media (min-width: 641px) {
  .hide-desktop { display: none !important; }
  .mob-nav { display: none !important; }
}

/* ══ Loader ══ */
.skeleton {
  background: linear-gradient(90deg, var(--s2) 25%, var(--s3) 50%, var(--s2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 8px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>

/* ═══════════════════════════════════════════════════
   CONTEXT
═══════════════════════════════════════════════════ */
const AppCtx = React.createContext();
const AppProvider = ({children}) => {
  const [lang, setLang] = useState('ckb');
  const [user, setUser] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);
  const [loading, setLoading] = useState(true);

  const t = k => {
    const keys = k.split('.');
    let v = T[lang];
    for(const x of keys){ v = v?.[x]; if(v===undefined) return k; }
    return v;
  };

  const switchLang = l => {
    setLang(l);
    document.documentElement.lang = l;
    document.documentElement.dir = l === 'en' ? 'ltr' : 'rtl';
    window.scrollTo(0,0);
  };

  /* Check session on load */
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user){
        setUser(session.user);
        checkAdmin(session.user.id);
      }
      setLoading(false);
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_e,session)=>{
      setUser(session?.user||null);
      if(session?.user) checkAdmin(session.user.id);
      else setIsAdmin(false);
    });
    return () => subscription.unsubscribe();
  },[]);

  const checkAdmin = async(uid) => {
    const {data} = await sb.from('admins').select('id').eq('user_id',uid).single();
    setIsAdmin(!!data);
  };

  return (
    <AppCtx.Provider value={{lang,t,switchLang,dir:lang==='en'?'ltr':'rtl',user,isAdmin,loading,setUser,setIsAdmin}}>
      {children}
    </AppCtx.Provider>
  );
};
const useApp = () => useContext(AppCtx);

/* ═══════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════ */
const timeLeft = (createdAt, days) => {
  const diff = new Date(createdAt).getTime() + days*86400000 - Date.now();
  if(diff<=0) return null;
  return {
    d: Math.floor(diff/86400000),
    h: Math.floor((diff%86400000)/3600000),
    m: Math.floor((diff%3600000)/60000),
  };
};

/* ═══════════════════════════════════════════════════
   COUNTDOWN COMPONENT
═══════════════════════════════════════════════════ */
const Countdown = ({createdAt, days}) => {
  const {t} = useApp();
  const [tl, setTl] = useState(()=>timeLeft(createdAt,days));
  useEffect(()=>{
    const id = setInterval(()=>setTl(timeLeft(createdAt,days)), 30000);
    return ()=>clearInterval(id);
  },[createdAt,days]);
  if(!tl) return <div className="countdown"><span style={{color:'var(--muted)',fontSize:13,fontWeight:700}}>{t('expired')}</span></div>;
  return (
    <div className="countdown">
      {[{v:tl.d,l:t('days')},{v:tl.h,l:t('hrs')},{v:tl.m,l:t('min')}].map((x,i)=>(
        <React.Fragment key={i}>
          {i>0 && <span className="cd-sep">:</span>}
          <div className="cd-block">
            <div className="cd-num">{String(x.v).padStart(2,'0')}</div>
            <div className="cd-lbl">{x.l}</div>
          </div>
        </React.Fragment>
      ))}
    </div>
  );
};

/* ═══════════════════════════════════════════════════
   IMAGE GRID (Facebook style)
═══════════════════════════════════════════════════ */
const ImageGrid = ({images=[], discountPct, expired, onImageClick}) => {
  const n = images.length;
  if(!n) return <div style={{height:200,background:'var(--s2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:40}}>🏷️</div>;
  const vis = Math.min(n,5);
  const extra = n > 5 ? n-5 : 0;
  const cls = n===1?'fb1':n===2?'fb2':n===3?'fb3':n===4?'fb4':'fb5';
  return (
    <div style={{position:'relative'}}>
      {n===1
        ? <div className={`fi fb1`} onClick={()=>onImageClick(0)}><img src={images[0]} alt="" loading="lazy"/></div>
        : <div className={cls}>
            {images.slice(0,vis).map((img,i)=>(
              <div key={i} className="fi" onClick={()=>onImageClick(i)}>
                <img src={img} alt="" loading="lazy"/>
                {extra>0 && i===vis-1 && <div className="fi-more">+{extra+1}</div>}
              </div>
            ))}
          </div>
      }
      {/* Discount ribbon — professional, no star */}
      <div className="discount-ribbon">{discountPct}% OFF</div>
      {expired && (
        <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(3px)',zIndex:6}}>
          <span style={{background:'var(--red)',color:'#fff',padding:'8px 24px',borderRadius:6,fontWeight:900,fontSize:16,letterSpacing:1}}>EXPIRED</span>
        </div>
      )}
    </div>
  );
};

/* ═══════════════════════════════════════════════════
   LIGHTBOX
═══════════════════════════════════════════════════ */
const Lightbox = ({images, start, onClose}) => {
  const [i, setI] = useState(start||0);
  useEffect(()=>{
    const h=e=>{
      if(e.key==='Escape') onClose();
      if(e.key==='ArrowLeft') setI(x=>(x-1+images.length)%images.length);
      if(e.key==='ArrowRight') setI(x=>(x+1)%images.length);
    };
    window.addEventListener('keydown',h);
    return ()=>window.removeEventListener('keydown',h);
  },[images]);
  return (
    <div className="lightbox" onClick={onClose}>
      <button onClick={onClose} style={{position:'absolute',top:16,right:20,background:'none',border:'none',color:'#fff',fontSize:32,cursor:'pointer',zIndex:5,lineHeight:1}}>×</button>
      {images.length>1 && <div style={{position:'absolute',top:18,left:'50%',transform:'translateX(-50%)',color:'rgba(255,255,255,0.6)',fontSize:13}}>{i+1} / {images.length}</div>}
      <img src={images[i]} alt="" style={{maxWidth:'92vw',maxHeight:'88vh',objectFit:'contain',borderRadius:8}} onClick={e=>e.stopPropagation()}/>
      {images.length>1 && <>
        <button onClick={e=>{e.stopPropagation();setI(x=>(x-1+images.length)%images.length);}} style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',background:'rgba(255,255,255,0.1)',border:'none',color:'#fff',width:44,height:44,borderRadius:'50%',fontSize:22,cursor:'pointer'}}>‹</button>
        <button onClick={e=>{e.stopPropagation();setI(x=>(x+1)%images.length);}} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'rgba(255,255,255,0.1)',border:'none',color:'#fff',width:44,height:44,borderRadius:'50%',fontSize:22,cursor:'pointer'}}>›</button>
      </>}
    </div>
  );
};

/* ═══════════════════════════════════════════════════
   DEAL CARD
═══════════════════════════════════════════════════ */
const DealCard = ({post, onDelete, onEdit, onLoginRequired}) => {
  const {t, user, isAdmin, lang} = useApp();
  const [liked, setLiked] = useState(false);
  const [likeCount, setLikeCount] = useState(post.like_count||0);
  const [lbIdx, setLbIdx] = useState(null);
  const expired = !timeLeft(post.created_at, post.discount_days);

  useEffect(()=>{
    if(!user) return;
    sb.from('likes').select('id').eq('post_id',post.id).eq('user_id',user.id).single()
      .then(({data})=>setLiked(!!data));
  },[user,post.id]);

  const handleLike = async() => {
    if(!user){ onLoginRequired(); return; }
    if(liked){
      await sb.from('likes').delete().eq('post_id',post.id).eq('user_id',user.id);
      setLikeCount(c=>c-1); setLiked(false);
    } else {
      await sb.from('likes').insert({post_id:post.id,user_id:user.id});
      setLikeCount(c=>c+1); setLiked(true);
    }
  };

  const handleShare = async() => {
    const txt = `${post.title_ckb||post.title_en} – Bilal Bazar`;
    if(navigator.share){ try{ await navigator.share({title:txt,url:window.location.href}); }catch(e){} }
    else { await navigator.clipboard?.writeText(window.location.href); }
  };

  const title = lang==='ckb'?post.title_ckb:lang==='ar'?post.title_ar:post.title_en;
  const images = Array.isArray(post.images)?post.images:(post.images?JSON.parse(post.images):[]);

  return (
    <div className="card">
      <ImageGrid images={images} discountPct={post.discount_pct} expired={expired} onImageClick={i=>setLbIdx(i)}/>
      {lbIdx!==null && <Lightbox images={images} start={lbIdx} onClose={()=>setLbIdx(null)}/>}
      <div style={{padding:'14px 16px 16px'}}>
        <h3 style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,lineHeight:1.35,marginBottom:10,color:'var(--text)'}}>{title}</h3>
        <div style={{marginBottom:12}}>
          <Countdown createdAt={post.created_at} days={post.discount_days}/>
        </div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:10,borderTop:'1px solid var(--border)'}}>
          <div style={{display:'flex',gap:8}}>
            <button
              onClick={handleLike}
              style={{display:'flex',alignItems:'center',gap:5,padding:'7px 13px',borderRadius:8,background:liked?'rgba(220,38,38,0.15)':'var(--s2)',color:liked?'#f87171':'var(--muted)',border:'none',fontSize:13,fontWeight:700,cursor:'pointer',transition:'all 0.15s'}}>
              <i className={liked?'fas fa-heart':'far fa-heart'}/>{likeCount}
            </button>
            <button
              onClick={handleShare}
              style={{display:'flex',alignItems:'center',gap:5,padding:'7px 13px',borderRadius:8,background:'var(--s2)',color:'var(--muted)',border:'none',fontSize:13,fontWeight:700,cursor:'pointer'}}>
              <i className="fas fa-share-alt"/>{t('share')}
            </button>
          </div>
          {isAdmin && (
            <div style={{display:'flex',gap:6}}>
              <button onClick={()=>onEdit(post)} style={{width:32,height:32,borderRadius:7,background:'rgba(59,130,246,0.12)',color:'#60a5fa',border:'none',cursor:'pointer',fontSize:12}}>
                <i className="fas fa-pencil-alt"/>
              </button>
              <button onClick={()=>onDelete(post.id)} style={{width:32,height:32,borderRadius:7,background:'rgba(220,38,38,0.12)',color:'#f87171',border:'none',cursor:'pointer',fontSize:12}}>
                <i className="fas fa-trash"/>
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

const PostModal = ({editingPost, onSave, onClose}) => {
  const {t, lang} = useApp();

  const [urlInput, setUrlInput] = useState('');
  const [form, setForm] = useState({
    title_ckb: editingPost?.title_ckb||'',
    title_ar: editingPost?.title_ar||'',
    title_en: editingPost?.title_en||'',
    discount_pct: editingPost?.discount_pct||20,
    discount_days: editingPost?.discount_days||7,
    category: editingPost?.category||'rice',
  });
  const [saving, setSaving] = useState(false);
  const set = (k,v)=>setForm(f=>({...f,[k]:v}));

  const addUrl = ()=>{ if(urlInput.trim()){setImgs(p=>[...p,urlInput.trim()]);setUrlInput('');} };
  const addFiles = files=>{
    Array.from(files).forEach(f=>{const r=new FileReader();r.onload=e=>setImgs(p=>[...p,e.target.result]);r.readAsDataURL(f);});
  };

  const submit = async()=>{
    if(!form.title_ckb||imgs.length===0) return;
    setSaving(true);
    const payload = {
      ...form,
      discount_pct:+form.discount_pct,
      discount_days:+form.discount_days,
      images: JSON.stringify(imgs),
    };
    if(editingPost){
      await sb.from('posts').update(payload).eq('id',editingPost.id);
    } else {
      await sb.from('posts').insert({...payload, created_at: new Date().toISOString()});
    }
    setSaving(false);
    onSave();
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>

          <span style={{fontWeight:800,fontSize:15}}>{editingPost?t('editPost'):t('addPost')}</span>

                  <img src={img} alt="" style={{width:68,height:68,objectFit:'cover',borderRadius:8,display:'block'}}/>
                  <button onClick={()=>setImgs(p=>p.filter((_,j)=>j!==i))} style={{position:'absolute',top:2,right:2,background:'var(--red)',color:'#fff',width:18,height:18,borderRadius:'50%',border:'none',fontSize:9,cursor:'pointer',lineHeight:'18px',textAlign:'center'}}>×</button>
                </div>
              ))}
              <label style={{width:68,height:68,background:'var(--s2)',borderRadius:8,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer',border:'1px dashed var(--border)',flexShrink:0,gap:4}}>
                <i className="fas fa-camera" style={{color:'var(--muted)',fontSize:18}}/>
                <span style={{fontSize:9,color:'var(--muted)'}}>Upload</span>
                <input type="file" accept="image/*" multiple style={{display:'none'}} onChange={e=>addFiles(e.target.files)}/>

            </div>
            <div style={{display:'flex',gap:7}}>
              <input className="inp" style={{flex:1}} placeholder={t('imageUrl')} value={urlInput} onChange={e=>setUrlInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addUrl()}/>
              <button className="btn btn-secondary" onClick={addUrl} style={{padding:'8px 12px',flexShrink:0}}><i className="fas fa-link"/></button>
            </div>
          </div>

          {/* Titles */}
          {[['ckb','🇮🇶 Kurdish','var(--green2)'],['ar','🇸🇦 Arabic','#60a5fa'],['en','🇬🇧 English','#a78bfa']].map(([l,label,col])=>(
            <div key={l}>
              <label style={{fontSize:11,color:col,fontWeight:700,display:'block',marginBottom:5,textTransform:'uppercase'}}>{label}</label>
              <input className="inp" dir={l==='en'?'ltr':'rtl'} value={form[`title_${l}`]} onChange={e=>set(`title_${l}`,e.target.value)} placeholder={t('postTitle')}/>

          ))}

          {/* Discount + Days */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div>
              <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:5}}>{t('discountPct')}</label>
              <input className="inp" type="number" min="1" max="99" value={form.discount_pct} onChange={e=>set('discount_pct',e.target.value)}/>
            </div>
            <div>
              <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:5}}>{t('discountDays')}</label>
              <input className="inp" type="number" min="1" max="90" value={form.discount_days} onChange={e=>set('discount_days',e.target.value)}/>

          </div>

            <label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:6}}>{t('selectCat')}</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {CATS.filter(c=>c!=='all').map(c=>(

const SponsorManager = ({sponsors, onUpdate, onClose}) => {
  const {t} = useApp();
  const [list, setList] = useState(sponsors);
  const [urlInput, setUrlInput] = useState('');
  const [saving, setSaving] = useState(false);

  const add = async()=>{
    if(!urlInput.trim()) return;
    setSaving(true);
    const {data} = await sb.from('sponsors').insert({image_url:urlInput.trim(),visible:true}).select().single();
    if(data) setList(p=>[...p,data]);
    setUrlInput(''); setSaving(false);
  };

  const toggle = async(id,cur)=>{
    await sb.from('sponsors').update({visible:!cur}).eq('id',id);
    setList(p=>p.map(s=>s.id===id?{...s,visible:!cur}:s));
  };

  const remove = async(id)=>{
    await sb.from('sponsors').delete().eq('id',id);
    setList(p=>p.filter(s=>s.id!==id));
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <span style={{fontWeight:800,fontSize:15}}>{t('manageSponsor')}</span>

          <div style={{display:'flex',gap:7}}>
            <input className="inp" style={{flex:1}} placeholder={t('imageUrl')} value={urlInput} onChange={e=>setUrlInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}/>
            <button className="btn btn-primary" onClick={add} disabled={saving} style={{padding:'8px 14px',flexShrink:0}}><i className="fas fa-plus"/></button>
          </div>

            <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
              <img src={s.image_url} alt="" style={{width:64,height:38,objectFit:'contain',borderRadius:6,background:'var(--s2)',padding:3,flexShrink:0}}/>
              <div style={{flex:1,fontSize:11,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.image_url}</div>
              <button onClick={()=>toggle(s.id,s.visible)} style={{background:s.visible?'rgba(5,150,105,0.15)':'var(--s2)',color:s.visible?'var(--green2)':'var(--muted)',border:'none',borderRadius:7,padding:'5px 10px',fontSize:11,fontWeight:700,cursor:'pointer',flexShrink:0}}>
                {s.visible?t('hide'):t('show')}
              </button>
              <button onClick={()=>remove(s.id)} style={{background:'rgba(220,38,38,0.15)',color:'#f87171',border:'none',borderRadius:7,width:28,height:28,cursor:'pointer',flexShrink:0}}>×</button>
            </div>
          ))}
          {list.length===0 && <p style={{color:'var(--muted)',fontSize:13,textAlign:'center',padding:20}}>No sponsors yet.</p>}
        </div>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════
   AUTH MODALS
═══════════════════════════════════════════════════ */
const AuthModal = ({mode, onClose, onSuccess}) => {
  const {t} = useApp();
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [currentMode, setCurrentMode] = useState(mode||'login');

  const submit = async e => {
    e.preventDefault();
    setLoading(true); setErr('');
    try {
      if(currentMode==='login'){
        const {error} = await sb.auth.signInWithPassword({email,password:pass});
        if(error) throw error;
      } else {
        const {error} = await sb.auth.signUp({email,password:pass});
        if(error) throw error;
      }
      onSuccess?.();
      onClose();
    } catch(e){ setErr(e.message||t('wrongCreds')); }
    setLoading(false);
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <span style={{fontWeight:800,fontSize:15}}>{currentMode==='login'?t('login'):t('signup')}</span>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--muted)',fontSize:24,cursor:'pointer',lineHeight:1}}>×</button>
        </div>
        <form onSubmit={submit} style={{padding:20,display:'flex',flexDirection:'column',gap:12}}>
          <input className="inp" type="email" placeholder={t('email')} value={email} onChange={e=>setEmail(e.target.value)} required/>
          <input className="inp" type="password" placeholder={t('pass')} value={pass} onChange={e=>setPass(e.target.value)} required/>
          {err && <p style={{color:'#f87171',fontSize:12,textAlign:'center'}}>{err}</p>}
          <button type="submit" className="btn btn-primary" disabled={loading} style={{width:'100%',justifyContent:'center'}}>
            {loading?t('loading'):currentMode==='login'?t('signIn'):t('signUp')}
          </button>
          <p style={{textAlign:'center',color:'var(--muted)',fontSize:13}}>
            {currentMode==='login'?t('signup'):t('login')}?{' '}
            <button type="button" onClick={()=>setCurrentMode(m=>m==='login'?'signup':'login')} style={{background:'none',border:'none',color:'var(--green2)',cursor:'pointer',fontWeight:700,fontSize:13}}>
              {currentMode==='login'?t('signUp'):t('signIn')}
            </button>
          </p>
        </form>
      </div>
    </div>
  );
};

  const handleLogout = async() => {
    await sb.auth.signOut();
    onClose();
  };

  const scrollTo = id => {
    document.getElementById(id)?.scrollIntoView({behavior:'smooth'});
    onClose();
  };

  return (
    <div className="drawer" onClick={onClose}>
      <div className="drawer-panel" onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div style={{padding:'20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:18,color:'var(--text)'}}>Bilal Bazar</div>
          <button onClick={onClose} style={{background:'var(--s2)',border:'none',borderRadius:8,width:32,height:32,color:'var(--muted)',cursor:'pointer',fontSize:18}}>×</button>
        </div>

        {/* Nav links */}
        {[
          {id:'home',icon:'fa-home',l:t('home'),color:'rgba(52,211,153,0.15)',ic:'var(--green2)'},
          {id:'deals',icon:'fa-tags',l:t('dealsTitle').split("'")[0].trim()||'Deals',color:'rgba(245,158,11,0.15)',ic:'var(--gold)'},
          {id:'locations',icon:'fa-map-marker-alt',l:t('locations'),color:'rgba(59,130,246,0.15)',ic:'#60a5fa'},
          {id:'about',icon:'fa-info-circle',l:t('about'),color:'rgba(167,139,250,0.15)',ic:'#a78bfa'},
        ].map(x=>(
          <button key={x.id} className="drawer-item" onClick={()=>scrollTo(x.id)}>
            <div className="drawer-icon" style={{background:x.color}}><i className={`fas ${x.icon}`} style={{color:x.ic}}/></div>{x.l}
          </button>
        ))}

        {/* WhatsApp */}
        <a href="https://wa.me/9647509193030" target="_blank" rel="noreferrer" className="drawer-item">
          <div className="drawer-icon" style={{background:'rgba(37,211,102,0.15)'}}><i className="fab fa-whatsapp" style={{color:'#25d366'}}/></div>WhatsApp
        </a>

        {/* Languages */}
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border)'}}>
          <p style={{fontSize:10,color:'var(--muted)',fontWeight:700,marginBottom:8,textTransform:'uppercase',letterSpacing:.6}}>{t('languages')}</p>
          <div style={{display:'flex',gap:6}}>
            {[{c:'ckb',l:'کوردی'},{c:'ar',l:'عربی'},{c:'en',l:'EN'}].map(x=>(
              <button key={x.c} onClick={()=>{switchLang(x.c);onClose();}} style={{flex:1,padding:'8px 6px',borderRadius:8,border:'none',fontWeight:700,fontSize:12,cursor:'pointer',background:lang===x.c?'var(--green)':'var(--s3)',color:lang===x.c?'#fff':'var(--muted)',transition:'all .15s'}}>
                {x.l}
              </button>
            ))}
          </div>
        </div>

        {/* Auth / Admin */}
        <div style={{padding:'10px 0',marginTop:'auto'}}>
          {user ? (
            <>
              {isAdmin && (
                <>
                  <button className="drawer-item" onClick={()=>{document.getElementById('admin-add-btn')?.click();onClose();}}>
                    <div className="drawer-icon" style={{background:'rgba(5,150,105,0.15)'}}><i className="fas fa-plus" style={{color:'var(--green2)'}}/></div>{t('addPost')}
                  </button>
                  <button className="drawer-item" onClick={()=>{setShowSponsorMgr(true);onClose();}}>
                    <div className="drawer-icon" style={{background:'rgba(245,158,11,0.15)'}}><i className="fas fa-star" style={{color:'var(--gold)'}}/></div>{t('manageSponsor')}
                  </button>
                </>
              )}
              <button className="drawer-item" onClick={handleLogout} style={{color:'#f87171'}}>
                <div className="drawer-icon" style={{background:'rgba(220,38,38,0.15)'}}><i className="fas fa-sign-out-alt" style={{color:'#f87171'}}/></div>{t('logout')}
              </button>
            </>
          ) : (
            <>
              <button className="drawer-item" onClick={()=>{onShowAuth('login');onClose();}}>
                <div className="drawer-icon" style={{background:'rgba(5,150,105,0.15)'}}><i className="fas fa-user" style={{color:'var(--green2)'}}/></div>{t('login')}
              </button>
              <button className="drawer-item" onClick={()=>{onShowAuth('signup');onClose();}}>
                <div className="drawer-icon" style={{background:'rgba(59,130,246,0.15)'}}><i className="fas fa-user-plus" style={{color:'#60a5fa'}}/></div>{t('signup')}
              </button>
            </>
          )}
        </div>
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════ */
const App = () => {
  const {lang, t, dir, user, isAdmin} = useApp();
  const [posts, setPosts] = useState([]);
  const [sponsors, setSponsors] = useState([]);
  const [cat, setCat] = useState('all');
  const [visibleCount, setVisibleCount] = useState(3);
  const [postsLoading, setPostsLoading] = useState(true);
  const [activeSection, setActiveSection] = useState('home');
  const [menuOpen, setMenuOpen] = useState(false);
  const [authMode, setAuthMode] = useState(null);
  const [showPostModal, setShowPostModal] = useState(false);
  const [editingPost, setEditingPost] = useState(null);
  const [showSponsorMgr, setShowSponsorMgr] = useState(false);
  const [loginPrompt, setLoginPrompt] = useState(false);

  /* Load data */
  useEffect(()=>{ loadPosts(); loadSponsors(); },[]);
  useEffect(()=>{ setVisibleCount(3); },[cat]);

  const loadPosts = async()=>{
    setPostsLoading(true);
    const {data} = await sb.from('posts').select('*').order('created_at',{ascending:false});
    setPosts(data||[]);
    setPostsLoading(false);
  };

  const loadSponsors = async()=>{
    const {data} = await sb.from('sponsors').select('*').order('id');
    setSponsors(data||[]);
  };

  const handleDelete = async(id)=>{
    if(!confirm(t('deletePost')+'?')) return;
    await sb.from('posts').delete().eq('id',id);
    setPosts(p=>p.filter(x=>x.id!==id));
  };

  const handlePostSaved = ()=>{ setShowPostModal(false); setEditingPost(null); loadPosts(); };

  /* Intersection observer for active section */
  useEffect(()=>{
    const sections = ['home','deals','locations','about'];
    const obs = new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting) setActiveSection(e.target.id);});
    },{threshold:0.4});
    sections.forEach(id=>{ const el=document.getElementById(id); if(el) obs.observe(el); });
    return ()=>obs.disconnect();
  },[]);

  const filtered = useMemo(()=> cat==='all'?posts:posts.filter(p=>p.category===cat), [posts,cat]);
  const visible = filtered.slice(0, visibleCount);
  const visibleSponsors = sponsors.filter(s=>s.visible);

  const scrollTo = id => { document.getElementById(id)?.scrollIntoView({behavior:'smooth'}); };

  return (
    <div className={dir==='rtl'?'rtl':'ltr'}>

      {/* ─── STICKY HEADER ─── */}
      <header style={{position:'sticky',top:0,zIndex:60,background:'rgba(8,15,28,0.97)',borderBottom:'1px solid var(--border)',backdropFilter:'blur(12px)'}}>
        <div style={{maxWidth:1080,margin:'0 auto',padding:'0 16px',height:54,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          {/* Logo */}
          <div style={{display:'flex',alignItems:'center',gap:9,cursor:'pointer'}} onClick={()=>scrollTo('home')}>
            <div style={{width:34,height:34,borderRadius:9,background:'linear-gradient(135deg,#059669,#047857)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:17,color:'#fff',flexShrink:0}}>B</div>
            <div>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:15,color:'var(--text)',lineHeight:1}}>Bilal Bazar</div>
              <div style={{fontSize:9,color:'var(--green)',fontWeight:700,letterSpacing:1.1,marginTop:1}}>ERBIL · KURDISTAN</div>
            </div>
          </div>
          {/* Desktop nav */}
          <nav style={{display:'flex',gap:2}} className="hide-mobile">
            {[{id:'home',l:t('home')},{id:'deals',l:t('dealsTitle').length>14?'Deals':t('dealsTitle')},{id:'locations',l:t('locations')},{id:'about',l:t('about')}].map(x=>(
              <button key={x.id} onClick={()=>scrollTo(x.id)} style={{background:'none',border:'none',color:activeSection===x.id?'var(--green2)':'var(--muted)',fontSize:13,fontWeight:700,padding:'6px 10px',borderRadius:7,cursor:'pointer',transition:'color .15s',whiteSpace:'nowrap'}}>
                {x.l}
              </button>
            ))}
          </nav>
          {/* Right side */}
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {user && isAdmin && (
              <button id="admin-add-btn" onClick={()=>{setEditingPost(null);setShowPostModal(true);}} style={{background:'var(--green)',border:'none',borderRadius:8,color:'#fff',padding:'7px 12px',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:5}}>
                <i className="fas fa-plus"/><span className="hide-mobile">{t('addPost')}</span>
              </button>
            )}
            <button onClick={()=>setMenuOpen(true)} style={{background:'var(--s2)',border:'1px solid var(--border)',borderRadius:9,width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text)',cursor:'pointer',fontSize:15}}>
              <i className="fas fa-bars"/>
            </button>
          </div>
        </div>
      </header>

      {/* ─── HERO WITH VIDEO ─── */}
      <section id="home" className="hero-video-wrap">
        <div className="hero-video-bg">
          <video autoPlay muted loop playsInline preload="auto" poster="">
            <source src="bg.mp4" type="video/mp4"/>
          </video>
        </div>
        <div className="hero-video-overlay"/>
        <div className="hero-content">
          <div style={{display:'inline-flex',alignItems:'center',gap:8,background:'rgba(5,150,105,0.15)',border:'1px solid rgba(5,150,105,0.3)',borderRadius:30,padding:'6px 16px',fontSize:12,fontWeight:700,color:'var(--green2)',marginBottom:22,letterSpacing:.5}}>
            <span style={{width:7,height:7,borderRadius:'50%',background:'var(--green2)',display:'inline-block'}} className="pulse-dot"/>
            ERBIL, KURDISTAN
          </div>
          <h1 className="heading" style={{lineHeight:1.06,marginBottom:14}}>
            <span style={{display:'block',fontSize:'clamp(32px,6.5vw,60px)',color:'var(--text)'}}>{t('hero1')}</span>
            <span style={{display:'block',fontSize:'clamp(34px,7vw,66px)'}} className="gradient-text">{t('hero2')}</span>
          </h1>
          <p style={{color:'rgba(232,244,255,0.7)',fontSize:'clamp(14px,2.5vw,17px)',marginBottom:30,lineHeight:1.65}}>{t('heroSub')}</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:10,justifyContent:'center'}}>
            <button onClick={()=>scrollTo('deals')} className="btn btn-primary" style={{fontSize:15,padding:'13px 26px',borderRadius:30}}>
              <i className="fas fa-fire" style={{color:'#fca5a5'}}/>{t('seeDeals')}
            </button>
            <button onClick={()=>scrollTo('locations')} style={{background:'rgba(255,255,255,0.08)',color:'#fff',border:'1px solid rgba(255,255,255,0.2)',borderRadius:30,padding:'13px 26px',fontSize:15,fontWeight:700,cursor:'pointer',transition:'all .15s'}}>
              <i className="fas fa-map-marker-alt" style={{marginInlineEnd:8}}/>{t('findStore')}
            </button>
          </div>
        </div>
      </section>

      {/* ─── SPONSORS STRIP ─── */}
      {visibleSponsors.length>0 && (
        <section style={{background:'var(--s1)',borderBottom:'1px solid var(--border)',padding:'10px 16px'}}>
          <div style={{maxWidth:1080,margin:'0 auto'}}>
            <div className="sponsor-strip no-sb">
              {visibleSponsors.map((s,i)=>(
                <div key={s.id} className="sponsor-item" style={{animationDelay:`${i*0.1}s`}}>
                  <img src={s.image_url} alt="sponsor"/>
                </div>
              ))}
            </div>
          </div>
        </section>
      )}

      {/* ─── DEALS SECTION ─── */}
      <section id="deals" style={{padding:'44px 16px',maxWidth:1080,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:6,flexWrap:'wrap',gap:8}}>
          <h2 className="heading" style={{fontSize:24}}>{t('dealsTitle')}</h2>
          <span style={{color:'var(--muted)',fontSize:13}}>{filtered.length} deals</span>
        </div>

        {/* Category pills */}
        <div style={{display:'flex',gap:7,overflowX:'auto',paddingBottom:14,marginBottom:20}} className="no-sb">
          {CATS.map(c=>(
            <button key={c} onClick={()=>setCat(c)} style={{padding:'7px 16px',borderRadius:20,border:'none',fontSize:13,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',background:cat===c?'var(--green)':'var(--s2)',color:cat===c?'#fff':'var(--muted)',border:cat!==c?'1px solid var(--border)':'none',transition:'all .15s'}}>
              {t(`cats.${c}`)}
            </button>
          ))}
        </div>

        {/* Grid */}
        {postsLoading ? (
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
            {[1,2,3].map(i=>(
              <div key={i} style={{background:'var(--card)',borderRadius:'var(--radius)',overflow:'hidden',border:'1px solid var(--border)'}}>
                <div className="skeleton" style={{height:220}}/>
                <div style={{padding:14,display:'flex',flexDirection:'column',gap:8}}>
                  <div className="skeleton" style={{height:16,width:'80%'}}/>
                  <div className="skeleton" style={{height:14,width:'60%'}}/>
                </div>
              </div>
            ))}
          </div>
        ) : filtered.length===0 ? (
          <div style={{textAlign:'center',padding:'60px 20px',color:'var(--muted)'}}>
            <div style={{fontSize:44,marginBottom:12}}>🏷️</div>
            <p style={{fontSize:16}}>{t('noDeals')}</p>
          </div>
        ) : (
          <>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
              {visible.map(post=>(
                <DealCard
                  key={post.id}
                  post={post}
                  onDelete={handleDelete}
                  onEdit={p=>{setEditingPost(p);setShowPostModal(true);}}
                  onLoginRequired={()=>setLoginPrompt(true)}
                />
              ))}
            </div>
            {visibleCount < filtered.length && (
              <div style={{textAlign:'center',marginTop:24}}>
                <button className="btn btn-secondary" onClick={()=>setVisibleCount(c=>c+6)} style={{padding:'12px 32px',borderRadius:30,fontSize:14}}>
                  <i className="fas fa-chevron-down"/>{t('seeMore')}
                </button>
              </div>
            )}
          </>
        )}
      </section>

      <div className="section-divider"/>

      {/* ─── LOCATIONS ─── */}
      <section id="locations" style={{padding:'44px 16px',background:'var(--s1)',borderTop:'1px solid var(--border)'}}>
        <div style={{maxWidth:1080,margin:'0 auto'}}>
          <h2 className="heading" style={{fontSize:24,marginBottom:24,textAlign:'center'}}>{t('locationsTitle')}</h2>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:14}}>
            {LOCATIONS.map(loc=>(
              <a key={loc.id} href={loc.link} target="_blank" rel="noopener noreferrer" className="card" style={{display:'block',textDecoration:'none',color:'inherit',padding:'18px'}}>
                <div style={{width:38,height:38,borderRadius:9,background:'rgba(5,150,105,0.15)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:12,fontSize:17}}>
                  <i className="fas fa-store" style={{color:'var(--green2)'}}/>
                </div>
                <h3 style={{fontWeight:800,fontSize:14,marginBottom:4,color:'var(--text)',lineHeight:1.3}}>{loc.name[lang]||loc.name.en}</h3>
                <p style={{fontSize:12,color:'var(--muted)',marginBottom:12}}>{loc.addr[lang]||loc.addr.en}</p>
                <div style={{fontSize:11,color:'var(--muted)',marginBottom:12,display:'flex',flexDirection:'column',gap:5}}>
                  <span><i className="far fa-clock" style={{color:'var(--green)',marginInlineEnd:5}}/>{loc.hours}</span>
                  <span><i className="fas fa-phone" style={{color:'var(--green)',marginInlineEnd:5}}/>{loc.phone}</span>
                </div>
                <div style={{display:'flex',gap:7}}>
                  <span style={{flex:1,background:'var(--green)',color:'#fff',borderRadius:8,padding:'8px',textAlign:'center',fontSize:12,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
                    <i className="fas fa-map-marker-alt"/>{t('locations')}
                  </span>
                  <a href={`tel:${loc.phone}`} onClick={e=>e.stopPropagation()} style={{background:'var(--s3)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px',display:'flex',alignItems:'center',color:'var(--muted)',fontSize:13}}>
                    <i className="fas fa-phone"/>
                  </a>
                </div>
              </a>
            ))}
          </div>
        </div>
      </section>

      <div className="section-divider"/>

      {/* ─── ABOUT ─── */}
      <section id="about" style={{padding:'44px 16px',maxWidth:700,margin:'0 auto',textAlign:'center'}}>
        <h2 className="heading" style={{fontSize:24,marginBottom:14}}>{t('aboutTitle')}</h2>
        <p style={{color:'var(--muted)',fontSize:15,lineHeight:1.8,marginBottom:28}}>{t('aboutText')}</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(110px,1fr))',gap:10}}>
          {[['🌾','rice'],['🥩','meat'],['🌽','cereal'],['📦','other']].map(([icon,c])=>(
            <div key={c} onClick={()=>{setCat(c);scrollTo('deals');}} className="card" style={{padding:'14px 8px',textAlign:'center',cursor:'pointer'}}>
              <div style={{fontSize:26,marginBottom:6}}>{icon}</div>
              <div style={{fontWeight:700,fontSize:12,color:'var(--green2)'}}>{t(`cats.${c}`)}</div>
            </div>
          ))}
        </div>
      </section>

      {/* ─── FOOTER ─── */}
      <footer style={{background:'#050c18',borderTop:'1px solid var(--border)',padding:'32px 16px 72px',textAlign:'center'}}>
        <div className="heading" style={{fontSize:22,color:'var(--text)',marginBottom:4}}>Bilal Bazar</div>
        <div style={{fontSize:9,fontWeight:700,letterSpacing:1.8,color:'var(--green)',marginBottom:14}}>ERBIL · KURDISTAN</div>
        <p style={{fontSize:13,color:'var(--muted)',marginBottom:16,maxWidth:340,margin:'0 auto 16px',lineHeight:1.7}}>
          {lang==='ckb'?'بازاڕی متمانەپێکراوی ناوچەی کوردستان':lang==='ar'?'السوق الموثوق في إقليم كردستان':'The trusted market of Kurdistan Region'}
        </p>
        <div style={{marginBottom:16}}>
          <a href="https://wa.me/9647509193030" target="_blank" rel="noreferrer" style={{display:'inline-flex',alignItems:'center',gap:8,background:'rgba(37,211,102,0.12)',border:'1px solid rgba(37,211,102,0.25)',borderRadius:8,padding:'8px 16px',color:'#25d366',textDecoration:'none',fontSize:13,fontWeight:700}}>
            <i className="fab fa-whatsapp" style={{fontSize:16}}/>WhatsApp
          </a>
        </div>
        <p style={{fontSize:11,color:'#1e3050'}}>{t('copyright')}</p>
      </footer>

      {/* ─── MOBILE BOTTOM NAV ─── */}
      <div className="mob-nav">
        {[{id:'home',icon:'fa-home',l:t('home')},{id:'deals',icon:'fa-tags',l:'Deals'},{id:'locations',icon:'fa-map-marker-alt',l:t('locations')},{id:'about',icon:'fa-info-circle',l:t('about')}].map(x=>(
          <button key={x.id} className={`mob-nav-btn${activeSection===x.id?' active':''}`} onClick={()=>scrollTo(x.id)}>
            <i className={`fas ${x.icon}`} style={{fontSize:18}}/>
            {x.l}
          </button>
        ))}
        <button className="mob-nav-btn" onClick={()=>setMenuOpen(true)}>
          <i className="fas fa-bars" style={{fontSize:18}}/>{t('menu')}
        </button>
      </div>

      {/* ─── FLOATING WHATSAPP ─── */}
      <a href="https://wa.me/9647509193030" target="_blank" rel="noreferrer"
         style={{position:'fixed',bottom:68,right:16,width:48,height:48,borderRadius:'50%',background:'#25d366',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:20,zIndex:45,boxShadow:'0 4px 16px rgba(37,211,102,0.4)',textDecoration:'none'}}>
        <i className="fab fa-whatsapp"/>
      </a>

      {/* ─── ADMIN FAB ─── */}
      {isAdmin && (
        <button onClick={()=>{setEditingPost(null);setShowPostModal(true);}}
           style={{position:'fixed',bottom:68,left:16,width:48,height:48,borderRadius:'50%',background:'linear-gradient(135deg,var(--red),#f97316)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:20,zIndex:45,cursor:'pointer',boxShadow:'0 4px 16px rgba(220,38,38,0.4)'}}>
          <i className="fas fa-plus"/>
        </button>
      )}

      {/* ─── MODALS ─── */}
      {menuOpen && <MenuDrawer onClose={()=>setMenuOpen(false)} onShowAuth={mode=>{setAuthMode(mode);}} setShowSponsorMgr={setShowSponsorMgr}/>}
      {authMode && <AuthModal mode={authMode} onClose={()=>setAuthMode(null)} onSuccess={()=>setAuthMode(null)}/>}
      {loginPrompt && (
        <div className="modal-bg" onClick={()=>setLoginPrompt(false)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()} style={{maxWidth:360}}>
            <div style={{padding:28,textAlign:'center'}}>
              <div style={{fontSize:40,marginBottom:12}}>❤️</div>
              <h3 className="heading" style={{fontSize:18,marginBottom:8}}>{t('loginToLike')}</h3>
              <p style={{color:'var(--muted)',fontSize:14,marginBottom:20}}>You need an account to like posts.</p>
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-primary" style={{flex:1,justifyContent:'center'}} onClick={()=>{setLoginPrompt(false);setAuthMode('login');}}>{t('signIn')}</button>
                <button className="btn btn-secondary" style={{flex:1,justifyContent:'center'}} onClick={()=>{setLoginPrompt(false);setAuthMode('signup');}}>{t('signUp')}</button>
              </div>
            </div>
          </div>
        </div>
      )}
      {showPostModal && (
        <PostModal
          editingPost={editingPost}
          onSave={handlePostSaved}
          onClose={()=>{setShowPostModal(false);setEditingPost(null);}}
        />
      )}
      {showSponsorMgr && (
        <SponsorManager
          sponsors={sponsors}
          onUpdate={updated=>{setSponsors(updated);}}
          onClose={()=>setShowSponsorMgr(false)}
        />
      )}
    </div>
  );
};

const Root = () => <AppProvider><App/></AppProvider>;
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
