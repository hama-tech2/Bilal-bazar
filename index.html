<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>حلال مارکێت | Halal Market</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060807;--surface:#0c1009;--elevated:#121610;
  --border:#1c2a1e;--border2:#243026;
  --text:#ede9e0;--muted:#6b8a72;--soft:#a4bfaa;
  --gold:#c8962c;--gold2:#a67820;--gold3:#e8c06a;--gold4:rgba(200,150,44,.08);
  --green:#22c55e;--green2:#16a34a;--green3:#86efac;
  --danger:#ef4444;--danger2:#b91c1c;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit','Noto Sans Arabic',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}
button,input,textarea,select{font-family:inherit}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
.rtl{direction:rtl}.ltr{direction:ltr}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold2);border-radius:2px}
.nsb{-ms-overflow-style:none;scrollbar-width:none}
.nsb::-webkit-scrollbar{display:none}

@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%,100%{background-position:200% 0}50%{background-position:-200% 0}}
@keyframes glow{0%,100%{opacity:.4}50%{opacity:.8}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-12px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
@keyframes slideR{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:none}}
@keyframes slideL{from{opacity:0;transform:translateX(-100%)}to{opacity:1;transform:none}}
@keyframes pulseGold{0%,100%{box-shadow:0 0 0 0 rgba(200,150,44,.35)}70%{box-shadow:0 0 0 12px rgba(200,150,44,0)}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

.c{max-width:1100px;margin:0 auto;padding:0 16px}
.flex{display:flex}.col{flex-direction:column}
.ac{align-items:center}.jb{justify-content:space-between}.jc{justify-content:center}
.gap2{gap:8px}.gap3{gap:12px}.gap4{gap:16px}
.f1{flex:1}.wf{width:100%}
.tc{text-align:center}.muted{color:var(--muted)}.gold{color:var(--gold)}

.ticker-wrap{background:linear-gradient(90deg,var(--gold2),var(--gold),var(--gold2));height:34px;overflow:hidden;display:flex;align-items:center}
.ticker-inner{display:flex;white-space:nowrap;animation:marquee 22s linear infinite}
.ticker-inner span{padding:0 28px;font-size:12px;font-weight:700;color:#1a0e00;letter-spacing:.4px}
.ticker-inner span::before{content:'★ ';opacity:.6}

.hdr{position:sticky;top:0;z-index:40;background:rgba(6,8,7,.96);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;height:58px}
.logo-wrap{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-img{width:38px;height:38px;object-fit:contain;border-radius:8px}
.logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;background:linear-gradient(120deg,var(--gold3),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:7.5px;font-weight:600;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase;margin-top:-2px}

#hero{position:relative;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
.hero-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(160deg,rgba(6,8,7,.88) 0%,rgba(6,8,7,.60) 45%,rgba(6,8,7,.92) 100%)}
.hero-body{position:relative;z-index:2;text-align:center;padding:110px 20px 90px;max-width:800px;margin:0 auto;width:100%}
.hero-title{font-family:'Syne',sans-serif;font-weight:900;font-size:clamp(48px,10vw,108px);letter-spacing:-3px;line-height:.88;background:linear-gradient(130deg,#fff 0%,var(--gold3) 40%,var(--gold) 70%,#fff 100%);background-size:260% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fadeUp .7s ease .12s both;margin-bottom:10px}
.hero-ar{font-family:'Noto Sans Arabic',sans-serif;font-weight:700;font-size:clamp(13px,2.2vw,18px);color:rgba(232,192,106,.75);animation:fadeUp .7s ease .28s both;margin-bottom:14px;letter-spacing:.5px}
.hero-desc{color:rgba(220,215,200,.58);font-size:clamp(13px,1.8vw,15px);line-height:1.85;margin:0 auto 32px;max-width:440px;animation:fadeUp .7s ease .44s both}
.hero-btns{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;animation:fadeUp .7s ease .58s both}
.hero-trust{display:flex;gap:36px;justify-content:center;margin-top:52px;flex-wrap:wrap;animation:fadeUp .7s ease .74s both}
.hero-trust-item{text-align:center}
.hero-trust-n{font-family:'Syne',sans-serif;font-weight:900;font-size:28px;color:#fff;line-height:1}
.hero-trust-l{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-top:5px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 20px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .16s;white-space:nowrap;font-family:inherit;text-decoration:none}
.btn:disabled{opacity:.38;cursor:not-allowed;transform:none!important}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a0e00;box-shadow:0 4px 18px rgba(200,150,44,.28)}
.btn-gold:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-2px);box-shadow:0 8px 28px rgba(200,150,44,.38)}
.btn-ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:var(--soft)}
.btn-ghost:hover{border-color:var(--gold);color:var(--text);background:rgba(200,150,44,.08)}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-g:hover{border-color:var(--gold);color:var(--text)}
.btn-d{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.btn-d:hover{background:rgba(239,68,68,.18)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:var(--gold4);color:var(--gold);border:1px solid rgba(200,150,44,.2)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .2s,box-shadow .2s,transform .2s;will-change:transform;contain:layout style}
.card:hover{border-color:rgba(200,150,44,.25);box-shadow:0 14px 40px rgba(0,0,0,.5),0 0 0 1px rgba(200,150,44,.08)}
body.lb-open .card{pointer-events:none}

.inp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;font-family:inherit}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--muted)}

.stitle{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.stitle-bar{width:4px;height:32px;border-radius:2px;background:linear-gradient(180deg,var(--gold3),var(--gold2));flex-shrink:0}
.stitle h2{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(20px,3.5vw,28px)}
.stitle-sub{font-size:12px;color:var(--muted);margin-top:2px}

.toast-wrap{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{padding:9px 18px;border-radius:10px;font-size:13px;font-weight:700;min-width:190px;text-align:center;animation:toastIn .3s ease}
.t-ok{background:rgba(34,197,94,.14);border:1px solid rgba(34,197,94,.28);color:#86efac}
.t-err{background:rgba(239,68,68,.14);border:1px solid rgba(239,68,68,.25);color:#fca5a5}

.ov{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:80;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:540px){.ov{align-items:center;padding:20px}}
.mbox{background:var(--elevated);border:1px solid var(--border);width:100%;max-width:500px;max-height:93vh;overflow-y:auto;border-radius:20px 20px 0 0;animation:slideUp .22s ease}
@media(min-width:540px){.mbox{border-radius:20px;animation:scaleIn .18s ease}}
.mhdr{position:sticky;top:0;z-index:2;background:var(--elevated);padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mhdr h3{font-weight:800;font-size:15px}
.mbody{padding:18px 20px}

.dov{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.8)}
.dpanel{position:absolute;top:0;bottom:0;width:min(290px,85vw);background:var(--surface);border-inline-end:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.rtl .dpanel{right:0;animation:slideR .22s ease}
.ltr .dpanel{left:0;animation:slideL .22s ease}
.di{display:flex;align-items:center;gap:12px;padding:13px 18px;font-size:14px;font-weight:600;color:var(--text);background:none;border:none;border-bottom:1px solid rgba(255,255,255,.04);width:100%;text-align:inherit;cursor:pointer;transition:background .12s;text-decoration:none;font-family:inherit}
.di:hover{background:var(--elevated)}
.dico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}

.mnav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(6,8,7,.97);border-top:1px solid var(--border);display:flex;justify-content:space-around;height:58px;padding-bottom:env(safe-area-inset-bottom)}
.mnb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted);background:none;border:none;cursor:pointer;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;transition:color .14s}
.mnb.act{color:var(--gold)}
.mnb.act i{color:var(--gold)}
.mnb i{font-size:19px;transition:color .14s}

.sp-top-wrap{position:relative;width:100%;overflow:hidden;height:72px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
@media(min-width:641px){.sp-top-wrap{height:88px}}
.sp-top-slide{position:absolute;inset:0;transition:opacity .55s ease}
.sp-top-slide img,.sp-top-slide video{width:100%;height:100%;object-fit:cover;display:block}
.sp-top-slide a{display:block;width:100%;height:100%}
.sp-top-label{position:absolute;top:4px;right:6px;z-index:3;font-size:7px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.45);background:rgba(0,0,0,.32);padding:1px 5px;border-radius:3px;pointer-events:none}
.sp-float-wrap{position:fixed;bottom:72px;left:0;z-index:44;pointer-events:none;transition:opacity .55s ease}
.sp-float-inner{position:relative;width:188px;height:52px;border-radius:0 12px 12px 0;overflow:hidden;background:#fff;box-shadow:0 4px 22px rgba(0,0,0,.5);pointer-events:auto}
.sp-float-inner img{width:100%;height:100%;object-fit:contain;display:block}
.sp-float-label{position:absolute;top:3px;right:5px;z-index:3;font-size:6px;font-weight:800;text-transform:uppercase;color:rgba(0,0,0,.28);background:rgba(255,255,255,.7);padding:1px 4px;border-radius:2px;pointer-events:none}

.pimg{position:relative}
.fi{background:var(--border);overflow:hidden;cursor:pointer;position:relative}
.fi img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .28s}
.fi:hover img{transform:scale(1.05)}
.g1{height:252px}.g2i{display:grid;grid-template-columns:1fr 1fr;gap:2px;height:196px}
.g3i{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;height:175px}
.g4i{display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);gap:2px;height:215px}
.g5i{display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(2,1fr);gap:2px;height:196px}
.g5i .fi:nth-child(1){grid-column:1/3}.g5i .fi:nth-child(2){grid-column:3/5}.g5i .fi:nth-child(3){grid-column:5/7}
.g5i .fi:nth-child(4){grid-column:1/4}.g5i .fi:nth-child(5){grid-column:4/7}
.g6i{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:2px;height:215px}
@media(max-width:640px){.g1{height:205px!important}.g2i{height:165px!important}.g3i{height:145px!important}.g4i,.g5i,.g6i{height:175px!important}}

.disc{position:absolute;top:10px;right:10px;z-index:5;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--danger),var(--danger2));color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:12px;line-height:1;text-align:center;box-shadow:0 4px 14px rgba(185,28,28,.48)}
.ltr .disc{right:auto;left:10px}
.exp-ribbon{position:absolute;top:0;left:0;right:0;background:rgba(160,20,20,.82);padding:5px;text-align:center;z-index:4;pointer-events:none}
.exp-ribbon span{color:#fff;font-weight:900;font-size:11px;letter-spacing:.5px}

.cdown{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;background:rgba(200,150,44,.08);border:1px solid rgba(200,150,44,.18)}
.cb{text-align:center;min-width:24px}
.cn{font-weight:900;font-size:16px;line-height:1;color:#fff}
.cl{font-size:7px;color:var(--gold);text-transform:uppercase;letter-spacing:.8px;margin-top:1px}
.cs{color:rgba(200,150,44,.4);font-weight:900;font-size:13px;align-self:center;margin-bottom:2px}

.post-actions{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;padding-top:10px;border-top:1px solid var(--border)}
.act-btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .14s;white-space:nowrap;font-family:inherit;height:32px}
.act-btn:hover{border-color:var(--gold);color:var(--text)}
.act-btn.liked{background:rgba(239,68,68,.12);color:var(--danger);border-color:rgba(239,68,68,.28)}
.act-btn.active{color:var(--green);border-color:var(--green)}
.admin-btns{display:flex;gap:4px;margin-inline-start:auto}

.lb{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease;touch-action:pan-y}
.lbc{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.1);border:none;color:#fff;width:42px;height:42px;border-radius:50%;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
.lb-img{max-width:93vw;max-height:88vh;object-fit:contain;border-radius:10px;display:block;user-select:none;-webkit-user-drag:none}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:none;color:#fff;width:46px;height:46px;border-radius:50%;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:background .15s}
.lb-nav:hover{background:rgba(255,255,255,.2)}
.lb-counter{position:absolute;top:14px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.7);font-size:13px;font-weight:700;z-index:2;background:rgba(0,0,0,.45);padding:3px 12px;border-radius:20px;pointer-events:none}

.cm-list{display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;padding-inline-end:2px}
.cm-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.cm-reply-item{background:rgba(200,150,44,.03);border:1px solid rgba(200,150,44,.14);border-radius:10px;padding:8px 11px;margin-inline-start:24px;margin-top:5px}
.cm-meta{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.cm-name{font-weight:800;font-size:12px;color:var(--gold);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cm-admin-tag{font-size:9px;font-weight:800;background:rgba(200,150,44,.12);color:var(--gold);padding:1px 5px;border-radius:4px;border:1px solid rgba(200,150,44,.22);flex-shrink:0}
.cm-date{font-size:9px;color:var(--muted);margin-inline-start:auto;flex-shrink:0}
.cm-txt{font-size:12px;line-height:1.5;color:var(--soft);word-break:break-word}
.cm-char{font-size:9px;color:var(--muted);text-align:end;margin-top:3px}
.cm-input-row{display:flex;align-items:center;gap:7px;margin-top:10px;background:var(--elevated);border:1px solid var(--border);border-radius:10px;padding:6px 10px}
.cm-input-row input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:12px;font-family:inherit}
.cm-input-row input::placeholder{color:var(--muted)}
.cm-input-row button{background:none;border:none;cursor:pointer;color:var(--gold);font-size:14px;padding:2px 4px;flex-shrink:0}
.cm-input-row button:disabled{opacity:.35;cursor:not-allowed}
.cm-login-box{margin-top:10px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.cm-reply-form{margin-inline-start:24px;margin-top:5px;background:rgba(200,150,44,.03);border:1px solid rgba(200,150,44,.13);border-radius:10px;padding:8px 10px}
.cm-del-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.16);font-size:13px;font-weight:900;padding:0 3px;line-height:1;transition:color .12s;flex-shrink:0;margin-inline-start:4px;display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px}
.cm-del-btn:hover{color:var(--danger);background:rgba(239,68,68,.1)}

.title-toggle{display:inline;background:none;border:none;cursor:pointer;color:var(--gold);font-size:11px;font-weight:700;padding:1px 5px;margin-inline-start:4px;font-family:inherit;vertical-align:baseline;line-height:inherit;opacity:.85}
.title-toggle:hover{opacity:1;text-decoration:underline}

.sk{background:linear-gradient(90deg,var(--border) 25%,var(--elevated) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.6s infinite;border-radius:8px}

.loc-grid{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:560px){.loc-grid{grid-template-columns:1fr 1fr}}
.loc-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px;position:relative;overflow:hidden;transition:all .2s}
.loc-card::before{content:'';position:absolute;top:0;right:0;width:80px;height:80px;background:radial-gradient(circle at top right,rgba(200,150,44,.08),transparent 70%);pointer-events:none}
.loc-card:hover{border-color:rgba(200,150,44,.28);transform:translateY(-3px);box-shadow:0 16px 44px rgba(0,0,0,.46)}
.loc-num{position:absolute;top:18px;inset-inline-end:20px;font-family:'Syne',sans-serif;font-weight:900;font-size:44px;color:rgba(200,150,44,.07);line-height:1;pointer-events:none}
.loc-icon{width:46px;height:46px;border-radius:12px;background:rgba(200,150,44,.1);border:1px solid rgba(200,150,44,.18);display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:16px}
.loc-name{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;margin-bottom:6px;line-height:1.3}
.loc-meta{display:flex;flex-direction:column;gap:7px;margin:12px 0 18px}
.loc-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--soft);direction:ltr;text-align:start}
.loc-row i{width:16px;color:var(--gold);font-size:11px;flex-shrink:0}
.loc-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

.rev-scroll{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px}
.rev-scroll::-webkit-scrollbar{display:none}
.rev-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;min-width:230px;max-width:250px;flex-shrink:0;transition:border-color .2s}

const Ctx=React.createContext();
function Provider({children}){
  const[lang,setLang]=useState('ckb');
  const[user,setUser]=useState(null);
  const[profile,setProfile]=useState(null);
  const[toasts,setToasts]=useState([]);

  const t=useCallback(k=>{
    const keys=k.split('.');let v=TX[lang];
    for(const x of keys){if(v==null)return k;v=v[x]}
    return v==null?k:String(v);
  },[lang]);

  const toast=useCallback((msg,ok=true)=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,msg,ok}]);
    setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),3500);
  },[]);

  const sw=useCallback(l=>{
    setLang(l);
    document.documentElement.lang=l;
    document.documentElement.dir=l==='en'?'ltr':'rtl';
  },[]);

  const loadProfile=useCallback(async uid=>{
    if(!uid)return;
    const{data}=await SB.from('profiles').select('*').eq('id',uid).maybeSingle();
    setProfile(data||null);
  },[]);

  useEffect(()=>{
    if(window.location.hash&&window.location.hash.includes('error')){
      const p=new URLSearchParams(window.location.hash.slice(1));
      const e=p.get('error_description')||p.get('error')||'Auth error';
      toast(decodeURIComponent(e.replace(/\+/g,' ')),false);
      window.history.replaceState(null,'',window.location.pathname);
    }
    SB.auth.getSession().then(({data:{session}})=>{
      const u=session?.user||null;setUser(u);if(u)loadProfile(u.id);
    });
    const{data:{subscription}}=SB.auth.onAuthStateChange((_,s)=>{
      const u=s?.user||null;setUser(u);
      if(u)loadProfile(u.id);else setProfile(null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  const isAdmin=user?.email===ADMIN;
  const dir=lang==='en'?'ltr':'rtl';
  return(
    <Ctx.Provider value={{lang,t,sw,dir,user,profile,setProfile,isAdmin,toast,loadProfile}}>
      {children}
      <div className="toast-wrap">{toasts.map(x=><div key={x.id} className={`toast ${x.ok?'t-ok':'t-err'}`}>{x.msg}</div>)}</div>
    </Ctx.Provider>
  );
}
const useApp=()=>useContext(Ctx);

function tleft(iso,days){
  const d=new Date(iso).getTime()+days*86400000-Date.now();
  if(d<=0)return null;
  return{d:Math.floor(d/86400000),h:Math.floor(d%86400000/3600000),m:Math.floor(d%3600000/60000)};
}
function parseImgs(v){try{return Array.isArray(v)?v:JSON.parse(v||'[]')}catch{return[]}}
function isVideoUrl(url=''){return/\.(mp4|webm|mov|ogg|m4v)(\?|$)/i.test(url)}

async function uploadToStorage(bucket,fileOrBlob,ext='jpg'){
  const name=`${Date.now()}_${Math.random().toString(36).slice(2,7)}.${ext}`;
  const ctype=fileOrBlob instanceof Blob&&fileOrBlob.type?fileOrBlob.type:`image/${ext}`;
  const{error}=await SB.storage.from(bucket).upload(name,fileOrBlob,{contentType:ctype,upsert:false});
  if(error)throw new Error(error.message||'Upload failed');
  return SB.storage.from(bucket).getPublicUrl(name).data.publicUrl;
}

  return<span style={{width:size,height:size,borderRadius:'50%',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:emojiSz,background:'rgba(200,150,44,.1)',border:'1px solid rgba(200,150,44,.2)',flexShrink:0}}>{AVATARS[profile?.avatar||'male']||'👤'}</span>;
}

  const{t,user,profile,setProfile,toast,isAdmin}=useApp();

  const fileRef=useRef(null);
  const uploadPhoto=async e=>{
    const f=e.target.files[0];if(!f)return;
    setUpBusy(true);
    try{const url=await uploadToStorage('avatars',f,(f.name.split('.').pop()||'jpg').toLowerCase());setAvatarUrl(url);toast('Photo uploaded ✓');}
    catch(err){toast(err.message||'Upload failed',false);}
    setUpBusy(false);e.target.value='';
  };
  const save=async()=>{
    if(!user)return;setSaving(true);
    const payload={id:user.id,name:name.trim().slice(0,30),avatar,avatar_url:avatarUrl||null};
    const{data,error}=await SB.from('profiles').upsert(payload,{onConflict:'id'}).select().single();

    if(error){toast(error.message,false);return;}

              <button className="btn btn-g" style={{padding:'7px 14px',fontSize:12}} onClick={()=>fileRef.current?.click()} disabled={upBusy}>
                {upBusy?<><i className="fas fa-spinner fa-spin"/> Uploading…</>:<><i className="fas fa-camera"/> Upload Photo</>}
              </button>
              <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={uploadPhoto}/>
            </div>
          )}
          <div>
            <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',display:'block',marginBottom:8,textTransform:'uppercase',letterSpacing:.5}}>{t('profAvatar')}</label>
            <div className="av-sel">
              {['male','female'].map(a=><div key={a} className={`av-opt${avatar===a?' chosen':''}`} onClick={()=>setAvatar(a)}><span>{AVATARS[a]}</span>{t(a)}</div>)}
            </div>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:.5}}>{t('profName')}</label>
            <input className="inp" placeholder={t('profName')} value={name} maxLength={30} onChange={e=>setName(e.target.value)}/>

function CropModal({file,aspect,onDone,onClose}){
  const{t}=useApp();
  const[img,setImg]=useState(null);
  const[crop,setCrop]=useState({x:0,y:0});
  const[drag,setDrag]=useState(false);
  const dr=useRef({});
  const sr=useRef({rw:320,rh:320,cw:320,ch:80,scale:1});
  useEffect(()=>{
    if(!file)return;
    const url=URL.createObjectURL(file);
    const im=new Image();
    im.onload=()=>{
      const nw=im.naturalWidth,nh=im.naturalHeight;
      const maxW=Math.min(window.innerWidth-52,420);
      const sc=Math.min(maxW/nw,300/nh,1);
      const rw=Math.round(nw*sc),rh=Math.round(nh*sc);
      let cw,ch;
      if(aspect>=(rw/rh)){cw=rw;ch=Math.max(1,Math.round(rw/aspect));}
      else{ch=rh;cw=Math.max(1,Math.round(rh*aspect));}
      sr.current={rw,rh,cw,ch,scale:sc};
      setImg(im);setCrop({x:Math.round((rw-cw)/2),y:Math.round((rh-ch)/2)});
    };
    im.src=url;
    return()=>URL.revokeObjectURL(url);
  },[file,aspect]);
  const getXY=e=>e.touches?{cx:e.touches[0].clientX,cy:e.touches[0].clientY}:{cx:e.clientX,cy:e.clientY};
  const onS=e=>{setDrag(true);const{cx,cy}=getXY(e);dr.current={sx:cx,sy:cy,cx:crop.x,cy:crop.y};};
  const onM=e=>{if(!drag)return;const{cx,cy}=getXY(e);const dx=cx-dr.current.sx,dy=cy-dr.current.sy;const{rw,rh,cw,ch}=sr.current;setCrop({x:Math.max(0,Math.min(rw-cw,dr.current.cx+dx)),y:Math.max(0,Math.min(rh-ch,dr.current.cy+dy))});};
  const onE=()=>setDrag(false);
  const confirm=()=>{
    if(!img)return;
    const{scale,cw,ch}=sr.current;
    const sx=crop.x/scale,sy=crop.y/scale,sw=cw/scale,sh=ch/scale;
    const outW=Math.min(aspect>=4?1600:1200,Math.round(sw));
    const outH=Math.round(outW/aspect);
    const cv=document.createElement('canvas');cv.width=outW;cv.height=outH;
    cv.getContext('2d').drawImage(img,sx,sy,sw,sh,0,0,outW,outH);
    cv.toBlob(b=>{if(b)onDone(b);},'image/jpeg',.92);
  };
  if(!img)return<div className="ov"><div className="mbox" style={{maxWidth:320,textAlign:'center'}} onClick={e=>e.stopPropagation()}><div className="mbody"><i className="fas fa-spinner fa-spin gold" style={{fontSize:28}}/></div></div></div>;
  const{rw,rh,cw,ch}=sr.current;
  return(
    <div className="ov" onClick={onClose}>
      <div className="mbox" style={{maxWidth:520}} onClick={e=>e.stopPropagation()}>
        <div className="mhdr"><h3>{t('crop')}</h3><button className="btn btn-g" onClick={onClose} style={{padding:'5px 10px'}}>×</button></div>
        <div className="mbody" style={{textAlign:'center'}}>
          <p style={{fontSize:11,color:'var(--muted)',marginBottom:12}}>Drag to adjust</p>
          <div style={{display:'inline-block',position:'relative',cursor:'grab',touchAction:'none',userSelect:'none'}}
            onMouseDown={onS} onMouseMove={onM} onMouseUp={onE} onMouseLeave={onE}
            onTouchStart={onS} onTouchMove={onM} onTouchEnd={onE}>
            <img src={img.src} alt="" style={{width:rw,height:rh,display:'block',borderRadius:8,maxWidth:'100%'}} draggable={false}/>
            <div style={{position:'absolute',left:crop.x,top:crop.y,width:cw,height:ch,border:'2px dashed rgba(255,255,255,.9)',boxShadow:'0 0 0 9999px rgba(0,0,0,.52)',borderRadius:4,pointerEvents:'none'}}/>
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'center',marginTop:16}}>
            <button className="btn btn-g" onClick={onClose}>{t('cancel')}</button>
            <button className="btn btn-gold" onClick={confirm}><i className="fas fa-check"/> {t('upload')}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function GlobalLightbox({imgs,startIdx,onClose}){
  const[i,setI]=useState(startIdx);
  const ts=useRef(null);
  useEffect(()=>{
    document.body.classList.add('lb-open');
    const h=e=>{
      if(e.key==='Escape')onClose();
      if(e.key==='ArrowLeft')setI(x=>(x-1+imgs.length)%imgs.length);
      if(e.key==='ArrowRight')setI(x=>(x+1)%imgs.length);
    };
    window.addEventListener('keydown',h);
    return()=>{document.body.classList.remove('lb-open');window.removeEventListener('keydown',h);};
  },[imgs,onClose]);
  const prev=()=>setI(x=>(x-1+imgs.length)%imgs.length);
  const next=()=>setI(x=>(x+1)%imgs.length);
  const onTouchStart=e=>{ts.current=e.touches[0].clientX;};
  const onTouchEnd=e=>{
    if(ts.current===null)return;
    const dx=e.changedTouches[0].clientX-ts.current;
    if(Math.abs(dx)>40){dx<0?next():prev();}
    ts.current=null;
  };
  const onImgClick=e=>{
    if(imgs.length<=1){onClose();return;}
    e.stopPropagation();
    const{left,width}=e.currentTarget.getBoundingClientRect();
    (e.clientX-left)<width/2?prev():next();
  };
  return(
    <div className="lb" onClick={onClose} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
      <button className="lbc" onClick={e=>{e.stopPropagation();onClose();}}>×</button>
      {imgs.length>1&&<div className="lb-counter">{i+1} / {imgs.length}</div>}
      <img src={imgs[i]} alt="" className="lb-img" onClick={onImgClick} style={{cursor:imgs.length>1?'pointer':'zoom-out'}}/>
      {imgs.length>1&&<>
        <button className="lb-nav" style={{left:10}} onClick={e=>{e.stopPropagation();prev();}}>‹</button>
        <button className="lb-nav" style={{right:10}} onClick={e=>{e.stopPropagation();next();}}>›</button>
      </>}
    </div>
  );
}

function SpTop({sponsors}){
  const[idx,setIdx]=useState(0);
  const[opacity,setOpacity]=useState(1);
  useEffect(()=>{
    if(sponsors.length<=1)return;
    const id=setInterval(()=>{setOpacity(0);setTimeout(()=>{setIdx(i=>(i+1)%sponsors.length);setOpacity(1);},500);},6000);
    return()=>clearInterval(id);
  },[sponsors.length]);
  if(!sponsors.length)return null;
  const s=sponsors[idx];
  const vid=isVideoUrl(s.image_url);
  const media=vid?<video src={s.image_url} autoPlay muted loop playsInline style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>:<img src={s.image_url} alt="" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>;
  const inner=s.link_url?<a href={s.link_url} target="_blank" rel="noreferrer" style={{display:'block',width:'100%',height:'100%'}}>{media}</a>:media;
  return<div className="sp-top-wrap"><div className="sp-top-slide" style={{opacity,transition:'opacity 500ms ease'}}>{inner}</div><span className="sp-top-label">Ad</span></div>;
}

function SpFloat({sponsors}){
  const[visible,setVisible]=useState(false);
  const[idx,setIdx]=useState(0);
  useEffect(()=>{
    if(!sponsors.length)return;
    let t;
    const cycle=()=>{setVisible(true);t=setTimeout(()=>{setVisible(false);setIdx(i=>(i+1)%sponsors.length);t=setTimeout(cycle,22000);},7000);};
    t=setTimeout(cycle,5000);
    return()=>clearTimeout(t);
  },[sponsors.length]);
  if(!sponsors.length)return null;
  const s=sponsors[idx];
  const vid=isVideoUrl(s.image_url);
  const media=vid?<video src={s.image_url} autoPlay muted loop playsInline/>:<img src={s.image_url} alt=""/>;
  const inner=s.link_url?<a href={s.link_url} target="_blank" rel="noreferrer" style={{display:'block',width:'100%',height:'100%'}}>{media}</a>:media;
  return<div className="sp-float-wrap" style={{opacity:visible?1:0,pointerEvents:visible?'auto':'none',transition:'opacity .55s ease'}}><div className="sp-float-inner"><span className="sp-float-label">Ad</span>{inner}</div></div>;
}

function Countdown({iso,days}){

  return(

      {[{v:tl.d,l:t('days')},{v:tl.h,l:t('hrs')},{v:tl.m,l:t('min')}].map((x,i)=>(

}

      if(liked){
        await SB.from('likes').delete().eq('post_id',post.id).eq('user_id',user.id);
        const nv=Math.max(0,likes-1);await SB.from('posts').update({like_count:nv}).eq('id',post.id);
        setLiked(false);setLikes(nv);
      }else{
        const{error}=await SB.from('likes').insert({post_id:post.id,user_id:user.id});
        if(error)throw error;
        const nv=likes+1;await SB.from('posts').update({like_count:nv}).eq('id',post.id);
        setLiked(true);setLikes(nv);
      }
    }catch(e){toast(e.message||'Like failed',false);}
  };
  const handleShare=async()=>{
    if(navigator.share){try{await navigator.share({title:rawTitle,url:window.location.href});}catch(e){}}
    else if(navigator.clipboard){await navigator.clipboard.writeText(window.location.href);setCopied(true);setTimeout(()=>setCopied(false),2000);}
  };
  const gc=n===0?'':n===1?'g1':n===2?'g2i':n===3?'g3i':n===4?'g4i':n===5?'g5i':'g6i';
  return(
    <div className="card">
      <div className="pimg">
        {n===0
          ?<div style={{height:200,background:'var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:38}}>🏷️</div>
          :n===1
          ?<div className={`fi ${gc}`} onClick={()=>onOpenLb(allImgs,0)}><img src={thumbImgs[0]} alt="" loading="lazy"/></div>
          :<div className={gc}>{thumbImgs.map((img,idx)=><div key={idx} className="fi" onClick={()=>onOpenLb(allImgs,idx)}><img src={img} alt="" loading="lazy"/></div>)}</div>
        }
        {post.discount_pct>0&&!expired&&(
          <div className={`disc${dir==='ltr'?' ltr':''}`}>
            <span style={{fontSize:13}}>{post.discount_pct}%</span>
            <span style={{fontSize:7,opacity:.88}}>OFF</span>
          </div>
        )}
        {expired&&<div className="exp-ribbon"><span>{t('finished')}</span></div>}
        {allImgs.length>6&&<div style={{position:'absolute',bottom:8,left:8,background:'rgba(0,0,0,.65)',color:'#fff',fontSize:10,fontWeight:800,padding:'3px 8px',borderRadius:6,backdropFilter:'blur(4px)'}}>+{allImgs.length-6} <i className="fas fa-images" style={{fontSize:9,opacity:.8}}/></div>}
      </div>
      <div style={{padding:'13px 14px 14px'}}>
        <h3 style={{fontWeight:800,fontSize:15,lineHeight:1.4,marginBottom:10,fontFamily:'Noto Sans Arabic,Outfit,sans-serif'}}>
          {displayTitle}
          {isLongTitle&&<button className="title-toggle" onClick={e=>{e.stopPropagation();setTitleExp(x=>!x);}}>{titleExp?t('less'):t('more')}</button>}
        </h3>
        <div style={{marginBottom:12}}><Countdown iso={post.created_at} days={post.discount_days}/></div>
        <div className="post-actions">
          <button onClick={handleLike} className={`act-btn${liked?' liked':''}`}>
            <i className={liked?'fas fa-heart':'far fa-heart'}/>{likes>0?` ${likes}`:''}
          </button>
          <button onClick={()=>setActiveCmt(showCmt?null:post.id)} className={`act-btn${showCmt?' active':''}`}>
            <i className="fas fa-comment-alt"/> {t('cmt')}
          </button>
          <button onClick={handleShare} className="act-btn">
            <i className="fas fa-share-alt"/>{copied?' ✓':' '+t('share')}
          </button>
          {isAdmin&&(
            <div className="admin-btns">
              <button onClick={()=>onEdit(post)} className="btn btn-g" style={{padding:'4px 8px',fontSize:11,height:32}}><i className="fas fa-pencil-alt"/></button>
              <button onClick={()=>onDelete(post.id)} className="btn btn-d" style={{padding:'4px 8px',fontSize:11,height:32}}><i className="fas fa-trash"/></button>
            </div>
          )}
        </div>
        {showCmt&&<Comments postId={post.id} user={user} onLogin={onLogin}/>}
      </div>
    </div>
  );
}

function PostModal({editing,onSave,onClose}){
  const{t,toast}=useApp();
  const[imgs,setImgs]=useState(()=>editing?parseImgs(editing.images):[]);
  const[form,setForm]=useState({title_ckb:editing?.title_ckb||'',discount_pct:editing?.discount_pct??0,discount_days:editing?.discount_days||7,category:editing?.category||'rice'});
  const[saving,setSaving]=useState(false);
  const[cropFile,setCropFile]=useState(null);
  const[cropAsp,setCropAsp]=useState(1);
  const[upBusy,setUpBusy]=useState(false);
  const[upStatus,setUpStatus]=useState('');
  const[upDone,setUpDone]=useState(0);
  const[upTotal,setUpTotal]=useState(0);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const onCropped=async blob=>{
    setCropFile(null);setUpBusy(true);setUpStatus('Uploading…');
    try{const url=await uploadToStorage('posts-images',blob,'jpg');setImgs(p=>[...p,url]);toast('Image added ✓');}
    catch(e){toast(e.message||'Upload failed',false);}
    setUpBusy(false);setUpStatus('');
  };
  const handleMultiUpload=async files=>{
    const remaining=MAX_IMGS-imgs.length;
    if(remaining<=0){toast(`Max ${MAX_IMGS} images reached`,false);return;}
    const toUpload=files.slice(0,remaining);
    if(files.length>remaining)toast(`First ${toUpload.length} images selected (max ${MAX_IMGS} total)`,false);
    setUpBusy(true);setUpTotal(toUpload.length);setUpDone(0);
    const newUrls=[];
    for(let i=0;i<toUpload.length;i++){
      setUpStatus(`Uploading ${i+1} of ${toUpload.length}…`);setUpDone(i);
      try{const file=toUpload[i];const ext=(file.name.split('.').pop()||'jpg').toLowerCase();const url=await uploadToStorage('posts-images',file,ext);newUrls.push(url);}
      catch(err){}
    }
    setImgs(p=>[...p,...newUrls]);setUpBusy(false);setUpStatus('');setUpDone(0);setUpTotal(0);
    if(newUrls.length)toast(`${newUrls.length} image(s) uploaded ✓`);
  };
  const onFilesSelected=e=>{
    const files=Array.from(e.target.files||[]);
    if(!files.length)return;
    if(files.length===1){setCropFile(files[0]);}else{handleMultiUpload(files);}
    e.target.value='';
  };
  const submit=async()=>{
    if(!form.title_ckb.trim()||imgs.length===0){toast('ناونیشان و وێنە پێویستن',false);return;}
    setSaving(true);
    const payload={title_ckb:form.title_ckb.trim(),title_ar:form.title_ckb.trim(),title_en:form.title_ckb.trim(),discount_pct:+form.discount_pct,discount_days:+form.discount_days,category:form.category,images:JSON.stringify(imgs)};
    const{error}=editing?await SB.from('posts').update(payload).eq('id',editing.id):await SB.from('posts').insert({...payload,created_at:new Date().toISOString(),like_count:0});
    setSaving(false);
    if(error){toast(error.message,false);return;}
    toast(editing?'Updated ✓':'Published ✓');onSave();
  };
  return(
    <div className="ov" onClick={onClose}>
      <div className="mbox" onClick={e=>e.stopPropagation()}>
        <div className="mhdr"><h3>{editing?t('edit'):t('addPost')}</h3><button className="btn btn-g" onClick={onClose} style={{padding:'5px 10px'}}>×</button></div>
        <div className="mbody" style={{display:'flex',flexDirection:'column',gap:16}}>
          <div>
            <label style={{fontSize:11,fontWeight:700,color:'var(--gold)',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:.5}}>
              Images * <span style={{color:'var(--muted)',fontWeight:400,marginInlineStart:6}}>{imgs.length}/{MAX_IMGS}</span>
              {imgs.length>0&&<span style={{color:'var(--gold)',fontWeight:400,marginInlineStart:6,fontSize:10}}>(tap to remove)</span>}
            </label>
            <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:6}} className="nsb">
              {imgs.map((img,i)=>(
                <div key={i} style={{position:'relative',flexShrink:0}}>
                  <img src={img} alt="" style={{width:62,height:62,objectFit:'cover',borderRadius:8,border:'1px solid var(--border)',display:'block'}}/>
                  <button onClick={()=>setImgs(p=>p.filter((_,j)=>j!==i))} style={{position:'absolute',top:-4,right:-4,width:17,height:17,borderRadius:'50%',background:'var(--danger)',color:'#fff',border:'2px solid var(--elevated)',fontSize:8,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900}}>×</button>
                  {i===0&&<div style={{position:'absolute',bottom:2,left:2,background:'rgba(200,150,44,.85)',borderRadius:3,padding:'1px 4px',fontSize:7,fontWeight:800,color:'#fff'}}>MAIN</div>}
                </div>
              ))}
              {imgs.length<MAX_IMGS&&(
                <label style={{width:62,height:62,borderRadius:8,border:'1.5px dashed var(--border2)',background:'var(--bg)',flexShrink:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,cursor:upBusy?'wait':'pointer',opacity:upBusy?.5:1}}>
                  {upBusy?<i className="fas fa-spinner fa-spin gold"/>:<i className="fas fa-images gold"/>}
                  <span style={{fontSize:7,color:'var(--muted)',textAlign:'center',lineHeight:1.3}}>{upBusy?'…':'Add\nImages'}</span>
                  <input type="file" accept="image/*" multiple style={{display:'none'}} disabled={upBusy} onChange={onFilesSelected}/>
                </label>
              )}
            </div>
            {upBusy&&upTotal>0&&(
              <div className="up-progress">
                <i className="fas fa-spinner fa-spin gold" style={{fontSize:11,flexShrink:0}}/>
                <div className="up-progress-bar-wrap"><div className="up-progress-bar" style={{width:`${Math.round((upDone/upTotal)*100)}%`}}/></div>
                <span style={{fontSize:10,color:'var(--gold)',fontWeight:700,flexShrink:0,minWidth:60,textAlign:'end'}}>{upStatus}</span>
              </div>
            )}
            <div style={{display:'flex',alignItems:'center',gap:6,marginTop:8,flexWrap:'wrap'}}>
              <span style={{fontSize:10,color:'var(--muted)',marginInlineEnd:4}}>Crop ratio (single):</span>
              {[[1,'1:1'],[4/3,'4:3']].map(([r,l])=>(
                <button key={l} className={`btn ${cropAsp===r?'btn-gold':'btn-g'}`} style={{padding:'5px 12px',fontSize:11,borderRadius:20}} onClick={()=>setCropAsp(r)}>{l}</button>
              ))}
            </div>
          </div>
          {cropFile&&<CropModal file={cropFile} aspect={cropAsp} onDone={onCropped} onClose={()=>setCropFile(null)}/>}
          <div>
            <label style={{fontSize:11,fontWeight:700,color:'var(--gold)',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:.5}}>Title *</label>
            <input className="inp" dir="rtl" value={form.title_ckb} onChange={e=>set('title_ckb',e.target.value)} placeholder="بۆ نمونە: برنجی تازە"/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',display:'block',marginBottom:5}}>Discount % <span className="gold">(0=none)</span></label>
              <input className="inp" type="number" min="0" max="99" value={form.discount_pct} onChange={e=>set('discount_pct',e.target.value)}/>
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',display:'block',marginBottom:5}}>Days</label>
              <input className="inp" type="number" min="1" max="365" value={form.discount_days} onChange={e=>set('discount_days',e.target.value)}/>
            </div>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',display:'block',marginBottom:8}}>Category</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {CATS.filter(c=>c!=='all').map(c=>(
                <button key={c} onClick={()=>set('category',c)} className={`btn ${form.category===c?'btn-gold':'btn-g'}`} style={{borderRadius:20,padding:'7px 14px',fontSize:12}}>
                  {CAT_ICONS[c]} {TX.ckb.cats[c]}
                </button>
              ))}
            </div>
          </div>
          <button className="btn btn-gold wf" onClick={submit} disabled={saving||upBusy||!form.title_ckb.trim()||imgs.length===0} style={{padding:'13px',fontSize:14}}>
            {saving?<><i className="fas fa-spinner fa-spin"/> Saving…</>:upBusy?<><i className="fas fa-spinner fa-spin"/> Uploading…</>:'✓ '+t('pub')}
          </button>
        </div>
      </div>
    </div>
  );
}

function SpModal({sponsors,onUpdate,onClose}){
  const{t,toast}=useApp();
  const[list,setList]=useState(sponsors);
  const[step,setStep]=useState('pick');
  const[picked,setPicked]=useState(null);
  const[croppedBlob,setCroppedBlob]=useState(null);
  const[preview,setPreview]=useState(null);
  const[isVid,setIsVid]=useState(false);
  const[link,setLink]=useState('');
  const[placement,setPlacement]=useState('float');
  const[busy,setBusy]=useState(false);
  const fileRef=useRef(null);
  useEffect(()=>()=>{if(preview&&preview.startsWith('blob:'))URL.revokeObjectURL(preview);},[preview]);
  const reset=()=>{if(preview&&preview.startsWith('blob:'))URL.revokeObjectURL(preview);setPicked(null);setCroppedBlob(null);setPreview(null);setIsVid(false);setLink('');setStep('pick');};
  const onPick=e=>{
    const f=e.target.files[0];if(!f)return;
    if(preview&&preview.startsWith('blob:'))URL.revokeObjectURL(preview);
    const url=URL.createObjectURL(f);const vid=f.type.startsWith('video/');
    setPicked(f);setPreview(url);setIsVid(vid);setStep(vid?'link':'crop');e.target.value='';
  };
  const onCropped=blob=>{
    if(preview&&preview.startsWith('blob:'))URL.revokeObjectURL(preview);
    setCroppedBlob(blob);setPreview(URL.createObjectURL(blob));setStep('link');
  };
  const handleDone=async()=>{
    setBusy(true);
    try{
      let mediaUrl;
      if(isVid){const ext=(picked.name.split('.').pop()||'mp4').toLowerCase();mediaUrl=await uploadToStorage('images',picked,ext);}
      else{mediaUrl=await uploadToStorage('images',croppedBlob,'jpg');}
      const{data,error}=await SB.from('sponsors').insert({image_url:mediaUrl,visible:true,link_url:link.trim()||null,sort_order:list.length,placement}).select().single();
      if(error)throw new Error(error.message);
      setList(p=>[...p,data]);toast('Sponsor added ✓');reset();
    }catch(e){toast(e.message||'Upload failed.',false);}
    setBusy(false);
  };
  const toggle=async(id,cur)=>{await SB.from('sponsors').update({visible:!cur}).eq('id',id);setList(p=>p.map(s=>s.id===id?{...s,visible:!cur}:s));};
  const remove=async id=>{if(!window.confirm('Remove this sponsor?'))return;await SB.from('sponsors').delete().eq('id',id);setList(p=>p.filter(s=>s.id!==id));toast('Removed');};
  return(
    <div className="ov" onClick={step==='crop'?undefined:onClose}>
      <div className="mbox" onClick={e=>e.stopPropagation()}>
        <div className="mhdr"><h3>{t('mgSp')}</h3><button className="btn btn-g" style={{padding:'5px 10px'}} onClick={()=>{onUpdate(list);onClose();}}>✓ {t('save')}</button></div>
        <div className="mbody" style={{display:'flex',flexDirection:'column',gap:16}}>
          {step==='pick'&&(
            <>
              <div>
                <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',display:'block',marginBottom:8,textTransform:'uppercase',letterSpacing:.5}}>{t('spPlace')}</label>
                <div className="pl-toggle">
                  <button className={`pl-btn${placement==='top'?' sel':''}`} onClick={()=>setPlacement('top')}><i className="fas fa-arrow-up"/><span>{t('spTop')}</span></button>
                  <button className={`pl-btn${placement==='float'?' sel':''}`} onClick={()=>setPlacement('float')}><i className="fas fa-layer-group"/><span>{t('spFloat')}</span></button>
                </div>
              </div>
              <button className="btn btn-g wf" onClick={()=>fileRef.current?.click()} style={{padding:'20px',gap:10,fontSize:14,borderStyle:'dashed',borderRadius:14,flexDirection:'column'}}>
                <i className="fas fa-images gold" style={{fontSize:22}}/><span>{t('gallery')}</span>
              </button>
              <input ref={fileRef} type="file" accept="image/*,video/*" style={{display:'none'}} onChange={onPick}/>
            </>
          )}
          {step==='crop'&&picked&&!isVid&&<CropModal file={picked} aspect={4} onDone={onCropped} onClose={reset}/>}
          {step==='link'&&preview&&(
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div style={{borderRadius:10,overflow:'hidden',border:'1px solid var(--border)',background:'#000'}}>
                {isVid?<video src={preview} controls muted style={{width:'100%',maxHeight:100,objectFit:'contain',display:'block'}}/>:<img src={preview} alt="" style={{width:'100%',height:65,objectFit:'cover',display:'block'}}/>}
              </div>
              <div>
                <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:.5}}>{t('spLink')}</label>
                <input className="inp" placeholder="https://... (optional)" value={link} onChange={e=>setLink(e.target.value)} style={{fontSize:13}} dir="ltr"/>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                <button className="btn btn-g" onClick={reset} disabled={busy} style={{padding:'12px'}}>Change</button>
                <button className="btn btn-gold" onClick={handleDone} disabled={busy} style={{padding:'12px',fontSize:14}}>
                  {busy?<><i className="fas fa-spinner fa-spin"/> Uploading…</>:<><i className="fas fa-check"/> Done</>}
                </button>
              </div>
            </div>
          )}
          {list.length>0&&(
            <div>
              <p style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,marginBottom:8}}>Current ({list.length})</p>
              {list.map(s=>(
                <div key={s.id} style={{display:'flex',alignItems:'center',gap:8,padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
                  {isVideoUrl(s.image_url)?<div style={{width:76,height:26,background:'var(--border)',borderRadius:5,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><i className="fas fa-film" style={{color:'var(--muted)',fontSize:12}}/></div>
                    :<img src={s.image_url} alt="" style={{width:76,height:26,objectFit:'cover',borderRadius:5,border:'1px solid var(--border)',flexShrink:0}}/>}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:9,color:'var(--gold)',fontWeight:700,marginBottom:1}}>{s.placement==='top'?'Top':'Float'}</div>
                    <div style={{fontSize:10,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',direction:'ltr'}}>{s.link_url||'No link'}</div>
                  </div>
                  <button className="btn btn-g" style={{padding:'3px 7px',flexShrink:0,fontSize:10,height:24}} onClick={()=>toggle(s.id,s.visible)}>{s.visible?t('hide'):t('show')}</button>
                  <button className="btn btn-d" style={{padding:'3px 7px',flexShrink:0,fontSize:12,height:24}} onClick={()=>remove(s.id)}>×</button>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

        {user?(
          <>
            {isAdmin&&<>
              <button className="di" onClick={()=>{onAdd();onClose();}}><div className="dico" style={{background:'rgba(200,150,44,.12)'}}><i className="fas fa-plus" style={{color:'var(--gold)',fontSize:12}}/></div>{t('addPost')}</button>
              <button className="di" onClick={()=>{onSp();onClose();}}><div className="dico" style={{background:'rgba(167,139,250,.1)'}}><i className="fas fa-images" style={{color:'#a78bfa',fontSize:12}}/></div>{t('mgSp')}</button>
            </>}
            <button className="di" onClick={()=>{onProfile();onClose();}}><div className="dico" style={{background:'rgba(96,165,250,.1)'}}><i className="fas fa-user-circle" style={{color:'#60a5fa',fontSize:13}}/></div>{t('profile')}</button>
            <button className="di" onClick={logout} style={{color:'var(--danger)'}}>
              <div className="dico" style={{background:'rgba(239,68,68,.1)'}}><i className="fas fa-sign-out-alt" style={{color:'var(--danger)',fontSize:12}}/></div>{t('logout')}
            </button>
          </>
        ):(
          <>
            <button className="di" onClick={()=>{onAuth();onClose();}}><div className="dico" style={{background:'rgba(200,150,44,.12)'}}><i className="fas fa-user" style={{color:'var(--gold)',fontSize:12}}/></div>{t('login')}</button>
            <button className="di" onClick={()=>{onAuth();onClose();}}><div className="dico" style={{background:'rgba(200,150,44,.12)'}}><i className="fas fa-user-plus" style={{color:'var(--gold)',fontSize:12}}/></div>{t('signup')}</button>
          </>
        )}
      </div>
    </div>
  );
}

function App(){
  const{t,lang,dir,user,profile,isAdmin,toast}=useApp();
  const[posts,setPosts]=useState([]);
  const[sponsors,setSponsors]=useState([]);
  const[cat,setCat]=useState('all');
  const[shown,setShown]=useState(3);
  const[loading,setLoading]=useState(true);
  const[active,setActive]=useState('hero');
  const[drawer,setDrawer]=useState(false);
  const[authOpen,setAuthOpen]=useState(false);
  const[postModal,setPostModal]=useState(false);
  const[editing,setEditing]=useState(null);
  const[spOpen,setSpOpen]=useState(false);
  const[profileOpen,setProfileOpen]=useState(false);
  const[needLogin,setNeedLogin]=useState(false);
  const[globalLb,setGlobalLb]=useState(null);
  const[activeCmt,setActiveCmt]=useState(null);

  const loadPosts=useCallback(async(silent=false)=>{
    if(!silent)setLoading(true);
    try{const{data,error}=await SB.from('posts').select('*').order('created_at',{ascending:false});if(error)throw error;setPosts(data||[]);}
    catch(e){if(!silent)toast('Failed to load posts',false);}
    if(!silent)setLoading(false);
  },[toast]);

  const loadSponsors=useCallback(async()=>{
    try{const{data}=await SB.from('sponsors').select('*').eq('visible',true).order('sort_order');setSponsors(data||[]);}catch{}
  },[]);

  useEffect(()=>{loadPosts(false);loadSponsors();},[]);
  useEffect(()=>{setShown(3);},[cat]);
  useEffect(()=>{const id=setInterval(()=>loadPosts(true),90000);return()=>clearInterval(id);},[loadPosts]);

  useEffect(()=>{
    const ids=['hero','deals','locs','reviews','contact'];
    const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)setActive(e.target.id);}),{threshold:.18});
    ids.forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el);});
    return()=>obs.disconnect();
  },[]);

  const deletePost=async id=>{
    if(!window.confirm(t('del')+'?'))return;
    await SB.from('posts').delete().eq('id',id);
    setPosts(p=>p.filter(x=>x.id!==id));toast('Deleted');
  };
  const handleSaved=()=>{setPostModal(false);setEditing(null);loadPosts(true);};
  const filtered=useMemo(()=>cat==='all'?posts:posts.filter(p=>p.category===cat),[posts,cat]);
  const visible=filtered.slice(0,shown);
  const go=id=>document.getElementById(id)?.scrollIntoView({behavior:'smooth'});
  const handleOpenLb=useCallback((imgs,idx)=>setGlobalLb({imgs,idx}),[]);
  const handleCloseLb=useCallback(()=>setGlobalLb(null),[]);

  const navItems=[
    {id:'hero',i:'fa-home',l:t('home')},
    {id:'deals',i:'fa-tags',l:t('deals')},
    {id:'locs',i:'fa-map-marker-alt',l:t('locs')},
    {id:'contact',i:'fa-phone',l:t('contact')},
  ];

  return(
    <div className={dir==='rtl'?'rtl':'ltr'}>
      <SponsorsDisplay sponsors={sponsors}/>

      {/* TICKER */}
      <div className="ticker-wrap">
        <div className="ticker-inner">
          {[...Array(4)].map((_,i)=>(
            <React.Fragment key={i}>
              <span>حلال مارکێت · Halal Market</span>
              <span>کاڵای تازە · Fresh Products</span>
              <span>باشترین نرخ · Best Prices</span>
              <span>هەولێر · Erbil Kurdistan</span>
              <span>٠٧٥١٧٩٨٥٩٧١</span>
              <span>٠٧٥٠٧٣٦٤٦١٥</span>
            </React.Fragment>
          ))}
        </div>
      </div>

      {/* HEADER */}
      <header className="hdr">
        <div className="c hdr-inner">
          <div className="logo-wrap" onClick={()=>go('hero')}>
            <img src={LOGO} alt="حلال مارکێت" className="logo-img" onError={e=>{e.target.style.display='none'}}/>
            <div>
              <div className="logo-name">حلال مارکێت</div>
              <div className="logo-sub">Erbil · Kurdistan</div>
            </div>
          </div>
          <nav className="hd flex gap2">
            {[{id:'hero',l:t('home')},{id:'deals',l:t('deals')},{id:'locs',l:t('locs')},{id:'reviews',l:t('reviews')},{id:'contact',l:t('contact')}].map(x=>(
              <button key={x.id} onClick={()=>go(x.id)} className="btn btn-g"
                style={{padding:'6px 11px',fontSize:12,color:active===x.id?'var(--gold)':'var(--muted)',borderColor:active===x.id?'rgba(200,150,44,.3)':'transparent',background:active===x.id?'rgba(200,150,44,.06)':'transparent'}}>
                {x.l}
              </button>
            ))}
          </nav>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {isAdmin&&<button onClick={()=>{setEditing(null);setPostModal(true);}} className="btn btn-gold hd" style={{padding:'7px 12px',fontSize:12}}><i className="fas fa-plus"/> {t('addPost')}</button>}
            {user&&(
              <div style={{cursor:'pointer'}} onClick={()=>setProfileOpen(true)}>
                {profile?.avatar_url
                  ?<img src={profile.avatar_url} style={{width:30,height:30,borderRadius:'50%',objectFit:'cover',border:'2px solid var(--gold)',display:'block'}}/>
                  :<div style={{width:30,height:30,borderRadius:'50%',background:'var(--elevated)',border:'2px solid var(--gold)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:'var(--gold)'}}>{user.email[0].toUpperCase()}</div>
                }
              </div>
            )}
            <button className="btn btn-g" style={{padding:'8px 10px'}} onClick={()=>setDrawer(true)}><i className="fas fa-bars"/></button>
          </div>
        </div>
      </header>

      {/* HERO */}
      <section id="hero">
        <div className="hero-bg">
          <img src={HERO_IMG} alt="حلال مارکێت" onError={e=>{e.target.parentElement.style.background='linear-gradient(150deg,#071510,#0b1e15)'}}/>
        </div>
        <div className="hero-overlay"/>
        <div style={{position:'absolute',width:500,height:500,borderRadius:'50%',background:'radial-gradient(circle,rgba(200,150,44,.06),transparent 70%)',top:'5%',insetInlineEnd:'-8%',filter:'blur(80px)',animation:'glow 6s ease-in-out infinite',zIndex:2,pointerEvents:'none'}}/>
        <div style={{position:'absolute',width:380,height:380,borderRadius:'50%',background:'radial-gradient(circle,rgba(34,197,94,.05),transparent 70%)',bottom:'8%',insetInlineStart:'-6%',filter:'blur(80px)',animation:'glow 8s ease-in-out 2s infinite',zIndex:2,pointerEvents:'none'}}/>

        <div className="hero-body">
          <h1 className="hero-title">HALAL<br/>MARKET</h1>
          <div className="hero-ar">
            {lang==='ckb'?'حلال مارکێت · هەولێر':lang==='ar'?'هلال ماركت · أربيل':'Halal Market · Erbil'}
          </div>
          <p className="hero-desc">{t('sub')}</p>
          <div className="hero-btns">
            <button onClick={()=>go('deals')} className="btn btn-gold" style={{padding:'13px 28px',borderRadius:30,fontSize:14}}>
              <i className="fas fa-tags"/> {t('viewDeals')}
            </button>
            <button onClick={()=>go('locs')} className="btn btn-ghost" style={{padding:'13px 24px',borderRadius:30,fontSize:14}}>
              <i className="fas fa-map-marker-alt"/> {t('findStore')}
            </button>
          </div>
          <div className="hero-trust">
            {[{n:'2',l:t('br')},{n:'5,000+',l:t('pr')},{n:t('wk'),l:t('dc')}].map((s,i)=>(
              <div key={i} className="hero-trust-item">
                <div className="hero-trust-n">{s.n}</div>
                <div className="hero-trust-l">{s.l}</div>
              </div>
            ))}
          </div>
        </div>

        <div style={{position:'absolute',bottom:20,left:'50%',transform:'translateX(-50%)',zIndex:3,display:'flex',flexDirection:'column',alignItems:'center',gap:5,color:'rgba(255,255,255,.22)',animation:'fadeIn 1s ease 2s both'}}>
          <span style={{fontSize:7.5,letterSpacing:3,fontWeight:700,textTransform:'uppercase'}}>scroll</span>
          <i className="fas fa-chevron-down" style={{fontSize:10,animation:'float 2.4s ease-in-out infinite'}}/>
        </div>
      </section>

      <div className="divline"/>

      {/* DEALS */}
      <section id="deals" style={{padding:'56px 0',background:'var(--bg)'}}>
        <div className="c">
          <div className="stitle">
            <div className="stitle-bar"/>
            <div style={{flex:1}}>
              <h2>{t('dtitle')}</h2>
              <div className="stitle-sub">{lang==='ckb'?'داشکاندنی ئەم هەفتەیە':lang==='ar'?'عروض هذا الأسبوع':'Fresh weekly offers'}</div>
            </div>
            <span className="badge">{filtered.length}</span>
            {isAdmin&&<button onClick={()=>{setEditing(null);setPostModal(true);}} className="btn btn-gold" style={{padding:'7px 12px',fontSize:12}}><i className="fas fa-plus"/> {t('addPost')}</button>}
          </div>
          <div style={{display:'flex',gap:7,overflowX:'auto',paddingBottom:14,marginBottom:24}} className="nsb">
            {CATS.map(c=>(
              <button key={c} onClick={()=>setCat(c)} className={`btn ${cat===c?'btn-gold':'btn-g'}`} style={{borderRadius:22,padding:'8px 16px',fontSize:12,whiteSpace:'nowrap',gap:5}}>
                <span>{CAT_ICONS[c]}</span>{t('cats.'+c)}
              </button>
            ))}
          </div>
          {loading?(
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
              {[1,2,3].map(i=>(
                <div key={i} className="card">
                  <div className="sk" style={{height:200}}/>
                  <div style={{padding:14,display:'flex',flexDirection:'column',gap:8}}>
                    <div className="sk" style={{height:13,width:'68%'}}/><div className="sk" style={{height:11,width:'44%'}}/>
                  </div>
                </div>
              ))}
            </div>
          ):filtered.length===0?(
            <div style={{textAlign:'center',padding:'64px 20px',color:'var(--muted)'}}>
              <div style={{fontSize:48,marginBottom:12}}>🏷️</div>
              <p style={{fontSize:15}}>{t('noPosts')}</p>
            </div>
          ):(
            <>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
                {visible.map(post=>(
                  <DealCard key={post.id} post={post} user={user} isAdmin={isAdmin}
                    onLogin={()=>setNeedLogin(true)} onDelete={deletePost}
                    onEdit={p=>{setEditing(p);setPostModal(true);}}
                    onOpenLb={handleOpenLb} activeCmt={activeCmt} setActiveCmt={setActiveCmt}/>
                ))}
              </div>
              {filtered.length>3&&shown<=3&&(
                <div style={{textAlign:'center',marginTop:26}}>
                  <button className="btn btn-gold" style={{borderRadius:30,padding:'12px 32px'}} onClick={()=>setShown(filtered.length)}>
                    <i className="fas fa-chevron-down"/> {t('more')} ({filtered.length-3})
                  </button>
                </div>
              )}
              {shown>3&&filtered.length>3&&(
                <div style={{textAlign:'center',marginTop:26}}>
                  <button className="btn btn-g" style={{borderRadius:30,padding:'12px 28px'}} onClick={()=>setShown(3)}>
                    <i className="fas fa-chevron-up"/> {t('less')}
                  </button>
                </div>
              )}
            </>
          )}
        </div>
      </section>

      <div className="divline"/>

      {/* LOCATIONS */}
      <section id="locs" style={{padding:'56px 0',background:'var(--surface)'}}>
        <div className="c">
          <div className="stitle">
            <div className="stitle-bar"/>
            <div>
              <h2>{t('ltitle')}</h2>
              <div className="stitle-sub">{lang==='ckb'?'هەر دوو لقەکانمان':lang==='ar'?'كلا الفرعين':'Find us near you'}</div>
            </div>
          </div>
          <div className="loc-grid">
            {LOCATIONS.map((loc,idx)=>(
              <div key={loc.id} className="loc-card">
                <span className="loc-num">{String(idx+1).padStart(2,'0')}</span>
                <div className="loc-icon"><i className="fas fa-store" style={{color:'var(--gold)'}}/></div>
                <h3 className="loc-name">{loc.name[lang]||loc.name.en}</h3>
                <div className="loc-meta">
                  <div className="loc-row"><i className="fas fa-map-marker-alt"/><span>{loc.addr[lang]||loc.addr.en}</span></div>
                  <div className="loc-row"><i className="fas fa-phone"/><span>{loc.phone_display}</span></div>
                  <div className="loc-row"><i className="far fa-clock"/><span>{loc.hr}</span></div>
                  <div className="loc-row"><i className="fas fa-circle" style={{color:'var(--green)',fontSize:7}}/><span style={{color:'var(--green)',fontWeight:700}}>{t('open')}</span></div>
                </div>
                <div className="loc-btns">
                  <a href={loc.fb} target="_blank" rel="noreferrer" className="btn btn-gold" style={{ padding: '8px', borderRadius: '10px' }}>
  <i className="fab fa-facebook"></i>
</a>
                  <a href={loc.link} target="_blank" rel="noopener noreferrer" className="btn btn-gold" style={{borderRadius:10,padding:'9px 8px',fontSize:11,gap:4}}>
                    <i className="fas fa-map-marker-alt"/> {t('openMap')}
                  </a>
                  <a href={`tel:+964${loc.phone.replace(/^0/,'')}`} className="btn btn-ghost" style={{borderRadius:10,padding:'9px 8px',fontSize:11,gap:4}}>
                    <i className="fas fa-phone"/> {t('call')}
                  </a>
                  <a href={`https://wa.me/964${loc.phone.replace(/^0/,'')}`} target="_blank" rel="noreferrer" className="btn btn-ghost" style={{borderRadius:10,padding:'9px 8px',fontSize:11,gap:4,color:'#25d366',borderColor:'rgba(37,211,102,.2)'}}>
                    <i className="fab fa-whatsapp"/>
                  </a>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      <div className="divline"/>

      {/* REVIEWS */}
      <section id="reviews" style={{padding:'56px 0',background:'var(--bg)'}}>
        <div className="c">
          <div className="stitle">
            <div className="stitle-bar"/>
            <div>
              <h2>{t('rtitle')}</h2>
              <div className="stitle-sub">{lang==='ckb'?'نرخاندنی کڕیارەکانمان':lang==='ar'?'آراء عملائنا الكرام':'What our customers say'}</div>
            </div>
          </div>
          <div className="rev-head">
            <div>
              <div className="rev-big-n">4.9</div>
              <div className="rev-stars" style={{marginTop:4}}>
                {[1,2,3,4,5].map(i=><span key={i} className="rev-star"><i className="fas fa-star"/></span>)}
              </div>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>+200 {lang==='ckb'?'نرخاندن':lang==='ar'?'تقييم':'reviews'}</div>
            </div>
            <div className="rev-big-s">
              {[['5★',92],[4,6],[3,2]].map(([l,p])=>(
                <div key={l} style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:11,color:'var(--muted)',width:20}}>{l}</span>
                  <div style={{width:110,height:5,background:'var(--border)',borderRadius:3,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${p}%`,background:'linear-gradient(90deg,var(--gold),var(--gold2))',borderRadius:3}}/>
                  </div>
                  <span style={{fontSize:10,color:'var(--muted)'}}>{p}%</span>
                </div>
              ))}
            </div>
          </div>
          <div className="rev-scroll">
            {REVIEWS.map(r=>(
              <div key={r.id} className="rev-card">
                <div className="rev-stars">
                  {[1,2,3,4,5].map(i=><span key={i} className="rev-star" style={{opacity:i<=r.stars?1:.25}}><i className="fas fa-star"/></span>)}
                </div>
                <p className="rev-txt">{r[lang]||r.en}</p>
                <div style={{display:'flex',alignItems:'center',gap:7}}>
                  <div style={{width:28,height:28,borderRadius:'50%',background:'rgba(200,150,44,.12)',border:'1px solid rgba(200,150,44,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13}}>👤</div>
                  <span className="rev-name">{r.name}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      <div className="divline"/>

      {/* Facebook Buttons Start */}
<div style={{ display: 'flex', flexWrap: 'wrap', gap: '12px', justifyContent: 'center', padding: '20px 0' }}>
  <a href="https://www.facebook.com/share/1AmkRDDf5S/" target="_blank" rel="noreferrer" className="btn btn-gold">
    <i className="fab fa-facebook" style={{ fontSize: '18px' }}></i> Halal Market 1
  </a>
  <a href="https://www.facebook.com/share/18LEioK1mf/" target="_blank" rel="noreferrer" className="btn btn-gold">
    <i className="fab fa-facebook" style={{ fontSize: '18px' }}></i> Halal Market 2
  </a>
</div>
      
{/* Facebook Buttons End */}
      {/* FOOTER */}
      <footer style={{background:'var(--elevated)',borderTop:'1px solid var(--border)',padding:'36px 16px 78px',textAlign:'center'}}>
  <img src={LOGO} alt="حلال مارکێت" style={{width:52,height:52,objectFit:'contain',borderRadius:12,margin:'0 auto 14px',border:'1px solid rgba(200,150,44,.2)',display:'block'}} onError={e=>{e.target.style.display='none'}}/>
  <div style={{fontFamily:'Syne,sans-serif',fontWeight:900,fontSize:24,marginBottom:4,background:'linear-gradient(120deg,var(--gold3),var(--gold))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>حلال مارکێت</div>
  <div style={{fontSize:8,fontWeight:700,letterSpacing:3.5,color:'var(--muted)',marginBottom:12,textTransform:'uppercase'}}>ERBIL · KURDISTAN</div>
  
  <div style={{height:1,background:'linear-gradient(90deg,transparent,var(--border),transparent)',margin:'16px auto',maxWidth:320}}/>
  <p style={{fontSize:10,color:'var(--border2)'}}>{t('copy')}</p>
</footer>
      
      {/* MOBILE NAV */}
      <nav className="mnav md">
        {navItems.map(x=>(
          <button key={x.id} className={`mnb ${active===x.id?'act':''}`} onClick={()=>go(x.id)}>
            <i className={`fas ${x.i}`}/>{x.l}
          </button>
        ))}
        <button className="mnb" onClick={()=>setDrawer(true)}>
          <i className="fas fa-bars"/>{t('menu')}
        </button>
      </nav>

      {/* FABs */}
      
      {globalLb&&<GlobalLightbox imgs={globalLb.imgs} startIdx={globalLb.idx} onClose={handleCloseLb}/>}

      {drawer&&<Drawer onClose={()=>setDrawer(false)} onAuth={()=>setAuthOpen(true)} onAdd={()=>{setEditing(null);setPostModal(true);}} onSp={()=>setSpOpen(true)} onProfile={()=>setProfileOpen(true)}/>}
      {authOpen&&<AuthModal onClose={()=>setAuthOpen(false)}/>}
      {profileOpen&&<ProfileModal onClose={()=>setProfileOpen(false)}/>}
      {postModal&&<PostModal editing={editing} onSave={handleSaved} onClose={()=>{setPostModal(false);setEditing(null);}}/>}
      {spOpen&&<SpModal sponsors={sponsors} onUpdate={s=>{setSponsors(s);loadSponsors();}} onClose={()=>setSpOpen(false)}/>}

      {needLogin&&(
        <div className="ov" onClick={()=>setNeedLogin(false)}>
          <div className="mbox" style={{maxWidth:320}} onClick={e=>e.stopPropagation()}>
            <div className="mbody" style={{textAlign:'center'}}>
              <div style={{fontSize:44,marginBottom:10}}>❤️</div>
              <h3 style={{fontWeight:800,fontSize:17,marginBottom:6}}>{t('loginFirst')}</h3>
              <p style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>
                {lang==='ckb'?'تۆمار بکە یان بچۆ ژوورەوە':lang==='ar'?'سجّل أو ادخل إلى حسابك':'Sign up or log in to continue'}
              </p>
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-gold f1" onClick={()=>{setNeedLogin(false);setAuthOpen(true);}}>{t('login')}</button>
                <button className="btn btn-g f1" onClick={()=>{setNeedLogin(false);setAuthOpen(true);}}>{t('signup')}</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const Root=()=><Provider><App/></Provider>;
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
