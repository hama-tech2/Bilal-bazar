*{box-sizing:border-box;margin:0;padding:0}

::-webkit-scrollbar{width:5px}

::-webkit-scrollbar-thumb{background:var(--accent-dim);border-radius:3px}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-12px)}to{opacity:1;transform:translate(-50%,0)}}

/* Layout */
.container{max-width:1080px;margin:0 auto;padding:0 16px}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.justify-center{justify-content:center}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.wrap{flex-wrap:wrap}
.grid{display:grid}.grid-1{grid-template-columns:1fr}.grid-2{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(3,1fr)}

.overflow-hidden{overflow:hidden}.overflow-y-auto{overflow-y:auto}

/* Typography */
.text-xs{font-size:11px}.text-sm{font-size:13px}.text-base{font-size:15px}.text-lg{font-size:18px}.text-xl{font-size:22px}.text-2xl{font-size:28px}.text-3xl{font-size:40px}
.font-medium{font-weight:500}.font-bold{font-weight:700}.font-extrabold{font-weight:800}
.text-center{text-align:center}.text-muted{color:var(--muted)}.text-accent{color:var(--accent)}.text-danger{color:var(--danger)}
.tracking-widest{letter-spacing:.2em}.uppercase{text-transform:uppercase}

/* Spacing */
.p-2{padding:8px}.p-3{padding:12px}.p-4{padding:16px}.p-5{padding:20px}
.px-3{padding-left:12px;padding-right:12px}.px-4{padding-left:16px;padding-right:16px}
.py-2{padding-top:8px;padding-bottom:8px}.py-3{padding-top:12px;padding-bottom:12px}.py-4{padding-top:16px;padding-bottom:16px}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mt-6{margin-top:24px}
.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
.mx-auto{margin-left:auto;margin-right:auto}

/* Components */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-dim));color:#02140d}
.btn-primary:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--accent);color:var(--text)}
.btn-danger{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.25)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(16,185,129,.1);color:var(--accent);border:1px solid rgba(16,185,129,.2)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform .2s,border-color .2s,box-shadow .2s}
.card:hover{border-color:rgba(16,185,129,.3);box-shadow:0 12px 40px rgba(0,0,0,.45)}
.input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:#3d5a4e}
.select{appearance:none;background:var(--bg) url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b8f7e' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e") right 10px center/16px no-repeat;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 34px 11px 14px;color:var(--text);font-size:14px;outline:none}
.textarea{min-height:80px;resize:vertical}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:0}

.modal{background:var(--elevated);border:1px solid var(--border);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;border-radius:var(--radius) var(--radius) 0 0;animation:slideUp .25s ease}

.modal-header{position:sticky;top:0;background:var(--elevated);padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;z-index:2}
.modal-header h3{font-size:15px;font-weight:800}
.modal-body{padding:20px}

/* Drawer */

.ltr .drawer{left:0;animation:slideLeft .22s ease}
.drawer-item{display:flex;align-items:center;gap:12px;padding:12px 20px;font-size:14px;font-weight:600;color:var(--text);background:none;border:none;width:100%;text-align:inherit;cursor:pointer;transition:background .12s}
.drawer-item:hover{background:var(--elevated)}
.drawer-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--border)}

.mnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--muted);background:none;border:none;cursor:pointer;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.mnav-btn.active{color:var(--accent)}

/* Toast */
.toast-wrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--elevated);border:1px solid var(--border);padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.5);animation:toastIn .3s ease;pointer-events:auto;min-width:220px;text-align:center}
.toast-success{border-color:rgba(16,185,129,.3);color:var(--accent)}
.toast-error{border-color:rgba(239,68,68,.3);color:var(--danger)}

.sponsor-slide img{max-height:100%;max-width:100%;object-fit:contain}
.sponsor-link{width:100%;height:100%;display:flex;align-items:center;justify-content:center}

.crop-img{max-width:400px;max-height:400px;width:auto;height:auto;display:block;border-radius:var(--radius-sm)}

.comment-text{font-size:13px;line-height:1.5}

.skeleton{background:linear-gradient(90deg,var(--border) 25%,var(--elevated) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}

/* Misc */
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:0 16px}

.scroll-hint{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;color:rgba(255,255,255,.25);animation:fadeIn 1s ease 2.5s both}
.scroll-hint i{animation:float 2.5s ease-in-out infinite}

/* Section title */
.sec-title{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.sec-title::before{content:'';display:block;width:28px;height:3px;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent-dim));flex-shrink:0}
.sec-title h2{font-weight:900;font-size:24px}

@media(max-width:640px){.hide-mobile{display:none!important}}
@media(min-width:641px){.hide-desktop{display:none!important}}
</style>

const AppCtx=React.createContext();
function AppProvider({children}){
  const [lang,setLang]=useState('ckb');
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState(null);
  const [ready,setReady]=useState(false);
  const [toasts,setToasts]=useState([]);

  const t=useCallback(k=>{
    const keys=k.split('.');
    let v=T[lang];
    for(const x of keys){if(v==null)return k;v=v[x]}
    return v==null?k:String(v);
  },[lang]);

  const addToast=useCallback((msg,type='success')=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),3500);
  },[]);

  const sw=useCallback(l=>{
    setLang(l);
    document.documentElement.lang=l;
    document.documentElement.dir=l==='en'?'ltr':'rtl';
  },[]);

  useEffect(()=>{
    SB.auth.getSession().then(async({data:{session}})=>{
      const u=session?.user||null;
      setUser(u);
      if(u){
        const{data}=await SB.from('profiles').select('*').eq('id',u.id).single();
        setProfile(data||null);
      }
      setReady(true);
    });
    const{data:{subscription}}=SB.auth.onAuthStateChange(async(_,s)=>{
      const u=s?.user||null;
      setUser(u);
      if(u){
        const{data}=await SB.from('profiles').select('*').eq('id',u.id).single();
        setProfile(data||null);
      }else setProfile(null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  const isAdmin=!!(profile?.is_admin||user?.email===ADMIN_EMAIL);
  const dir=lang==='en'?'ltr':'rtl';

  return(
    <AppCtx.Provider value={{lang,t,sw,dir,user,profile,isAdmin,ready,addToast,toasts}}>
      {children}
    </AppCtx.Provider>
  );
}
const useApp=()=>useContext(AppCtx);

function timeLeft(iso,days){
  const diff=new Date(iso).getTime()+days*86400000-Date.now();
  if(diff<=0)return null;
  return{d:Math.floor(diff/86400000),h:Math.floor(diff%86400000/3600000),m:Math.floor(diff%3600000/60000)};
}
function parseImgs(v){try{return Array.isArray(v)?v:JSON.parse(v||'[]')}catch(e){return[]}}
async function uploadBlob(bucket,blob,ext='jpg'){
  const name=`${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
  const{error}=await SB.storage.from(bucket).upload(name,blob,{contentType:'image/jpeg'});
  if(error)throw error;
  return SB.storage.from(bucket).getPublicUrl(name).data.publicUrl;
}

/* ════════════════════════════════════════
   CROP MODAL
════════════════════════════════════════ */
function CropModal({file,aspect,onDone,onClose}){
  const{t,addToast}=useApp();
  const[img,setImg]=useState(null);
  const[crop,setCrop]=useState({x:0,y:0});
  const[dragging,setDragging]=useState(false);
  const dragRef=useRef({sx:0,sy:0,cx:0,cy:0});
  const wrapRef=useRef(null);
  const sizeRef=useRef({rw:0,rh:0,cw:0,ch:0});

  useEffect(()=>{
    const url=URL.createObjectURL(file);
    const image=new Image();
    image.onload=()=>{
      const nw=image.naturalWidth,nh=image.naturalHeight;
      const max=400;
      const scale=Math.min(max/nw,max/nh,1);
      const rw=nw*scale,rh=nh*scale;
      let cw=rw,ch=rh;
      if(aspect>=(rw/rh)){ch=rw/aspect;cw=rw}
      else{cw=rh*aspect;ch=rh}
      sizeRef.current={rw,rh,cw,ch,scale,nw,nh};
      setImg(image);
      setCrop({x:(rw-cw)/2,y:(rh-ch)/2});
    };
    image.src=url;
    return()=>URL.revokeObjectURL(url);
  },[file,aspect]);

  const onStart=e=>{
    setDragging(true);
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    dragRef.current={sx:cx,sy:cy,cx:crop.x,cy:crop.y};
  };
  const onMove=e=>{
    if(!dragging)return;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    const dx=cx-dragRef.current.sx,dy=cy-dragRef.current.sy;
    const{rw,rh,cw,ch}=sizeRef.current;
    setCrop({
      x:Math.max(0,Math.min(rw-cw,dragRef.current.cx+dx)),
      y:Math.max(0,Math.min(rh-ch,dragRef.current.cy+dy))
    });
  };
  const onEnd=()=>setDragging(false);

  const confirm=()=>{
    if(!img)return;
    const{scale,nw,cw,ch}=sizeRef.current;
    const sx=crop.x/scale,sy=crop.y/scale,sw=cw/scale,sh=ch/scale;
    const outW=Math.min(1200,sw);
    const outH=outW/aspect;
    const c=document.createElement('canvas');
    c.width=outW;c.height=outH;
    c.getContext('2d').drawImage(img,sx,sy,sw,sh,0,0,outW,outH);
    c.toBlob(b=>{if(b)onDone(b)},'image/jpeg',0.92);
  };

  if(!img)return null;
  const{rw,rh,cw,ch}=sizeRef.current;
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:480,textAlign:'center'}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><h3>{t('crop')}</h3><button className="btn btn-ghost" onClick={onClose} style={{padding:'6px 10px'}}>×</button></div>
        <div className="modal-body">
          <div className="crop-wrap" ref={wrapRef} onMouseDown={onStart} onMouseMove={onMove} onMouseUp={onEnd} onMouseLeave={onEnd} onTouchStart={onStart} onTouchMove={onMove} onTouchEnd={onEnd}>
            <img src={img.src} alt="" className="crop-img" style={{width:rw,height:rh}} draggable={false}/>
            <div className="crop-box" style={{left:crop.x,top:crop.y,width:cw,height:ch}}/>
          </div>
          <div className="flex gap-3 justify-center mt-4">
            <button className="btn btn-ghost" onClick={onClose}>{t('cancel')}</button>
            <button className="btn btn-primary" onClick={confirm}>{t('upload')}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

════════════════════════════════════════ */
function Lightbox({images,start,onClose}){
  const[i,setI]=useState(start);
  useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose();if(e.key==='ArrowLeft')setI(x=>(x-1+images.length)%images.length);if(e.key==='ArrowRight')setI(x=>(x+1)%images.length)};
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[images,onClose]);
  return(
    <div className="lightbox" onClick={onClose}>
      <button className="lightbox-close" onClick={onClose}>×</button>
      {images.length>1&&<div className="absolute top-4 left-1/2 transform -translate-x-1/2 text-xs text-muted">{i+1}/{images.length}</div>}
      <img src={images[i]} alt="" onClick={e=>e.stopPropagation()}/>
      {images.length>1&&<>
        <button className="lightbox-nav" style={{left:12}} onClick={e=>{e.stopPropagation();setI(x=>(x-1+images.length)%images.length)}}>‹</button>
        <button className="lightbox-nav" style={{right:12}} onClick={e=>{e.stopPropagation();setI(x=>(x+1)%images.length)}}>›</button>
      </>}
    </div>
  );
}

function Countdown({iso,days}){
  const{t}=useApp();
  const[tl,setTl]=useState(()=>timeLeft(iso,days));
  useEffect(()=>{const id=setInterval(()=>setTl(timeLeft(iso,days)),30000);return()=>clearInterval(id)},[iso,days]);
  if(!tl)return<span className="text-xs font-bold text-muted">{t('finished')}</span>;
  return(
    <div className="countdown">
      {[{v:tl.d,l:t('days')},{v:tl.h,l:t('hrs')},{v:tl.m,l:t('min')}].map((x,i)=>(
        <React.Fragment key={i}>
          {i>0&&<span className="countdown-sep">:</span>}
          <div className="countdown-box"><div className="countdown-num">{String(x.v).padStart(2,'0')}</div><div className="countdown-label">{x.l}</div></div>
        </React.Fragment>
      ))}
    </div>
  );
}

  useEffect(()=>{
    if(!user)return;
    SB.from('likes').select('id').eq('post_id',post.id).eq('user_id',user.id).maybeSingle().then(({data})=>setLiked(!!data));
  },[user?.id,post.id]);

      await SB.from('likes').delete().eq('post_id',post.id).eq('user_id',user.id);

  const handleShare=async()=>{
    const url=`${window.location.origin}?post=${post.id}`;
    if(navigator.share){try{await navigator.share({title,url})}catch(e){}}
    else if(navigator.clipboard){await navigator.clipboard.writeText(url);setShared(true);setTimeout(()=>setShared(false),2000)}
  };

  const n=images.length;
  const gridClass=n===1?'post-img-1':n===2?'post-img-2':n===3?'post-img-3':n===4?'post-img-4':'post-img-5';
  const vis=Math.min(n,5);

  return(

        {n===1?(
          <div className="fi" style={{height:240}} onClick={()=>setLb(0)}><img src={images[0]} alt="" loading="lazy"/></div>

  );

/* ════════════════════════════════════════
   POST MODAL
════════════════════════════════════════ */
function PostModal({editing,onSave,onClose}){
  const{t,addToast}=useApp();
  const[images,setImages]=useState(()=>editing?parseImgs(editing.images):[]);
  const[form,setForm]=useState({
    title_ckb:editing?.title_ckb||'',
    discount_pct:editing?.discount_pct??0,
    discount_days:editing?.discount_days||7,
    category:editing?.category||'rice'
  });
  const[saving,setSaving]=useState(false);
  const[cropFile,setCropFile]=useState(null);
  const[cropAspect,setCropAspect]=useState(1);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const onPick=e=>{
    const f=e.target.files[0];
    if(!f)return;
    setCropFile(f);
    setCropAspect(1);
  };

  const onCropped=async blob=>{
    if(!blob)return;
    setCropFile(null);
    try{
      const url=await uploadBlob('posts-images',blob);
      setImages(p=>[...p,url]);
    }catch(e){addToast('Upload failed','error')}
  };

  const submit=async()=>{
    if(!form.title_ckb.trim()||images.length===0)return;
    setSaving(true);
    const payload={
      title_ckb:form.title_ckb.trim(),
      title_ar:form.title_ckb.trim(),
      title_en:form.title_ckb.trim(),
      discount_pct:+form.discount_pct,
      discount_days:+form.discount_days,
      category:form.category,
      images:JSON.stringify(images)
    };
    if(editing){
      await SB.from('posts').update(payload).eq('id',editing.id);
    }else{
      await SB.from('posts').insert({...payload,created_at:new Date().toISOString(),like_count:0});
    }
    setSaving(false);
    onSave();
  };

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><h3>{editing?t('editPost'):t('addPost')}</h3><button className="btn btn-ghost" onClick={onClose} style={{padding:'6px 10px'}}>×</button></div>
        <div className="modal-body flex flex-col gap-4">
          <div>
            <label className="text-xs font-bold text-accent mb-2" style={{display:'block'}}>Images *</label>
            <div className="flex gap-2 overflow-x-auto pb-2">
              {images.map((img,i)=>(
                <div key={i} className="relative" style={{flexShrink:0}}>
                  <img src={img} alt="" style={{width:64,height:64,objectFit:'cover',borderRadius:8,border:'1px solid var(--border)'}}/>
                  <button onClick={()=>setImages(p=>p.filter((_,j)=>j!==i))} className="absolute top-0 right-0 w-5 h-5 rounded-full bg-danger text-white border-none text-xs font-bold cursor-pointer flex items-center justify-center" style={{transform:'translate(30%,-30%)'}}>×</button>
                </div>
              ))}
              {images.length<5&&(
                <label className="flex flex-col items-center justify-center gap-1 cursor-pointer" style={{width:64,height:64,borderRadius:8,border:'1.5px dashed var(--border)',background:'var(--bg)',flexShrink:0}}>
                  <i className="fas fa-camera text-accent"/><span className="text-xs text-muted">Add</span>
                  <input type="file" accept="image/*" style={{display:'none'}} onChange={onPick}/>
                </label>
              )}
            </div>
            {cropFile&&<CropModal file={cropFile} aspect={cropAspect} onDone={onCropped} onClose={()=>setCropFile(null)}/>}
            <div className="flex gap-2 mt-2">
              <button className={`btn ${cropAspect===1?'btn-primary':'btn-ghost'}`} style={{padding:'6px 12px',fontSize:12}} onClick={()=>setCropAspect(1)}>{t('ratio1')}</button>
              <button className={`btn ${cropAspect===4/3?'btn-primary':'btn-ghost'}`} style={{padding:'6px 12px',fontSize:12}} onClick={()=>setCropAspect(4/3)}>{t('ratio43')}</button>
            </div>
          </div>
          <div>
            <label className="text-xs font-bold text-accent mb-2" style={{display:'block'}}>{t('title')} *</label>
            <input className="input" dir="rtl" value={form.title_ckb} onChange={e=>set('title_ckb',e.target.value)} placeholder="بۆ نمونە: برنجی تازە"/>
          </div>
          <div className="grid grid-2 gap-3">
            <div>
              <label className="text-xs font-bold text-muted mb-2" style={{display:'block'}}>{t('pct')} <span className="text-accent">(0 = none)</span></label>
              <input className="input" type="number" min="0" max="99" value={form.discount_pct} onChange={e=>set('discount_pct',e.target.value)}/>
            </div>
            <div>
              <label className="text-xs font-bold text-muted mb-2" style={{display:'block'}}>{t('pdays')}</label>
              <input className="input" type="number" min="1" max="365" value={form.discount_days} onChange={e=>set('discount_days',e.target.value)}/>
            </div>
          </div>
          <div>
            <label className="text-xs font-bold text-muted mb-2" style={{display:'block'}}>{t('cat')}</label>
            <div className="flex wrap gap-2">
              {CATS.filter(c=>c!=='all').map(c=>(
                <button key={c} onClick={()=>set('category',c)} className={`btn ${form.category===c?'btn-primary':'btn-ghost'}`} style={{borderRadius:20,padding:'8px 16px',fontSize:12}}>
                  {T.ckb.cats[c]}
                </button>
              ))}
            </div>
          </div>
          <button className="btn btn-primary w-full" onClick={submit} disabled={saving||!form.title_ckb.trim()||images.length===0}>
            {saving?<i className="fas fa-spinner fa-spin"/>:'✓ '+t('pub')}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   SPONSOR MANAGER
════════════════════════════════════════ */
function SponsorModal({sponsors,onUpdate,onClose}){
  const{t,addToast}=useApp();
  const[list,setList]=useState(sponsors);
  const[link,setLink]=useState('');
  const[file,setFile]=useState(null);

  const add=async()=>{
    if(!file)return;
    try{
      const url=await uploadBlob('images',file);
      const{data,error}=await SB.from('sponsors').insert({image_url:url,visible:true,link_url:link||null,sort_order:list.length}).select().single();
      if(error)throw error;
      setList(p=>[...p,data]);
      setFile(null);setLink('');
    }catch(e){addToast('Upload failed','error')}
  };
  const toggle=async(id,cur)=>{
    await SB.from('sponsors').update({visible:!cur}).eq('id',id);
    setList(p=>p.map(s=>s.id===id?{...s,visible:!cur}:s));
  };
  const remove=async id=>{
    await SB.from('sponsors').delete().eq('id',id);
    setList(p=>p.filter(s=>s.id!==id));
  };

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><h3>{t('mgSp')}</h3><button className="btn btn-primary" style={{padding:'6px 14px',fontSize:12}} onClick={()=>{onUpdate(list);onClose()}}>{t('save')}</button></div>
        <div className="modal-body flex flex-col gap-3">
          <div className="flex gap-2">
            <input className="input" placeholder={t('sponsorLink')} value={link} onChange={e=>setLink(e.target.value)}/>
            <label className="btn btn-ghost" style={{flexShrink:0,cursor:'pointer'}}>
              {file?'1 file':'+ Image'}
              <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>setFile(e.target.files[0])}/>
            </label>
            <button className="btn btn-primary" style={{flexShrink:0}} onClick={add} disabled={!file}>+</button>
          </div>
          {list.map(s=>(
            <div key={s.id} className="flex items-center gap-3 py-2" style={{borderBottom:'1px solid var(--border)'}}>
              <img src={s.image_url} alt="" style={{width:80,height:40,objectFit:'cover',borderRadius:6,border:'1px solid var(--border)'}}/>
              <div className="text-xs text-muted flex-1 truncate">{s.link_url||'No link'}</div>
              <button className="btn btn-ghost" style={{padding:'6px 10px',fontSize:11}} onClick={()=>toggle(s.id,s.visible)}>{s.visible?t('hide'):t('show')}</button>
              <button className="btn btn-danger" style={{padding:'6px 10px',fontSize:11}} onClick={()=>remove(s.id)}>×</button>
            </div>
          ))}
          {!list.length&&<p className="text-sm text-muted text-center py-4">No sponsors yet.</p>}
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   APP
════════════════════════════════════════ */
function App(){
  const{t,lang,dir,user,isAdmin,addToast}=useApp();
  const[posts,setPosts]=useState([]);
  const[sponsors,setSponsors]=useState([]);
  const[cat,setCat]=useState('all');
  const[shown,setShown]=useState(3);
  const[loading,setLoading]=useState(true);
  const[active,setActive]=useState('hero');
  const[drawer,setDrawer]=useState(false);
  const[authOpen,setAuthOpen]=useState(false);
  const[postModal,setPostModal]=useState(false);
  const[editing,setEditing]=useState(null);
  const[spModal,setSpModal]=useState(false);
  const videoRef=useRef(null);

  /* Load posts + auto-delete expired */
  const loadPosts=useCallback(async()=>{
    setLoading(true);
    const{data}=await SB.from('posts').select('*').order('created_at',{ascending:false});
    const now=Date.now();
    const valid=[];const expiredIds=[];
    (data||[]).forEach(p=>{
      const end=new Date(p.created_at).getTime()+(p.discount_days+1)*86400000;
      if(now>end)expiredIds.push(p.id);else valid.push(p);
    });
    if(expiredIds.length){
      await SB.from('posts').delete().in('id',expiredIds);
    }
    setPosts(valid);
    setLoading(false);
  },[]);

  useEffect(()=>{loadPosts();loadSponsors()},[loadPosts]);
  useEffect(()=>{setShown(3)},[cat]);

  /* Video autoplay fix */
  useEffect(()=>{
    const v=videoRef.current;if(!v)return;
    const play=()=>v.play().catch(()=>{});
    v.addEventListener('canplay',play,{once:true});
    v.load();
    return()=>v.removeEventListener('canplay',play);
  },[]);

  /* Scroll spy */
  useEffect(()=>{
    const ids=['hero','deals','locs','about'];
    const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)setActive(e.target.id)})},{threshold:.2});
    ids.forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el)});
    return()=>obs.disconnect();
  },[]);

  /* Auto-delete interval */
  useEffect(()=>{
    const id=setInterval(loadPosts,60000);
    return()=>clearInterval(id);
  },[loadPosts]);

  async function loadSponsors(){
    const{data}=await SB.from('sponsors').select('*').eq('visible',true).order('sort_order',{ascending:true});
    setSponsors(data||[]);
  }

  const deletePost=async id=>{
    if(!window.confirm(t('del')+'?'))return;
    await SB.from('posts').delete().eq('id',id);
    setPosts(p=>p.filter(x=>x.id!==id));
    addToast('Post deleted','success');
  };

  const handleSaved=()=>{setPostModal(false);setEditing(null);loadPosts()};

  const filtered=useMemo(()=>cat==='all'?posts:posts.filter(p=>p.category===cat),[posts,cat]);
  const visible=filtered.slice(0,shown);
  const go=id=>document.getElementById(id)?.scrollIntoView({behavior:'smooth'});

  const nav=[{id:'hero',i:'fa-home',l:t('home')},{id:'deals',i:'fa-tags',l:'Deals'},{id:'locs',i:'fa-map-marker-alt',l:t('locs')},{id:'about',i:'fa-info-circle',l:t('about')}];

  return(
    <div className={dir==='rtl'?'rtl':'ltr'}>
      <ToastContainer/>

      <SponsorStrip sponsors={sponsors}/>

      <header className="hdr">
        <div className="container flex items-center justify-between" style={{height:52}}>
          <div className="flex items-center gap-2 cursor-pointer" onClick={()=>go('hero')}>
            <div className="flex items-center justify-center font-extrabold text-base" style={{width:32,height:32,borderRadius:8,background:'linear-gradient(135deg,var(--accent),var(--accent-dim))',color:'#02140d'}}>B</div>
            <div>
              <div className="font-extrabold text-sm" style={{color:'var(--text)'}}>Bilal Bazar</div>
              <div className="text-xs font-bold text-accent tracking-widest uppercase" style={{fontSize:8,letterSpacing:2}}>Erbil · Kurdistan</div>
            </div>
          </div>
          <nav className="hide-mobile flex gap-1">
            {nav.map(x=>(
              <button key={x.id} onClick={()=>go(x.id)} className="btn btn-ghost" style={{padding:'6px 10px',fontSize:13,color:active===x.id?'var(--accent)':'var(--muted)',borderColor:'transparent'}}>{x.l}</button>
            ))}
          </nav>
          <div className="flex items-center gap-2">
            {isAdmin&&<button onClick={()=>{setEditing(null);setPostModal(true)}} className="btn btn-primary hide-mobile" style={{padding:'7px 12px',fontSize:12}}><i className="fas fa-plus"/> {t('addPost')}</button>}
            {user&&<div className="flex items-center justify-center font-bold text-xs" style={{width:28,height:28,borderRadius:'50%',background:'var(--elevated)',border:'2px solid var(--accent)',color:'var(--accent)'}}>{user.email[0].toUpperCase()}</div>}
            <button onClick={()=>setDrawer(true)} className="btn btn-ghost" style={{padding:'8px 10px'}}><i className="fas fa-bars"/></button>
          </div>
        </div>
      </header>

      <section id="hero" className="hero">
        <div className="hero-video">
          <video ref={videoRef} autoPlay muted loop playsInline preload="auto">
            <source src="bg.mp4" type="video/mp4"/>
          </video>
        </div>
        <div className="absolute" style={{width:500,height:500,borderRadius:'50%',background:'radial-gradient(circle,rgba(16,185,129,.08),transparent 70%)',top:'8%',right:'-6%',filter:'blur(60px)',animation:'glow 5s ease-in-out infinite'}}/>
        <div className="absolute" style={{width:350,height:350,borderRadius:'50%',background:'radial-gradient(circle,rgba(52,211,153,.06),transparent 70%)',bottom:'8%',left:'-4%',filter:'blur(60px)',animation:'glow 6s ease-in-out 1s infinite'}}/>

        <div className="hero-content">
          <h1 className="hero-title">BILAL BAZAR</h1>
          <div className="flex items-center justify-center gap-3 mt-2 mb-2">
            <div style={{width:40,height:1,background:'linear-gradient(90deg,transparent,var(--accent))'}}/>
            <span className="text-xs font-bold tracking-widest uppercase text-accent">Erbil · Est. 2020</span>
            <div style={{width:40,height:1,background:'linear-gradient(90deg,var(--accent),transparent)'}}/>
          </div>
          <div className="hero-sub">{lang==='ckb'?'بیلال بازار':lang==='ar'?'بيلال بازار':'Bilal Bazar'}</div>
          <p className="hero-desc">{t('sub')}</p>

            <button onClick={()=>go('deals')} className="btn btn-primary" style={{padding:'14px 28px',borderRadius:30,fontSize:15}}><i className="fas fa-fire" style={{color:'rgba(100,10,0,.7)'}}/> {t('deals')}</button>

            </div>
            {filtered.length>3&&shown<=3&&(
              <div className="text-center mt-4">
                <button className="btn btn-primary" style={{borderRadius:30,padding:'12px 28px'}} onClick={()=>setShown(filtered.length)}>
                  <i className="fas fa-chevron-down"/> {t('more')} ({filtered.length-3})
                </button>
              </div>
            )}
            {shown>3&&filtered.length>3&&(
              <div className="text-center mt-4">
                <button className="btn btn-ghost" style={{borderRadius:30,padding:'12px 28px'}} onClick={()=>setShown(3)}>
                  <i className="fas fa-chevron-up"/> {lang==='ckb'?'داخستن':lang==='ar'?'إخفاء':'Show Less'}
                </button>
              </div>
            )}
          </>
        )}
      </section>

      <div className="divider"/>

      <section id="locs" className="py-5" style={{background:'var(--surface)',borderTop:'1px solid var(--border)'}}>
        <div className="container">
          <div className="sec-title" style={{justifyContent:'center'}}><h2>{t('ltitle')}</h2></div>
          <div className="grid grid-1 sm:grid-2 md:grid-3 gap-3">
            {LOCS.map(loc=>(
              <a key={loc.id} href={loc.link} target="_blank" rel="noopener noreferrer" className="loccard">
                <div className="flex items-center justify-center mb-3" style={{width:40,height:40,borderRadius:10,background:'rgba(16,185,129,.1)',border:'1px solid rgba(16,185,129,.2)'}}>
                  <i className="fas fa-store text-accent"/>
                </div>
                <h3 className="text-sm font-bold mb-1" style={{lineHeight:1.3}}>{loc[lang]||loc.en}</h3>
                <p className="text-xs text-muted mb-3" style={{lineHeight:1.4}}>{loc.addr[lang]||loc.addr.en}</p>
                <div className="flex flex-col gap-1 mb-3 text-xs text-muted" style={{direction:'ltr',textAlign:'start'}}>
                  <span className="flex items-center gap-2"><i className="far fa-clock text-accent" style={{width:14}}/>{loc.hr}</span>
                  <span className="flex items-center gap-2"><i className="fas fa-phone text-accent" style={{width:14}}/>{loc.ph}</span>
                </div>
                <div className="flex gap-2">
                  <span className="btn btn-primary flex-1" style={{padding:'8px',fontSize:12}}><i className="fas fa-map-marker-alt"/> {t('openMap')}</span>
                  <a href={`tel:+964${loc.ph.replace(/^0/,'').replace(/\s/g,'')}`} onClick={e=>e.stopPropagation()} className="btn btn-ghost" style={{padding:'8px 12px'}}><i className="fas fa-phone"/></a>
                </div>
              </a>
            ))}
          </div>
        </div>
      </section>

      <div className="divider"/>

      <section id="about" className="py-5 container text-center" style={{maxWidth:680}}>
        <div className="sec-title" style={{justifyContent:'center'}}><h2>{t('atitle')}</h2></div>
        <p className="text-base text-muted" style={{lineHeight:1.8}}>{t('atext')}</p>
        <div className="abt-feat">
          {[{i:'fa-leaf',l:t('feat1')},{i:'fa-tag',l:t('feat2')},{i:'fa-award',l:t('feat3')}].map((f,idx)=>(
            <div key={idx} className="abt-item">
              <div className="abt-ico"><i className={`fas ${f.i}`}/></div>
              <div className="text-xs font-bold">{f.l}</div>
            </div>
          ))}
        </div>
      </section>

      <footer className="text-center py-5" style={{background:'var(--bg)',borderTop:'1px solid var(--border)',paddingBottom:80}}>
        <div className="text-2xl font-extrabold mb-1" style={{background:'linear-gradient(90deg,#fff,var(--accent))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Bilal Bazar</div>
        <div className="text-xs font-bold text-accent tracking-widest uppercase mb-2" style={{fontSize:8,letterSpacing:3}}>Erbil · Kurdistan</div>
        <div className="text-sm text-muted mb-3">{lang==='ckb'?'بیلال بازار':lang==='ar'?'بيلال بازار':'Bilal Bazar'}</div>
        <a href="https://wa.me/9647509193030" target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 btn btn-ghost mb-3" style={{borderRadius:10,padding:'10px 20px',color:'#25d366',borderColor:'rgba(37,211,102,.2)'}}>
          <i className="fab fa-whatsapp text-lg"/> WhatsApp
        </a>
        <p className="text-xs text-muted">{t('copy')}</p>
      </footer>

      <div className="mnav hide-desktop">
        {nav.map(x=>(
          <button key={x.id} className={`mnav-btn ${active===x.id?'active':''}`} onClick={()=>go(x.id)}>
            <i className={`fas ${x.i} text-lg`}/>{x.l}
          </button>
        ))}
        <button className="mnav-btn" onClick={()=>setDrawer(true)}><i className="fas fa-bars text-lg"/>{t('menu')}</button>
      </div>

      <a href="https://wa.me/9647509193030" target="_blank" rel="noreferrer" className="fab-wa"><i className="fab fa-whatsapp"/></a>
      {isAdmin&&<button className="fab-admin" onClick={()=>{setEditing(null);setPostModal(true)}}><i className="fas fa-plus"/></button>}

      {drawer&&<Drawer onClose={()=>setDrawer(false)} onAuth={()=>setAuthOpen(true)} onAddPost={()=>{setEditing(null);setPostModal(true)}} onSpMgr={()=>setSpModal(true)}/>}
      {authOpen&&<AuthModal onClose={()=>setAuthOpen(false)}/>}
      {postModal&&<PostModal editing={editing} onSave={handleSaved} onClose={()=>{setPostModal(false);setEditing(null)}}/>}
      {spModal&&<SponsorModal sponsors={sponsors} onUpdate={setSponsors} onClose={()=>setSpModal(false)}/>}
    </div>
  );
}

const Root=()=><AppProvider><App/></AppProvider>;
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
