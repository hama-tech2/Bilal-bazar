const LangCtx = React.createContext();
const LangProvider = ({children}) => {
    const [lang, setLang] = useState('ckb');
    const t = (k) => { const keys=k.split('.'); let v=T[lang]; for(const x of keys){v=v?.[x]; if(!v)return k;} return v; };
    const switchLang = (l) => { setLang(l); document.documentElement.lang=l; document.documentElement.dir=l==='en'?'ltr':'rtl'; window.scrollTo(0,0); };
    return <LangCtx.Provider value={{lang,t,switchLang,dir:lang==='en'?'ltr':'rtl'}}>{children}</LangCtx.Provider>;
};
const useLang = () => useContext(LangCtx);

const timeLeft = (createdAt, days) => {
    const diff = (createdAt + days*86400000) - Date.now();
    if(diff<=0) return null;
    return { d:Math.floor(diff/86400000), h:Math.floor((diff%86400000)/3600000), m:Math.floor((diff%3600000)/60000) };
};

// FACEBOOK-STYLE IMAGE GRID
// ═══════════════════════════════════════════════
const FBGrid = ({images, discountPercent, expired, onClick}) => {
    if(!images||images.length===0) return null;
    const n = images.length;
    const max = Math.min(n, 5);
    const extra = n > 5 ? n - 5 : 0;

    const Img = ({src, idx, showOverlay}) => (
        <div className="fb-img" onClick={()=>onClick&&onClick(idx)}>
            <img src={src} alt="" loading="lazy"/>
            {showOverlay && <div className="fb-more-overlay">+{extra+1}</div>}
        </div>
    );

    const gridClass = n===1?'fb-grid-1':n===2?'fb-grid-2':n===3?'fb-grid-3':n===4?'fb-grid-4':'fb-grid-5plus';

    return (
        <div className="relative overflow-hidden" style={{borderRadius:'0'}}>
            {n===1 ? (
                <div className="fb-grid-1"><Img src={images[0]} idx={0}/></div>
            ) : (
                <div className={gridClass}>
                    {images.slice(0,max).map((img,i) => (
                        <Img key={i} src={img} idx={i} showOverlay={extra>0 && i===max-1}/>
                    ))}
                </div>
            )}
            {/* Discount Badge */}
            <div className="absolute top-3 left-3 z-10">
                <div className="discount-burst w-14 h-14 rounded-full flex flex-col items-center justify-center shadow-2xl border-2 border-white/30" style={{transform:'rotate(-10deg)'}}>
                    <span className="text-white font-black text-base leading-none">{discountPercent}%</span>
                    <span className="text-white/90 font-bold text-[9px] uppercase tracking-wide">OFF</span>
                </div>
            </div>
            {expired && (
                <div className="absolute inset-0 bg-black/60 flex items-center justify-center backdrop-blur-sm z-10">
                    <span className="bg-red-600 text-white px-6 py-2 rounded-full font-black text-xl border-2 border-white/40" style={{transform:'rotate(-6deg)'}}>EXPIRED</span>
                </div>
            )}
        </div>
    );
};

// Lightbox
const Lightbox = ({images, startIndex, onClose}) => {
    const [idx, setIdx] = useState(startIndex||0);
    useEffect(() => {
        const handler = (e) => { if(e.key==='Escape')onClose(); if(e.key==='ArrowLeft')setIdx(i=>(i-1+images.length)%images.length); if(e.key==='ArrowRight')setIdx(i=>(i+1)%images.length); };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
    }, [images]);
    return (
        <div className="fixed inset-0 bg-black/95 z-[200] flex items-center justify-center" onClick={onClose}>
            <button className="absolute top-4 right-4 text-white text-3xl z-10" onClick={onClose}>×</button>
            <div className="absolute top-4 left-1/2 -translate-x-1/2 text-white/70 text-sm">{idx+1}/{images.length}</div>
            <img src={images[idx]} alt="" className="max-w-[90vw] max-h-[85vh] object-contain" onClick={e=>e.stopPropagation()}/>
            {images.length>1 && <>
                <button className="absolute left-4 top-1/2 -translate-y-1/2 text-white bg-black/50 w-12 h-12 rounded-full text-xl flex items-center justify-center" onClick={e=>{e.stopPropagation();setIdx(i=>(i-1+images.length)%images.length);}}>‹</button>
                <button className="absolute right-4 top-1/2 -translate-y-1/2 text-white bg-black/50 w-12 h-12 rounded-full text-xl flex items-center justify-center" onClick={e=>{e.stopPropagation();setIdx(i=>(i+1)%images.length);}}>›</button>
            </>}
        </div>
    );
};

    const filters = [{v:'none',l:'Normal'},{v:'grayscale(100%)',l:'B&W'},{v:'sepia(80%)',l:'Sepia'},{v:'contrast(150%)',l:'Contrast'},{v:'brightness(130%)',l:'Bright'},{v:'saturate(200%)',l:'Vivid'},{v:'hue-rotate(180deg)',l:'Cool'},{v:'hue-rotate(-30deg)',l:'Warm'}];
    const emojiStickers = ['🛒','🛍️','💰','🔥','⭐','✅','💯','🎉','🎁','❤️','👍','💚','🤑','🎊','🥳','🏷️'];

    useEffect(() => {
        if(discountPercent>0){
            setElements([
                {id:1,type:'sticker',kind:'burst',content:`${discountPercent}% OFF`,x:60,y:60,w:110,h:110,r:-12,color:'#dc2626'},
                {id:2,type:'text',content:'Bilal Bazar',x:10,y:10,w:200,h:40,r:0,font:'Montserrat',size:22,color:'#059669',bold:true,align:'left',bg:'none',anchor:'bottom-right'}
            ]);
        }
    },[]);

    const drawCanvas = useCallback(() => {
        const canvas = canvasRef.current; if(!canvas) return;
        const ctx = canvas.getContext('2d');
        const img = new Image(); img.crossOrigin='anonymous'; img.src=imageSrc;
        img.onload = () => {
            canvas.width = img.width; canvas.height = img.height;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.filter=filter; ctx.drawImage(img,0,0); ctx.filter='none';
            
            elements.forEach(el => {
                ctx.save();
                const cx = el.x+el.w/2, cy = el.y+el.h/2;
                ctx.translate(cx,cy); ctx.rotate(el.r*Math.PI/180); ctx.translate(-cx,-cy);
                
                if(el.type==='text'){
                    const fw = el.bold?'bold':'normal';
                    ctx.font = `${fw} ${el.size}px "${el.font}"`;
                    ctx.textAlign = el.align||'center';
                    if(el.bg==='shadow'){ctx.shadowColor='rgba(0,0,0,0.8)';ctx.shadowBlur=8;ctx.shadowOffsetX=2;ctx.shadowOffsetY=2;}
                    else if(el.bg==='box'){ctx.fillStyle='rgba(0,0,0,0.6)'; const m=ctx.measureText(el.content); ctx.fillRect(el.x-4,el.y-el.size,m.width+8,el.size+8);}
                    ctx.fillStyle=el.color; ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=1.5; ctx.strokeText(el.content,el.x,el.y); ctx.fillText(el.content,el.x,el.y);
                    ctx.shadowColor='transparent';
                } else if(el.type==='sticker'){
                    if(el.kind==='burst'){
                        ctx.fillStyle=el.color||'#dc2626';
                        ctx.beginPath();
                        for(let i=0;i<16;i++){const a=(i/16)*Math.PI*2; const r=i%2===0?el.w/2:el.w/3; ctx.lineTo(Math.cos(a)*r+el.x+el.w/2,Math.sin(a)*r+el.y+el.h/2);}
                        ctx.closePath(); ctx.fill(); ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=2; ctx.stroke();
                        ctx.fillStyle='#fff'; ctx.font=`900 ${el.w/3.5}px "Bebas Neue"`; ctx.textAlign='center'; ctx.textBaseline='middle';
                        const lines=el.content.split(' ');
                        lines.forEach((line,i)=>ctx.fillText(line,el.x+el.w/2,el.y+el.h/2+(i-(lines.length-1)/2)*el.h/3.5));
                    } else if(el.kind==='emoji'){
                        ctx.font=`${el.w}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(el.content,el.x+el.w/2,el.y+el.h/2);
                    }
                }
                if(el.id===selectedId){ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.strokeRect(el.x-4,el.y-4,el.w+8,el.h+8);ctx.setLineDash([]);}
                ctx.restore();
            });
        };
    },[imageSrc,elements,filter,selectedId]);

    useEffect(()=>drawCanvas(),[drawCanvas]);

    const getPos = (e) => {
        const canvas=canvasRef.current; const rect=canvas.getBoundingClientRect();
        const cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
        const cy=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
        return {x:cx*(canvas.width/rect.width), y:cy*(canvas.height/rect.height)};
    };
    const hitTest = (pos) => { for(let i=elements.length-1;i>=0;i--){const el=elements[i]; if(pos.x>=el.x-10&&pos.x<=el.x+el.w+10&&pos.y>=el.y-20&&pos.y<=el.y+el.h+10) return el.id;} return null; };

    const onDown = (e) => { const pos=getPos(e); const hit=hitTest(pos); if(hit){setSelectedId(hit);setIsDragging(true);setDragStart(pos);const el=elements.find(x=>x.id===hit);setElStart({x:el.x,y:el.y});}else setSelectedId(null); };
    const onMove = (e) => { if(!isDragging||!selectedId) return; e.preventDefault(); const pos=getPos(e); setElements(els=>els.map(el=>el.id===selectedId?{...el,x:elStart.x+(pos.x-dragStart.x),y:elStart.y+(pos.y-dragStart.y)}:el)); };
    const onUp = () => setIsDragging(false);

    const addText = () => {
        if(!textVal.trim()) return;
        setElements(els=>[...els,{id:Date.now(),type:'text',content:textVal,x:80,y:120,w:300,h:textSize+20,r:0,font:textFont,size:textSize,color:textColor,bold:textBold,align:textAlign,bg:textBg}]);
        setTextVal(''); setShowText(false);
    };
    const addSticker = (s,kind='emoji') => {
        setElements(els=>[...els,{id:Date.now(),type:'sticker',kind,content:s,x:120,y:120,w:kind==='emoji'?80:110,h:kind==='emoji'?80:110,r:0,color:'#dc2626'}]);
        setShowStickers(false);
    };
    const deleteSelected = () => { setElements(els=>els.filter(el=>el.id!==selectedId)); setSelectedId(null); };
    const handleSave = () => onSave(canvasRef.current.toDataURL('image/jpeg',0.95));

    return (
        <div className="fixed inset-0 bg-black z-50 flex flex-col">
            <div className="bg-[#111827] p-3 flex justify-between items-center border-b border-[#1e2d40]">
                <button onClick={onCancel} className="text-white/60 hover:text-white px-3 py-1 rounded text-sm"><i className="fas fa-times mr-1"/>Cancel</button>
                <div className="flex gap-2">
                    {selectedId && <button onClick={deleteSelected} className="bg-red-600/20 text-red-400 border border-red-600/40 px-3 py-1 rounded-lg text-sm"><i className="fas fa-trash"/></button>}
                    <button onClick={()=>{setShowText(true);setShowStickers(false);}} className="bg-blue-600/20 text-blue-400 border border-blue-600/40 px-3 py-1 rounded-lg text-sm"><i className="fas fa-font mr-1"/>{t('addText')}</button>
                    <button onClick={()=>{setShowStickers(true);setShowText(false);}} className="bg-purple-600/20 text-purple-400 border border-purple-600/40 px-3 py-1 rounded-lg text-sm"><i className="fas fa-smile mr-1"/>{t('stickers')}</button>
                </div>
                <button onClick={handleSave} className="bg-bilal-600 text-white px-5 py-1.5 rounded-lg font-bold text-sm pulse-btn"><i className="fas fa-check mr-1"/>{t('save')}</button>
            </div>

            <div className="flex-1 editor-bg flex items-center justify-center overflow-auto p-4" onMouseLeave={onUp}>
                <canvas ref={canvasRef} onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp} className="max-w-full max-h-[65vh] object-contain cursor-move shadow-2xl rounded-lg"/>
            </div>

            <div className="bg-[#111827] p-2 overflow-x-auto hide-scrollbar flex gap-2 border-t border-[#1e2d40]">
                {filters.map(f=><button key={f.v} onClick={()=>setFilter(f.v)} className={`px-3 py-1 rounded-full text-xs whitespace-nowrap ${filter===f.v?'bg-bilal-600 text-white':'bg-[#1a2235] text-gray-400'}`}>{f.l}</button>)}
            </div>

            {showText && (
                <div className="absolute inset-0 bg-black/80 z-50 flex items-end justify-center">
                    <div className="bg-[#111827] rounded-t-2xl w-full max-w-lg max-h-[80vh] overflow-y-auto">
                        <div className="p-5 space-y-4">
                            <div className="flex justify-between items-center"><h3 className="text-white font-bold text-lg">{t('addText')}</h3><button onClick={()=>setShowText(false)} className="text-gray-400 text-xl">×</button></div>
                            <input type="text" value={textVal} onChange={e=>setTextVal(e.target.value)} placeholder="Your text..." className="w-full bg-[#0a0f1a] border border-[#1e2d40] rounded-xl px-4 py-3 text-white text-lg" autoFocus/>
                            <div><label className="text-gray-500 text-xs uppercase tracking-wider block mb-2">Font</label>
                                <div className="flex gap-2 overflow-x-auto hide-scrollbar pb-1">
                                    {fonts.map(f=><button key={f} onClick={()=>setTextFont(f)} className={`px-3 py-1.5 rounded-lg text-sm whitespace-nowrap ${textFont===f?'bg-bilal-600 text-white':'bg-[#1a2235] text-gray-300'}`} style={{fontFamily:f}}>{f.split(' ')[0]}</button>)}
                                </div>
                            </div>
                            <div><label className="text-gray-500 text-xs uppercase tracking-wider block mb-2">Color</label>
                                <div className="flex gap-2 flex-wrap">
                                    {colors.map(c=><button key={c} onClick={()=>setTextColor(c)} className={`w-9 h-9 rounded-full border-2 ${textColor===c?'border-white scale-110':'border-transparent'} transition-transform`} style={{background:c}}/>)}
                                </div>
                            </div>
                            <div><label className="text-gray-500 text-xs uppercase tracking-wider block mb-2">Size: {textSize}px</label>
                                <input type="range" min="18" max="120" value={textSize} onChange={e=>setTextSize(+e.target.value)} className="w-full accent-bilal-600"/>
                            </div>
                            <div className="grid grid-cols-3 gap-2">
                                <button onClick={()=>setTextBold(!textBold)} className={`py-2 rounded-lg font-black ${textBold?'bg-bilal-600 text-white':'bg-[#1a2235] text-gray-300'}`}>Bold</button>
                                {['left','center','right'].map(a=><button key={a} onClick={()=>setTextAlign(a)} className={`py-2 rounded-lg text-sm ${textAlign===a?'bg-bilal-600 text-white':'bg-[#1a2235] text-gray-300'}`}><i className={`fas fa-align-${a}`}/></button>)}
                            </div>
                            <div><label className="text-gray-500 text-xs uppercase tracking-wider block mb-2">Background</label>
                                <div className="flex gap-2">
                                    {[{v:'none',l:'None'},{v:'shadow',l:'Shadow'},{v:'box',l:'Box'}].map(b=><button key={b.v} onClick={()=>setTextBg(b.v)} className={`flex-1 py-2 rounded-lg text-sm ${textBg===b.v?'bg-bilal-600 text-white':'bg-[#1a2235] text-gray-300'}`}>{b.l}</button>)}
                                </div>
                            </div>
                            <button onClick={addText} className="w-full bg-bilal-600 hover:bg-bilal-700 text-white py-3 rounded-xl font-bold text-lg transition-colors">+ Add to Image</button>
                        </div>
                    </div>
                </div>
            )}

            {showStickers && (
                <div className="absolute inset-0 bg-black/80 z-50 flex items-end justify-center">
                    <div className="bg-[#111827] rounded-t-2xl w-full max-w-lg">
                        <div className="p-5 max-h-[70vh] overflow-y-auto">
                            <div className="flex justify-between items-center mb-4"><h3 className="text-white font-bold text-lg">{t('stickers')}</h3><button onClick={()=>setShowStickers(false)} className="text-gray-400 text-xl">×</button></div>
                            <div className="mb-4"><p className="text-gray-500 text-xs uppercase tracking-wider mb-2">Discount Badges</p>
                                <div className="grid grid-cols-5 gap-2">
                                    {['SALE','HOT','NEW','50%\nOFF','FREE'].map((s,i)=>(
                                        <button key={i} onClick={()=>addSticker(s,'burst')} className="bg-red-600/20 border border-red-600/30 text-red-400 rounded-xl py-3 text-xs font-bold hover:bg-red-600/40 transition-colors">{s}</button>
                                    ))}
                                </div>
                            </div>
                            <div><p className="text-gray-500 text-xs uppercase tracking-wider mb-2">Emojis</p>
                                <div className="grid grid-cols-8 gap-1">
                                    {emojiStickers.map((e,i)=><button key={i} onClick={()=>addSticker(e,'emoji')} className="text-3xl p-2 hover:bg-[#1a2235] rounded-xl transition-colors">{e}</button>)}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
};

// MULTI-IMAGE MANAGER
// ═══════════════════════════════════════════════
const MediaManager = ({onSave, onCancel, t, discountPercent}) => {
    const [images, setImages] = useState([]);
    const [currentIdx, setCurrentIdx] = useState(0);
    const [editingIdx, setEditingIdx] = useState(null);

    const addFiles = (files) => {
        Array.from(files).slice(0, 30-images.length).forEach(file => {
            const r=new FileReader(); r.onload=e=>setImages(prev=>[...prev,e.target.result]); r.readAsDataURL(file);
        });
    };

    if(editingIdx!==null){
        return <ImageEditor imageSrc={images[editingIdx]} onSave={src=>{const n=[...images];n[editingIdx]=src;setImages(n);setEditingIdx(null);}} onCancel={()=>setEditingIdx(null)} t={t} discountPercent={editingIdx===0?discountPercent:0}/>;
    }

    return (
        <div className="fixed inset-0 bg-[#0a0f1a] z-50 flex flex-col">
            <div className="bg-[#111827] p-4 flex justify-between items-center border-b border-[#1e2d40]">
                <button onClick={onCancel} className="text-gray-400 hover:text-white"><i className="fas fa-times mr-1"/>{t('cancel')}</button>
                <span className="text-white font-bold">{images.length}/30 images</span>
                <button onClick={()=>images.length>0&&onSave(images)} disabled={images.length===0} className="bg-bilal-600 text-white px-5 py-1.5 rounded-lg font-bold disabled:opacity-40">{t('save')}</button>
            </div>

            <div className="flex-1 flex flex-col">
                {images.length===0 ? (
                    <div className="flex-1 flex flex-col items-center justify-center p-8">
                        <label className="w-full max-w-sm border-2 border-dashed border-bilal-600/50 rounded-3xl p-12 flex flex-col items-center gap-4 cursor-pointer hover:border-bilal-500 hover:bg-bilal-600/5 transition-all">
                            <div className="w-20 h-20 bg-bilal-600/20 rounded-2xl flex items-center justify-center text-4xl">📷</div>
                            <div className="text-center"><p className="text-white font-bold text-xl mb-1">{t('gallery')}</p><p className="text-gray-500 text-sm">Select up to 30 images</p></div>
                            <input type="file" accept="image/*" multiple onChange={e=>addFiles(e.target.files)} className="hidden"/>
                        </label>
                    </div>
                ) : (
                    <>
                        <div className="flex-1 flex items-center justify-center bg-black/40 p-4 relative">
                            <img src={images[currentIdx]} alt="" className="max-w-full max-h-[55vh] object-contain rounded-xl shadow-2xl"/>
                            <button onClick={()=>setEditingIdx(currentIdx)} className="absolute top-6 right-6 bg-black/60 text-white p-3 rounded-xl hover:bg-black/80 transition-colors">
                                <i className="fas fa-pencil-alt text-lg"/>
                            </button>
                        </div>
                        <div className="bg-[#111827] border-t border-[#1e2d40] p-3">
                            <div className="flex gap-2 overflow-x-auto hide-scrollbar items-center">
                                {images.map((img,i)=>(
                                    <div key={i} className={`relative flex-shrink-0 cursor-pointer ${i===currentIdx?'ring-2 ring-bilal-500 rounded-lg':''}`} onClick={()=>setCurrentIdx(i)}>
                                        <img src={img} alt="" className="w-16 h-16 object-cover rounded-lg"/>
                                        <button onClick={e=>{e.stopPropagation();const n=images.filter((_,x)=>x!==i);setImages(n);if(currentIdx>=n.length)setCurrentIdx(Math.max(0,n.length-1));}} className="absolute -top-1.5 -right-1.5 bg-red-500 text-white w-5 h-5 rounded-full text-xs flex items-center justify-center leading-none">×</button>
                                    </div>
                                ))}
                                {images.length<30 && (
                                    <label className="w-16 h-16 bg-[#1a2235] rounded-lg flex items-center justify-center cursor-pointer hover:bg-[#1e2d40] flex-shrink-0 transition-colors">
                                        <i className="fas fa-plus text-gray-400 text-xl"/>
                                        <input type="file" accept="image/*" multiple onChange={e=>addFiles(e.target.files)} className="hidden"/>
                                    </label>
                                )}
                            </div>
                        </div>
                    </>
                )}
            </div>
        </div>
    );
};

const PriceDisplay = ({oldPrice, newPrice, currency, discountPercent, discountOnLabel}) => {
    if(!oldPrice && !newPrice) return null;
    return (
        <div className="bg-[#0a0f1a] rounded-xl p-3 mb-3 border border-[#1e2d40]">
            <p className="text-xs text-gray-500 uppercase tracking-wider mb-1">{discountOnLabel}</p>
            <div className="flex items-center gap-3 flex-wrap">
                {oldPrice && <span className="price-old text-sm">{fmt(oldPrice)} {currency}</span>}
                {newPrice && <span className="price-new text-lg">{fmt(newPrice)} {currency}</span>}
                {oldPrice && newPrice && (
                    <span className="tag-badge ml-auto" style={{background:'rgba(239,68,68,0.15)',color:'#f87171',border:'1px solid rgba(239,68,68,0.3)'}}>
                        -{discountPercent}%
                    </span>
                )}
            </div>
        </div>
    );
};

const PostCard = ({post, isAdmin, onDelete, onEdit, t, lang}) => {
    const [liked, setLiked] = useState(false);
    const [lightboxIdx, setLightboxIdx] = useState(null);
    const tl = timeLeft(post.createdAt, post.discountDays);
    const title = post.title[lang]||post.title[post.lang]||'';
    const desc = post.description[lang]||post.description[post.lang]||'';

    const handleShare = async () => {
        if(navigator.share) { try{await navigator.share({title,text:`${title} - ${post.discountPercent}% OFF at Bilal Bazar!`,url:window.location.href});}catch(e){} }
        else { navigator.clipboard?.writeText(window.location.href); }
    };

    return (
        <div className="bg-[#111827] rounded-2xl overflow-hidden border border-[#1e2d40] card-hover">
            <FBGrid images={post.images} discountPercent={post.discountPercent} expired={!tl} onClick={i=>setLightboxIdx(i)}/>

            {lightboxIdx!==null && <Lightbox images={post.images} startIndex={lightboxIdx} onClose={()=>setLightboxIdx(null)}/>}

            <div className="p-4">
                <div className="flex justify-between items-start gap-2 mb-2">
                    <h3 className="text-white font-bold text-base leading-snug flex-1">{title}</h3>
                    <span className="tag-badge flex-shrink-0" style={{background:'rgba(5,150,105,0.15)',color:'#34d399',border:'1px solid rgba(5,150,105,0.25)'}}>📍 Erbil</span>
                </div>

                {desc && <p className="text-gray-400 text-sm mb-3 line-clamp-2 leading-relaxed">{desc}</p>}

                <PriceDisplay oldPrice={post.oldPrice} newPrice={post.newPrice} currency={t('currency')} discountPercent={post.discountPercent} discountOnLabel={t('discountOn')}/>

                {tl && (
                    <div className="flex gap-2 mb-3 justify-center bg-black/30 rounded-xl p-2 border border-[#1e2d40]">
                        {[{v:tl.d,l:t('days_label')},{v:tl.h,l:t('hrs_label')},{v:tl.m,l:t('min_label')}].map((x,i)=>(
                            <React.Fragment key={i}>
                                {i>0 && <span className="text-gray-600 font-bold self-center">:</span>}
                                <div className="text-center min-w-[36px]"><div className="text-white font-black text-xl leading-none">{x.v}</div><div className="text-gray-500 text-[9px] uppercase tracking-widest mt-0.5">{x.l}</div></div>
                            </React.Fragment>
                        ))}
                    </div>
                )}

                <div className="flex items-center justify-between pt-3 border-t border-[#1e2d40]">
                    <div className="flex gap-2">
                        <button onClick={()=>setLiked(!liked)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-sm font-bold transition-colors ${liked?'bg-red-500/20 text-red-400':'bg-[#1a2235] text-gray-400 hover:bg-[#1e2d40]'}`}>
                            <i className={`${liked?'fas':'far'} fa-heart text-xs`}/>{post.likes+(liked?1:0)}
                        </button>
                        <button onClick={handleShare} className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl bg-[#1a2235] text-gray-400 hover:bg-[#1e2d40] text-sm font-bold transition-colors">
                            <i className="fas fa-share-alt text-xs"/>{t('share')}
                        </button>
                    </div>
                    {isAdmin && (
                        <div className="flex gap-1">
                            <button onClick={()=>onEdit(post)} className="w-8 h-8 rounded-lg bg-blue-500/10 text-blue-400 hover:bg-blue-500/20 flex items-center justify-center transition-colors"><i className="fas fa-pencil-alt text-xs"/></button>
                            <button onClick={()=>onDelete(post.id)} className="w-8 h-8 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500/20 flex items-center justify-center transition-colors"><i className="fas fa-trash text-xs"/></button>
                        </div>
                    )}
                </div>
            </div>
        </div>
    );
};

// CREATE / EDIT POST MODAL
// ═══════════════════════════════════════════════
const PostModal = ({onSave, onClose, t, lang, editingPost=null}) => {
    const [step, setStep] = useState(editingPost?'details':'media');
    const [images, setImages] = useState(editingPost?.images||[]);
    const [form, setForm] = useState({
        title: editingPost?.title||{ckb:'',ar:'',en:''},
        description: editingPost?.description||{ckb:'',ar:'',en:''},
        discountPercent: editingPost?.discountPercent||20,
        discountDays: editingPost?.discountDays||7,
        oldPrice: editingPost?.oldPrice||'',
        newPrice: editingPost?.newPrice||'',
        category: editingPost?.category||'fresh'
    });

    const setField = (k,v) => setForm(f=>({...f,[k]:v}));

    const handleSubmit = () => {
        if(images.length===0||!form.title[lang]) return;
        onSave({
            id: editingPost?.id||Date.now(),   // ← FIX: always use existing id when editing
            title: form.title, description: form.description,
            images, discountPercent:+form.discountPercent, discountDays:+form.discountDays,
            oldPrice:form.oldPrice?+form.oldPrice:null, newPrice:form.newPrice?+form.newPrice:null,
            createdAt: editingPost?.createdAt||Date.now(),
            likes: editingPost?.likes||0, category:form.category, lang, city:'Erbil'
        });
    };

    if(step==='media'){
        return <MediaManager onSave={imgs=>{setImages(imgs);setStep('details');}} onCancel={onClose} t={t} discountPercent={+form.discountPercent}/>;
    }

    return (
        <div className="fixed inset-0 bg-black/90 z-50 overflow-y-auto">

};

const App = () => {

    const [showWarning,setShowWarning] = useState(false);
    const [showLogin,setShowLogin] = useState(false);
    const [showCreate,setShowCreate] = useState(false);
    const [editingPost,setEditingPost] = useState(null);
    const [search,setSearch] = useState('');
    const [cat,setCat] = useState('all');
    const [activeSection,setActiveSection] = useState('home');

    useEffect(()=>{
        try{const d=JSON.parse(localStorage.getItem('bilalAdmin'));if(d&&Date.now()-d.loginTime<7*864e5)setAdmin(d);}catch(e){}
    },[]);

    const handleLogin = (d)=>{setAdmin(d);setShowLogin(false);setShowWarning(false);};
    const handleLogout = ()=>{localStorage.removeItem('bilalAdmin');setAdmin(null);};
    
    const handleSavePost = (post) => {
        if(editingPost) {
            // UPDATE existing post — fix: match by id
            setPosts(ps=>ps.map(p=>p.id===post.id?post:p));
        } else {
            setPosts(ps=>[post,...ps]);
        }
        setShowCreate(false); setEditingPost(null);

    const handleDelete = (id) => { if(confirm('Delete this post?')) setPosts(ps=>ps.filter(p=>p.id!==id)); };

            </section>

            {/* ── FOOTER ── */}
            <footer className="py-10 px-4 pb-24 md:pb-10 text-center" style={{background:'#060b12',borderTop:'1px solid var(--border)'}}>
                <div className="text-2xl font-black text-white mb-1" style={{fontFamily:"'Syne',sans-serif"}}>Bilal Bazar</div>
                <div className="text-xs font-bold tracking-widest mb-5" style={{color:'var(--accent)'}}>BASHURI KURDISTAN</div>
                <div className="flex justify-center gap-4 mb-5 flex-wrap">
                    {LOCATIONS.map(loc=>(
                        <a key={loc.id} href={loc.mapLink} target="_blank" rel="noreferrer" className="text-xs hover:text-bilal-400 transition-colors" style={{color:'var(--muted)'}}>
                            <i className="fas fa-map-pin mr-1"/>{loc.name.split('–')[1]?.trim()||loc.name}
                        </a>
                    ))}
                </div>
                <p className="text-xs" style={{color:'#334155'}}>© 2025 Bilal Bazar · Erbil, Kurdistan Region, Iraq</p>
            </footer>

            {/* ── FLOATING BUTTONS ── */}
            <a href="https://wa.me/9647509193030" target="_blank" rel="noopener noreferrer"
               className="fixed bottom-20 md:bottom-6 left-5 w-14 h-14 rounded-full flex items-center justify-center text-white text-2xl z-40 hover:scale-110 transition-transform"
               style={{background:'#25d366',boxShadow:'0 4px 20px rgba(37,211,102,0.4)'}}>
                <i className="fab fa-whatsapp"/>
            </a>

            {/* Settings gear — subtle bottom right */}
            <button onClick={()=>setShowSettings(true)} className="fixed bottom-6 right-5 z-40 text-lg transition-colors hover:text-gray-400" style={{color:'#334155',background:'none',border:'none',cursor:'pointer'}}>
                <i className="fas fa-cog"/>
            </button>

            {/* Admin FAB */}
            {admin && (
                <button onClick={()=>{setEditingPost(null);setShowCreate(true);}} className="fixed bottom-20 md:bottom-6 left-1/2 -translate-x-1/2 w-14 h-14 rounded-full flex items-center justify-center text-white text-2xl z-40 hover:scale-110 transition-transform" style={{background:'linear-gradient(135deg,#dc2626,#f97316)',boxShadow:'0 4px 24px rgba(220,38,38,0.4)'}}>
                    <i className="fas fa-plus"/>
                </button>
            )}

            {/* ── MOBILE BOTTOM NAV ── */}
            <div className="md:hidden mobile-nav flex justify-around items-center h-16">
                {navItems.map(item=>(
                    <button key={item.id} onClick={()=>scrollTo(item.id)} className="flex flex-col items-center gap-1 transition-colors" style={{color:activeSection===item.id?'var(--accent)':'var(--muted)'}}>
                        <i className={`fas ${item.icon} text-lg`}/>
                        <span className="text-[9px] font-bold">{item.l}</span>
                    </button>
                ))}
            </div>

            {/* ── MODALS ── */}
            {showSettings && !showWarning && !showLogin && (
                <div className="fixed inset-0 bg-black/60 z-50 flex items-end md:items-center justify-center p-4">
                    <div className="rounded-t-2xl md:rounded-2xl w-full max-w-xs p-6" style={{background:'var(--surface)',border:'1px solid var(--border)'}}>
                        <h3 className="text-white font-bold text-lg mb-4">{t('settings')}</h3>
                        <button onClick={()=>{setShowSettings(false);setShowWarning(true);}} className="w-full py-3 rounded-xl font-bold text-sm mb-2 text-white transition-colors hover:opacity-90" style={{background:'var(--surface2)',border:'1px solid var(--border)'}}>
                            <i className="fas fa-lock mr-2"/>{t('admin')}
                        </button>
                        <button onClick={()=>setShowSettings(false)} className="w-full py-2 text-sm" style={{color:'var(--muted)'}}>{t('cancel')}</button>
                    </div>
                </div>
            )}
            {showWarning && <AdminWarning onStaff={()=>{setShowWarning(false);setShowLogin(true);}} onLeave={()=>{setShowWarning(false);setShowSettings(false);}} t={t}/>}
            {showLogin && <AdminLogin onLogin={handleLogin} onCancel={()=>{setShowLogin(false);setShowWarning(false);}} t={t}/>}
            {showCreate && <PostModal onSave={handleSavePost} onClose={()=>{setShowCreate(false);setEditingPost(null);}} t={t} lang={lang} editingPost={editingPost}/>}
        </div>
    );
};

const Root = () => <LangProvider><App/></LangProvider>;
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
